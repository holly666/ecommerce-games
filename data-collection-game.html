<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据侦探 - 竞品情报收集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 50%, #1a1a2e 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        #start-screen { text-align: center; padding: 40px 20px; }
        .title { font-size: 2.4em; color: #ff6b9d; text-shadow: 0 0 30px rgba(255,107,157,0.5); margin-bottom: 10px; }
        .subtitle { font-size: 1.2em; color: #c792ea; margin-bottom: 30px; }
        .start-btn { background: linear-gradient(135deg, #ff6b9d, #c792ea); color: #fff; border: none; padding: 18px 50px; font-size: 1.3em; border-radius: 50px; cursor: pointer; transition: all 0.3s; font-weight: bold; box-shadow: 0 5px 20px rgba(255,107,157,0.4); }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(255,107,157,0.6); }
        
        .story-box { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; margin: 20px 0; border: 1px solid rgba(255,107,157,0.3); text-align: left; }
        .story-title { color: #ff6b9d; font-size: 1.2em; margin-bottom: 15px; font-weight: bold; }
        .story-text { line-height: 1.8; color: #e0d4f7; }
        
        .tip-box { background: rgba(255,193,7,0.1); padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid rgba(255,193,7,0.3); text-align: left; }
        .tip-title { color: #ffc107; font-weight: bold; margin-bottom: 8px; }
        
        #game-screen { display: none; }
        .progress-bar { display: flex; justify-content: space-between; margin-bottom: 25px; padding: 12px; background: rgba(255,255,255,0.05); border-radius: 25px; flex-wrap: wrap; gap: 8px; }
        .step { display: flex; align-items: center; gap: 5px; font-size: 0.75em; color: #666; }
        .step.active { color: #ff6b9d; font-weight: bold; }
        .step.completed { color: #00ff88; }
        .step-num { width: 22px; height: 22px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 0.7em; }
        .step.active .step-num { background: #ff6b9d; color: #fff; }
        .step.completed .step-num { background: #00ff88; color: #fff; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .score { font-size: 1.3em; color: #ff6b9d; font-weight: bold; }
        .phase-tag { background: linear-gradient(135deg, #ff6b9d, #c792ea); padding: 6px 15px; border-radius: 20px; font-size: 0.8em; color: #fff; font-weight: bold; }
        
        .question-box { background: #fff; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .knowledge-tag { display: inline-block; background: linear-gradient(135deg, #ff6b9d, #c792ea); color: #fff; padding: 5px 12px; border-radius: 12px; font-size: 0.75em; margin-bottom: 15px; }
        
        .scenario { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 20px; border-radius: 12px; margin-bottom: 18px; text-align: left; }
        .scenario-title { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; }
        
        .question-text { font-size: 1.05em; line-height: 1.7; color: #333; margin-bottom: 15px; font-weight: 500; }
        
        .think-box { background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 15px; color: #856404; border-left: 4px solid #ffc107; text-align: left; font-size: 0.9em; }
        .think-title { font-weight: bold; margin-bottom: 8px; }
        
        .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .option { background: #f8f9fa; border: 2px solid #e9ecef; padding: 15px; border-radius: 12px; cursor: pointer; transition: all 0.3s; text-align: center; font-size: 0.9em; color: #333; font-weight: 500; }
        .option:hover { border-color: #ff6b9d; background: #ffe8f0; transform: translateY(-2px); }
        .option.correct { background: linear-gradient(135deg, #00ff88, #00cc6a); border-color: #00ff88; color: #fff; }
        .option.wrong { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); border-color: #ff6b6b; color: #fff; }
        .option.disabled { pointer-events: none; opacity: 0.7; }
        
        .explanation { background: #e8f5e9; padding: 18px; border-radius: 12px; margin-top: 18px; display: none; color: #2e7d32; border-left: 4px solid #4caf50; text-align: left; }
        .explanation.show { display: block; animation: fadeIn 0.3s; }
        .explanation-title { font-weight: bold; margin-bottom: 10px; font-size: 1.1em; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        #result-screen { display: none; text-align: center; padding: 40px 20px; }
        .result-title { font-size: 2.5em; margin-bottom: 20px; }
        .final-score { font-size: 4em; color: #ff6b9d; margin: 20px 0; text-shadow: 0 0 30px rgba(255,107,157,0.5); }
        .result-msg { font-size: 1.2em; color: #aaa; margin-bottom: 30px; line-height: 1.6; }
        
        .stats { display: flex; justify-content: center; gap: 20px; margin: 30px 0; flex-wrap: wrap; }
        .stat { background: rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 15px; }
        .stat-value { font-size: 1.5em; color: #ff6b9d; font-weight: bold; }
        .stat-label { font-size: 0.75em; color: #888; margin-top: 5px; }
        
        .restart-btn { background: linear-gradient(135deg, #ff6b9d, #c792ea); color: #fff; border: none; padding: 15px 40px; font-size: 1.1em; border-radius: 50px; cursor: pointer; font-weight: bold; }
        
        .method-card { background: linear-gradient(135deg, #1a1a2e, #2d1b4e); border: 1px solid #ff6b9d; border-radius: 12px; padding: 12px; margin: 8px 0; text-align: left; }
        .method-name { color: #ff6b9d; font-weight: bold; font-size: 0.95em; margin-bottom: 5px; }
        .method-examples { color: #c792ea; font-size: 0.8em; }
        
        @media (max-width: 600px) {
            .options { grid-template-columns: 1fr; }
            .title { font-size: 1.8em; }
            .question-text { font-size: 0.95em; }
            .scenario { padding: 12px; font-size: 0.9em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-screen">
            <h1 class="title">🕵️ 数据侦探</h1>
            <p class="subtitle">竞品情报收集大挑战</p>
            <button class="start-btn" onclick="startGame()">🔍 开始调查</button>
            <div class="story-box">
                <div class="story-title">📖 任务说明</div>
                <p class="story-text">你是一家公司的市场情报员！老板给了你8个调查任务，你需要判断应该用什么方法来收集竞品数据。</p>
                <p style="margin-top:15px;">🎯 <strong>任务目标：</strong>选择正确的数据收集途径！</p>
            </div>
            <div class="tip-box">
                <div class="tip-title">📋 5大数据收集途径</div>
                <div class="method-card">
                    <div class="method-name">🌐 公开渠道</div>
                    <div class="method-examples">官网、社交媒体、行业报告、新闻、政府公开信息</div>
                </div>
                <div class="method-card">
                    <div class="method-name">🏢 第三方渠道</div>
                    <div class="method-examples">行业协会、展会研讨、咨询公司</div>
                </div>
                <div class="method-card">
                    <div class="method-name">👀 实地调研</div>
                    <div class="method-examples">现场考察、用户访谈、问卷调查</div>
                </div>
                <div class="method-card">
                    <div class="method-name">💻 网络监测</div>
                    <div class="method-examples">搜索引擎、社交媒体监测</div>
                </div>
                <div class="method-card">
                    <div class="method-name">🏠 内部信息源</div>
                    <div class="method-examples">员工反馈、销售数据、客户数据</div>
                </div>
            </div>
        </div>
        
        <div id="game-screen">
            <div class="progress-bar">
                <div class="step active" id="step1"><span class="step-num">1</span></div>
                <div class="step" id="step2"><span class="step-num">2</span></div>
                <div class="step" id="step3"><span class="step-num">3</span></div>
                <div class="step" id="step4"><span class="step-num">4</span></div>
                <div class="step" id="step5"><span class="step-num">5</span></div>
                <div class="step" id="step6"><span class="step-num">6</span></div>
                <div class="step" id="step7"><span class="step-num">7</span></div>
                <div class="step" id="step8"><span class="step-num">8</span></div>
            </div>
            <div class="header">
                <div class="phase-tag" id="phase-tag">任务</div>
                <div class="score">⭐ 得分: <span id="score">0</span></div>
            </div>
            <div class="question-box">
                <span class="knowledge-tag" id="knowledge-tag">数据收集</span>
                <div class="scenario" id="scenario-box">
                    <div class="scenario-title" id="scenario-title"></div>
                    <p id="scenario-text"></p>
                </div>
                <p class="question-text" id="question-text"></p>
                
                <div class="think-box" id="think-box">
                    <div class="think-title">💡 思考提示</div>
                    <p id="think-text"></p>
                </div>
                
                <div class="explanation" id="explanation">
                    <div class="explanation-title" id="explanation-title"></div>
                    <p id="explanation-text"></p>
                </div>
            </div>
            <div class="options" id="options"></div>
        </div>
        
        <div id="result-screen">
            <h1 class="result-title" id="result-title">🎉 任务完成!</h1>
            <div class="final-score"><span id="final-score">0</span></div>
            <p class="result-msg" id="result-msg"></p>
            <div class="stats">
                <div class="stat"><div class="stat-value" id="stat-right">0</div><div class="stat-label">正确</div></div>
                <div class="stat"><div class="stat-value" id="stat-wrong">0</div><div class="stat-label">错误</div></div>
                <div class="stat"><div class="stat-value" id="stat-score">0</div><div class="stat-label">得分</div></div>
            </div>
            <button class="restart-btn" onclick="restartGame()">再调查一次</button>
        </div>
    </div>

    <script>
        // 5种数据收集途径
        const dataMethods = [
            { type: "public", text: "🌐 公开渠道", desc: "官网、社交媒体、行业报告、新闻、政府信息" },
            { type: "third", text: "🏢 第三方渠道", desc: "行业协会、展会研讨、咨询公司" },
            { type: "field", text: "👀 实地调研", desc: "现场考察、用户访谈、问卷调查" },
            { type: "online", text: "💻 网络监测", desc: "搜索引擎、社交媒体监测" },
            { type: "internal", text: "🏠 内部信息源", desc: "员工反馈、销售数据、客户数据" }
        ];
        
        window.allCases = [
            {
                caseName: "📱 竞品官网分析",
                caseText: "老板让你了解竞品A公司的产品线、价格体系、公司动态。\n\n【已知条件】\n- 需要了解A公司的产品有哪些\n- 想知道他们的定价策略\n- 看看他们最近有什么大动作\n\n【可选途径】\n- 可以访问A公司官网查看\n- 需要去他们线下门店实地考察\n- 可以委托咨询公司调查",
                question: "要获取以上信息，最合适的途径是？",
                hint: "💡 思考：这些信息在哪个渠道最容易获取？",
                answer: "public",
                explanation: "✅ 公开渠道\n\n📌 选择理由：\n产品信息、价格体系、公司动态都可以通过竞品官网、新闻报道、社交媒体等公开渠道获取。\n\n❌ 为什么不是其他：\n- 实地调研：不需要去线下，现场考察适合了解实际体验\n- 第三方渠道：不需要花冤枉钱找咨询公司\n- 内部信息源：这不是自己公司有的信息\n- 网络监测：更适合监测实时动态，但静态信息官网更全"
            },
            {
                caseName: "🏪 竞品门店体验",
                caseText: "你需要了解竞品B线下门店的服务态度、产品实际体验、客流情况。\n\n【已知条件】\n- 想知道他们服务态度好不好\n- 想亲自试用产品\n- 想看他们门店人流量如何\n\n【可选途径】\n- 在网上搜索相关信息\n- 去线下门店实地考察\n- 委托第三方机构调查",
                question: "要获取以上信息，最合适的途径是？",
                hint: "💡 思考：这些信息必须亲自去现场才能感受到吗？",
                answer: "field",
                explanation: "✅ 实地调研\n\n📌 选择理由：\n服务态度、产品实际体验、客流情况都必须亲自去现场才能感受到，这是网络无法替代的。\n\n❌ 为什么不是其他：\n- 公开渠道：服务态度和实际体验网上很难了解到\n- 网络监测：只能监测线上数据，无法了解线下体验\n- 第三方渠道：花冤枉钱，自己去就行\n- 内部信息源：这是竞品的信息，不是自己公司的"
            },
            {
                caseName: "📊 行业趋势分析",
                caseText: "老板让你了解整个行业的市场规模、发展趋势、增长率。\n\n【已知条件】\n- 需要行业整体数据\n- 想知道未来发展趋势\n- 需要专业的分析报告\n\n【可选途径】\n- 可以在网上搜索新闻报道\n- 可以参加行业展会了解\n- 可以委托专业咨询公司",
                question: "要获取以上信息，最合适的途径是？",
                hint: "💡 思考：专业的行业数据应该找谁要？",
                answer: "third",
                explanation: "✅ 第三方渠道\n\n📌 选择理由：\n行业市场规模、发展趋势这些专业数据，通常需要行业协会、研究机构或专业咨询公司的报告。\n\n❌ 为什么不是其他：\n- 公开渠道：网上信息碎片化，缺乏系统性\n- 实地调研：个人无法获取行业级数据\n- 网络监测：只能监测个别企业，无法了解行业全貌\n- 内部信息源：这是外部行业信息，不是公司内部数据"
            },
            {
                caseName: "📱 竞品社交媒体监测",
                caseText: "你需要实时监测竞品C公司在微博、抖音、小红书上的营销动态、用户口碑。\n\n【已知条件】\n- 想监测他们发了什么内容\n- 想看用户怎么评价他们\n- 想第一时间知道他们的营销活动\n\n【可选途径】\n- 每天手动搜索查看\n- 用专业工具监测社交媒体\n- 雇人专门负责查看",
                question: "要高效获取以上信息，最合适的途径是？",
                hint: "💡 思考：有什么工具可以自动监测？",
                answer: "online",
                explanation: "✅ 网络监测\n\n📌 选择理由：\n社交媒体动态、用户口碑需要持续监测，用专业工具可以实时追踪，比人工搜索高效得多。\n\n❌ 为什么不是其他：\n- 公开渠道：需要手动搜索，效率低\n- 实地调研：这是线上数据，不需要去现场\n- 第三方渠道：不需要花大钱找机构\n- 内部信息源：这是竞品的外网数据"
            },
            {
                caseName: "👥 客户反馈收集",
                caseText: "你想了解已有客户对竞品D公司的评价，以及他们为什么选择竞品而不是你们。\n\n【已知条件】\n- 想知道客户怎么看竞品\n- 想知道客户为什么流失\n- 想知道客户真正关心什么\n\n【可选途径】\n- 可以查看公开的用户评价\n- 直接找客户访谈问卷\n- 委托市场调研公司",
                question: "要获取以上信息，最合适的途径是？",
                hint: "💡 思考：谁最了解客户的想法？",
                answer: "field",
                explanation: "✅ 实地调研（用户访谈/问卷调查）\n\n📌 选择理由：\n客户对竞品的真实评价、选择原因，这些敏感信息需要通过直接访谈或问卷来获取。\n\n❌ 为什么不是其他：\n- 公开渠道：公开评价可能不真实或有偏见\n- 网络监测：只能监测网上言论，无法深入了解\n- 第三方渠道：可以但贵，自己做更直接\n- 内部信息源：这是获取客户反馈的方式，但问题是关于竞品"
            },
            {
                caseName: "📈 销售数据分析",
                caseText: "老板让你分析自己公司近一年的销售数据，了解哪些产品卖得好、客户复购率如何。\n\n【已知条件】\n- 需要自己公司的销售记录\n- 想知道客户的购买行为\n- 想知道哪些产品是爆款\n\n【可选途径】\n- 可以在公司系统查看销售数据\n- 可以去门店实地观察\n- 可以搜索行业报告对比",
                question: "要获取以上信息，最合适的途径是？",
                hint: "💡 思考：销售数据在哪里？",
                answer: "internal",
                explanation: "✅ 内部信息源\n\n📌 选择理由：\n销售数据、客户购买行为这些都是公司内部数据，应该从自家系统获取。\n\n❌ 为什么不是其他：\n- 公开渠道：销售数据是内部机密\n- 实地调研：不需要去现场看\n- 网络监测：这是内部数据不是网上信息\n- 第三方渠道：不需要花冤枉钱"
            },
            {
                caseName: "🔍 竞品技术专利",
                caseText: "你想了解竞品E公司的技术实力、研发方向、专利布局。\n\n【已知条件】\n- 想知道他们有什么技术优势\n- 想知道他们研发投入大不大\n- 想知道他们未来可能出什么产品\n\n【可选途径】\n- 可以搜索他们的专利申请\n- 可以去参加他们的产品发布会\n- 可以委托专业机构调查",
                question: "要获取以上信息，最合适的途径是？",
                hint: "💡 思考：技术专利信息在哪里查？",
                answer: "public",
                explanation: "✅ 公开渠道\n\n📌 选择理由：\n专利信息可以通过国家知识产权局官网公开查询，产品发布会也是公开信息。\n\n❌ 为什么不是其他：\n- 实地调研：不适合了解技术层面的信息\n- 第三方渠道：专利信息是公开的，不需要花钱\n- 网络监测：更适合持续监测，不适合查历史专利\n- 内部信息源：这是竞品的信息"
            },
            {
                caseName: "🏆 竞品展会动态",
                caseText: "你想了解竞品F公司最近参加了哪些行业展会，有什么新产品发布。\n\n【已知条件】\n- 想知道他们参加了什么展会\n- 想知道他们展示了什么新产品\n- 想知道行业趋势\n\n【可选途径】\n- 可以搜索展会新闻报道\n- 可以去现场参加展会\n- 可以让咨询公司提供报告",
                question: "要获取以上信息，最合适的途径是？",
                hint: "💡 思考：参加展会能一次获得多少信息？",
                answer: "third",
                explanation: "✅ 第三方渠道（展会研讨）\n\n📌 选择理由：\n参加行业展会可以一次性了解行业趋势、竞品动态、新技术，是非常高效的信息获取方式。\n\n❌ 为什么不是其他：\n- 公开渠道：只能看到二手信息，不够一手\n- 实地调研：如果是本公司参展可以，否则只是去看展\n- 网络监测：无法了解现场实物和氛围\n- 内部信息源：这是竞品和行业的信息"
            }
        ];
        
        // 游戏状态
        window.caseOrder = [];
        window.currentIndex = 0;
        window.score = 0;
        window.rightCount = 0;
        window.wrongCount = 0;
        window.currentOptions = [];
        
        // DOM元素
        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        
        // 打乱数组
        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        // 生成选项
        function generateOptions(correctType) {
            let options = [];
            const correct = dataMethods.find(o => o.type === correctType);
            options.push({ type: correct.type, text: correct.text, desc: correct.desc, correct: true });
            const wrongTypes = dataMethods.filter(o => o.type !== correctType);
            shuffle(wrongTypes).forEach(o => {
                options.push({ type: o.type, text: o.text, desc: o.desc, correct: false });
            });
            return shuffle(options);
        }
        
        // 开始游戏
        function startGame() {
            window.caseOrder = shuffle([...Array(window.allCases.length).keys()]);
            window.currentIndex = 0;
            window.score = 0;
            window.rightCount = 0;
            window.wrongCount = 0;
            
            startScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            resultScreen.style.display = 'none';
            
            showCase();
        }
        
        // 显示题目
        function showCase() {
            const q = window.allCases[window.caseOrder[window.currentIndex]];
            
            for (let i = 1; i <= 8; i++) {
                const step = document.getElementById('step' + i);
                step.className = 'step';
                if (i - 1 < window.currentIndex) step.className = 'step completed';
                if (i - 1 === window.currentIndex) step.className = 'step active';
            }
            
            document.getElementById('phase-tag').textContent = '任务' + (window.currentIndex + 1);
            document.getElementById('knowledge-tag').textContent = '数据收集';
            document.getElementById('scenario-title').textContent = q.caseName;
            document.getElementById('scenario-text').innerHTML = q.caseText.replace(/\n/g, '<br>');
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('think-text').textContent = q.hint;
            
            document.getElementById('explanation').classList.remove('show');
            document.getElementById('score').textContent = window.score;
            
            window.currentOptions = generateOptions(q.answer);
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            window.currentOptions.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.innerHTML = `<div style="font-size:1.1em;margin-bottom:5px;">${opt.text}</div><div style="font-size:0.7em;opacity:0.7;">${opt.desc}</div>`;
                btn.onclick = function() { selectAnswer(index); };
                optionsContainer.appendChild(btn);
            });
        }
        
        // 选择答案
        function selectAnswer(index) {
            const q = window.allCases[window.caseOrder[window.currentIndex]];
            const options = document.querySelectorAll('.option');
            
            if (window.currentOptions[index].correct) {
                options.forEach((opt, i) => {
                    opt.classList.add('disabled');
                    if (window.currentOptions[i].correct) opt.classList.add('correct');
                });
                window.rightCount++;
                window.score += 12;
                document.getElementById('score').textContent = window.score;
                
                document.getElementById('explanation-title').textContent = '✅ 回答正确！';
                document.getElementById('explanation-text').innerHTML = q.explanation.replace(/\n/g, '<br>');
                document.getElementById('explanation').classList.add('show');
                
                const optionsContainer = document.getElementById('options');
                const nextBtn = document.createElement('div');
                nextBtn.className = 'option';
                nextBtn.style.cssText = 'background: linear-gradient(135deg, #667eea, #764ba2); border-color: #667eea; color: #fff; text-align: center; font-weight: bold; margin-top: 15px; grid-column: span 2;';
                nextBtn.textContent = '➡️ 下一任务';
                nextBtn.onclick = function(e) {
                    e.stopPropagation();
                    nextCase();
                };
                optionsContainer.appendChild(nextBtn);
            } else {
                options[index].classList.add('wrong');
                
                const optionsContainer = document.getElementById('options');
                const retryBtn = document.createElement('div');
                retryBtn.className = 'option';
                retryBtn.style.cssText = 'background: linear-gradient(135deg, #ff9800, #ff5722); border-color: #ff9800; color: #fff; text-align: center; font-weight: bold; margin-top: 10px; grid-column: span 2;';
                retryBtn.textContent = '🔄 再试一次';
                
                options.forEach(opt => {
                    if (opt !== retryBtn) opt.classList.add('disabled');
                });
                
                retryBtn.onclick = function(e) {
                    e.stopPropagation();
                    retryBtn.remove();
                    document.querySelectorAll('.option').forEach(opt => {
                        opt.classList.remove('disabled', 'wrong', 'correct');
                    });
                };
                optionsContainer.appendChild(retryBtn);
            }
        }
        
        // 下一题
        function nextCase() {
            window.currentIndex++;
            if (window.currentIndex >= window.allCases.length) {
                showResult();
            } else {
                showCase();
            }
        }
        
        // 显示结果
        function showResult() {
            gameScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            
            document.getElementById('final-score').textContent = window.score;
            document.getElementById('stat-right').textContent = window.rightCount;
            document.getElementById('stat-wrong').textContent = window.wrongCount;
            document.getElementById('stat-score').textContent = window.score;
            
            let title, msg;
            if(window.score >= 80) {
                title = "🏆 顶级侦探！";
                msg = "你对数据收集途径了如指掌！是情报收集的高手！";
            } else if(window.score >= 50) {
                title = "⭐ 资深侦探";
                msg = "你对数据收集途径有较好理解，继续加油！";
            } else {
                title = "📚 实习侦探";
                msg = "数据收集的学问很深奥！建议再学习理论知识！";
            }
            
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-msg').textContent = msg;
        }
        
        // 重新开始
        function restartGame() {
            resultScreen.style.display = 'none';
            startScreen.style.display = 'block';
        }
    </script>
</body>
</html>
