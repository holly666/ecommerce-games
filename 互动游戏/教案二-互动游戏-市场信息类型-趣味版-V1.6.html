<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧋 奶茶店老板模拟器</title>
<script>
var gameData = {stage: 0, score: 0, info: {industry:false, customer:false, competitor:false, product:false}};
var industryQuiz = [
 {q:"你看到街上现在最火的奶茶店门口都排长队，你觉得主要原因是？", options:["A. 价格便宜","B. 口味新奇/颜值高","C. 开了很多年","D. 请了很多明星代言"], a:"B", explain:"越新奇越好看的越火！这就是行业趋势~"},
 {q:"你打算把店开在美食街，政府说这里不能做餐饮，这时候应该？", options:["A. 偷偷开","B. 换个地方","C. 找关系搞定","D. 投诉政府"], a:"B", explain:"要遵守政策规定，换个合法位置！"},
 {q:"你听说现在奶茶店越开越多，很多人都在问还能不能开，你应该？", options:["A. 放弃不开了","B. 继续开但要有特色","C. 借钱多开几家","D. 管他呢先开再说"], a:"B", explain:"市场有竞争是正常的，关键要有差异化！"}
];
var customerQuiz = [
 {q:"你观察了一周，来买奶茶的顾客主要是？", options:["A. 大爷大妈","B. 年轻小姐姐/小哥哥","C. 中年男士","D. 带孩子的家长"], a:"B", explain:"年轻人是奶茶的主力消费群体！"},
 {q:"你发现顾客点单时最常说的是？", options:["A. 最便宜的是哪款","B. 哪个最拍照好看","C. 量最大的","D. 最健康的"], a:"B", explain:"年轻人最在意颜值！"},
 {q:"下午3点和晚上8点店里人最多，这两个时间段是？", options:["A. 早上和中午","B. 下午和晚上","C. 中午和下午","D. 晚上和深夜"], a:"B", explain:"这是消费高峰时段！"}
];
var competitorQuiz = [
 {q:"隔壁奶茶店生意很好，你偷偷观察发现他们最大的优势是？", options:["A. 价格最便宜","B. 口味特别/品种多","C. 位置更好","D. 装修最豪华"], a:"B", explain:"口味和品种是核心竞争力！"},
 {q:"对面那家店价格卖很贵但还有人买，你觉得原因是？", options:["A. 位置好","B. 品牌有名/装修好看","C. 味道好","D. 服务态度好"], a:"B", explain:"品牌和颜值可以支撑高价！"},
 {q:"你发现某竞店被顾客投诉服务态度差，你可以？", options:["A. 也降低价格","B. 强调自己的服务态度","C. 跟着态度差","D. 不管它"], a:"B", explain:"抓住对手的弱点，突出自己的优势！"}
];
var productQuiz = [
 {q:"你打算主推一款新产品，你觉得下面哪个更容易爆火？", options:["A. 原味珍珠奶茶","B. 芝士莓莓/多肉葡萄","C. 经典奶茶","D. 纯茶"], a:"B", explain:"水果茶颜值高、好拍照，最容易火！"},
 {q:"你发现顾客很在意包装，你该怎么做？", options:["A. 用普通塑料杯","B. 用好看的渐变色杯/联名杯","C. 用纸杯更环保","D. 不管包装"], a:"B", explain:"颜值即正义！好看的杯子顾客愿意拍照分享！"},
 {q:"有顾客说上次买的奶茶太甜了，你应该？", options:["A. 不管","B. 推出半糖/三分糖选项","C. 说这是标准口味","D. 降价"], a:"B", explain:"根据顾客反馈调整产品！"}
];
var currentQuiz = [];
var quizIndex = 0;
var collected = {industry:0, customer:0, competitor:0, product:0};

function startGame(){
 document.getElementById('page1').style.display='none';
 document.getElementById('page2').style.display='block';
 gameData.stage=1;
 collected={industry:0,customer:0,competitor:0,product:0};
 renderGame();
}

function renderGame(){
 var html='';
 var progress = ((gameData.stage-1)/4)*100;
 document.getElementById('progressBar').style.width=progress+'%';
 document.getElementById('stageNum').innerText=gameData.stage;
 document.getElementById('scoreDisplay').innerText=gameData.score;
 
 var stageNames = ['📈 行业趋势','👤 消费群体','🏪 竞争对手','🧋 商品信息'];
 var stageStatus = [collected.industry,collected.customer,collected.competitor,collected.product];
 var infoStatus = '<div class="info-row">';
 for(var i=0;i<4;i++){
  var done = stageStatus[i]>=3;
  infoStatus += '<div class="info-item '+(done?'done':'')+'">'+(i+1)+'. '+stageNames[i]+' <span>'+(done?'✓':'('+stageStatus[i]+'/3)')+'</span></div>';
 }
 infoStatus += '</div>';
 document.getElementById('infoPanel').innerHTML=infoStatus;
 
 if(gameData.stage===1){
  currentQuiz=industryQuiz;quizIndex=0;
  html=renderStage(1,'📈 行业趋势调研','你计划开一家奶茶店，先要了解行业发展趋势！',industryQuiz,collected.industry);
 }else if(gameData.stage===2){
  currentQuiz=customerQuiz;quizIndex=0;
  html=renderStage(2,'👤 目标消费群体调研','了解了行业，现在要研究谁会来买你的奶茶！',customerQuiz,collected.customer);
 }else if(gameData.stage===3){
  currentQuiz=competitorQuiz;quizIndex=0;
  html=renderStage(3,'🏪 竞争对手调研','周边有几家奶茶店，了解他们的策略才能脱颖而出！',competitorQuiz,collected.competitor);
 }else if(gameData.stage===4){
  currentQuiz=productQuiz;quizIndex=0;
  html=renderStage(4,'🧋 商品信息调研','最后要确定你的产品定位，什么口味、包装最受欢迎？',productQuiz,collected.product);
 }else if(gameData.stage===5){
  html=renderDecision();
 }else if(gameData.stage===6){
  html=renderResult();
 }
 document.getElementById('gameContent').innerHTML=html;
}

function renderStage(num,title,story,quiz,progress){
 var q = quiz[progress];
 var html = '<div class="stage-icon">'+['📈','👤','🏪','🧋'][num-1]+'</div>'+
  '<div class="stage-title">'+title+'</div>'+
  '<div class="stage-desc">'+story+'</div>'+
  '<div class="stage-progress">收集进度：'+progress+' / 3</div>'+
  '<div class="question-box">'+
  '<div class="q-num">第 '+(progress+1)+' 题</div>'+
  '<div class="q-text">'+q.q+'</div>'+
  '<div class="opts">';
 q.options.forEach(function(o,i){
  var lt=String.fromCharCode(65+i);
  html+='<div class="opt" onclick="answer(\''+lt+'\')">'+o+'</div>';
 });
 html+='</div></div>';
 return html;
}

function answer(sel){
 var q = currentQuiz[quizIndex];
 if(sel===q.a){
  gameData.score+=10;
  if(gameData.stage===1)collected.industry++;
  if(gameData.stage===2)collected.customer++;
  if(gameData.stage===3)collected.competitor++;
  if(gameData.stage===4)collected.product++;
  
  alert('✅ 正确！ +10分\n💡 '+q.explain);
  
  var currentCollected = 0;
  if(gameData.stage===1)currentCollected=collected.industry;
  if(gameData.stage===2)currentCollected=collected.customer;
  if(gameData.stage===3)currentCollected=collected.competitor;
  if(gameData.stage===4)currentCollected=collected.product;
  
  if(currentCollected>=3){
   gameData.stage++;
   renderGame();
  }else{
   quizIndex++;
   renderGame();
  }
 }else{
  alert('❌ 不对哦，再想想~');
 }
}

function renderDecision(){
 var allDone = collected.industry>=3 && collected.customer>=3 && collected.competitor>=3 && collected.product>=3;
 var bonus = allDone ? '<div class="bonus-box">🎁 完成全部信息收集任务，奖励50分！</div>' : '';
 return '<div class="result-icon">🎯</div>'+
  '<div class="result-title">最终决策</div>'+
  '<div class="result-desc">恭喜！你已收集完所有市场信息。现在请做出你的开店决策：</div>'+bonus+
  '<div class="decision-options">'+
  '<div class="decision-card" onclick="finalChoice(1)">'+
  '<div class="d-icon">💰</div><div class="d-title">经济实惠型</div><div class="d-desc">定价10-15元，主打性价比</div>'+
  '</div>'+
  '<div class="decision-card" onclick="finalChoice(2)">'+
  '<div class="d-icon">⭐</div><div class="d-title">中高端网红店</div><div class="d-desc">定价18-25元，主打颜值口味</div>'+
  '</div>'+
  '<div class="decision-card" onclick="finalChoice(3)">'+
  '<div class="d-icon">🏆</div><div class="d-title">高端精品店</div><div class="d-desc">定价30元+，主打健康高端</div>'+
  '</div>'+
  '</div>';
}

function finalChoice(choice){
 var bonus = (collected.industry>=3 && collected.customer>=3 && collected.competitor>=3 && collected.product>=3) ? 50 : 0;
 gameData.score += bonus;
 gameData.stage=6;
 renderGame();
}

function renderResult(){
 var finalScore = gameData.score;
 var rank = '', desc = '';
 if(finalScore>=170){rank='🏆 市场洞察大师';desc='你真的懂市场！开店肯定火！';}
 else if(finalScore>=130){rank='📈 奶茶店小能手';desc='基本都懂了，开店应该没问题~';}
 else if(finalScore>=80){rank='🧋 入门创业者';desc='还需要多学习市场信息知识哦~';}
 else{rank='💪 需要更多学习';desc='先把四大市场信息类型搞清楚吧！';}
 
 return '<div class="final-icon">🧋</div>'+
  '<div class="final-score">'+finalScore+'</div>'+
  '<div class="final-rank">'+rank+'</div>'+
  '<div class="final-desc">'+desc+'</div>'+
  '<div class="summary-box">'+
  '<div class="s-title">📊 信息收集情况</div>'+
  '<div class="s-item '+(collected.industry>=3?'ok':'')+'">📈 行业趋势 '+(collected.industry>=3?'✓ 已收集':'✗ 未完成')+'</div>'+
  '<div class="s-item '+(collected.customer>=3?'ok':'')+'">👤 消费群体 '+(collected.customer>=3?'✓ 已收集':'✗ 未完成')+'</div>'+
  '<div class="s-item '+(collected.competitor>=3?'ok':'')+'">🏪 竞争对手 '+(collected.competitor>=3?'✓ 已收集':'✗ 未完成')+'</div>'+
  '<div class="s-item '+(collected.product>=3?'ok':'')+'">🧋 商品信息 '+(collected.product>=3?'✓ 已收集':'✗ 未完成')+'</div>'+
  '</div>'+
  '<button class="restart-btn" onclick="restartGame()">🔁 再玩一次</button>';
}

function restartGame(){
 gameData={stage:0,score:0,info:{industry:false,customer:false,competitor:false,product:false}};
 collected={industry:0,customer:0,competitor:0,product:0};
 document.getElementById('page2').style.display='none';
 document.getElementById('page3').style.display='none';
 document.getElementById('page1').style.display='flex';
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC','Helvetica Neue',sans-serif;background:#0f0f23;min-height:100vh;color:#fff}
.page{display:none}
.page.active{display:flex}

/* 首页海报风格 */
#page1{flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:40px;text-align:center;
 background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);position:relative;overflow:hidden}
#page1::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,200,100,0.1) 0%,transparent 50%);animation:rotate 20s linear infinite}
@keyframes rotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.poster{background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));backdrop-filter:blur(10px);border-radius:30px;padding:50px 40px;border:1px solid rgba(255,255,255,0.2);box-shadow:0 20px 60px rgba(0,0,0,0.5);position:relative;z-index:1;max-width:420px}
.poster h1{font-size:42px;margin-bottom:10px;background:linear-gradient(135deg,#ffd700,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.poster .subtitle{font-size:20px;color:rgba(255,255,255,0.8);margin-bottom:30px}
.poster .desc{font-size:15px;color:rgba(255,255,255,0.6);line-height:1.8;margin-bottom:35px}
.poster .tasks{display:flex;justify-content:center;gap:15px;margin-bottom:35px}
.poster .task{background:rgba(255,255,255,0.1);padding:10px 18px;border-radius:20px;font-size:13px}
.start-btn{background:linear-gradient(135deg,#ffd700,#ff6b6b);color:#000;border:none;padding:18px 60px;border-radius:50px;font-size:18px;font-weight:bold;cursor:pointer;box-shadow:0 10px 30px rgba(255,107,107,0.4);transition:transform 0.3s}
.start-btn:hover{transform:scale(1.05)}

/* 游戏页 */
#page2{padding:20px;min-height:100vh;background:linear-gradient(180deg,#1a1a2e 0%,#16213e 100%)}
.top-bar{background:rgba(255,255,255,0.1);padding:15px 20px;border-radius:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.progress{width:120px;height:10px;background:rgba(255,255,255,0.2);border-radius:5px}
.progress-bar{height:100%;background:linear-gradient(90deg,#ffd700,#ff6b6b);width:0%;border-radius:5px;transition:width 0.5s}
.score{font-size:18px;font-weight:bold;color:#ffd700}
.info-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:20px}
.info-item{background:rgba(255,255,255,0.1);padding:8px 15px;border-radius:20px;font-size:13px;flex:1;text-align:center;min-width:80px}
.info-item.done{background:linear-gradient(135deg,#ffd700,#ff6b6b);color:#000}
.info-item span{opacity:0.7;margin-left:5px}
.game-content{text-align:center}
.stage-icon{font-size:60px;margin-bottom:10px}
.stage-title{font-size:28px;font-weight:bold;margin-bottom:10px;color:#ffd700}
.stage-desc{font-size:15px;opacity:0.8;margin-bottom:15px;padding:15px;background:rgba(255,255,255,0.05);border-radius:12px}
.stage-progress{color:#ff6b6b;font-size:14px;margin-bottom:25px}
.question-box{background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));border-radius:20px;padding:30px;border:1px solid rgba(255,255,255,0.1)}
.q-num{color:#ffd700;font-size:14px;margin-bottom:15px}
.q-text{font-size:18px;margin-bottom:25px;line-height:1.6}
.opts{display:flex;flex-direction:column;gap:12px}
.opt{padding:16px;background:rgba(255,255,255,0.1);border-radius:12px;cursor:pointer;text-align:left;font-size:15px;transition:all 0.3s;border:1px solid transparent}
.opt:hover{background:rgba(255,215,0,0.2);border-color:#ffd700;transform:translateX(5px)}

/* 决策页 */
.decision-options{display:flex;flex-direction:column;gap:15px;margin-top:30px}
.decision-card{background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));border-radius:16px;padding:20px;text-align:left;cursor:pointer;transition:all 0.3s;border:1px solid rgba(255,255,255,0.1)}
.decision-card:hover{transform:scale(1.02);border-color:#ffd700}
.d-icon{font-size:30px;margin-bottom:10px}
.d-title{font-size:18px;font-weight:bold;color:#ffd700;margin-bottom:5px}
.d-desc{font-size:14px;opacity:0.7}
.bonus-box{background:linear-gradient(135deg,#ffd700,#ff6b6b);color:#000;padding:15px;border-radius:12px;font-weight:bold;margin:20px 0}

/* 结果页 */
#page3{min-height:100vh;padding:40px 20px;background:linear-gradient(135deg,#1a1a2e,#16213e);text-align:center}
.final-icon{font-size:80px;margin-bottom:20px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.final-score{font-size:72px;font-weight:bold;background:linear-gradient(135deg,#ffd700,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.final-rank{font-size:28px;color:#ffd700;margin:15px 0}
.final-desc{font-size:16px;opacity:0.8;margin-bottom:30px}
.summary-box{background:rgba(255,255,255,0.1);border-radius:16px;padding:20px;margin:20px 0;text-align:left}
.s-title{font-size:16px;margin-bottom:15px;color:#ffd700}
.s-item{padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.1);font-size:14px}
.s-item:last-child{border:none}
.s-item.ok{color:#4ade80}
.restart-btn{background:linear-gradient(135deg,#ffd700,#ff6b6b);color:#000;border:none;padding:15px 40px;border-radius:50px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:20px}

.result-icon{font-size:60px}
.result-title{font-size:32px;font-weight:bold;color:#ffd700;margin-bottom:15px}
.result-desc{font-size:15px;opacity:0.8;margin-bottom:20px}
</style>
</head>
<body>
<div class="page" id="page1" style="display:flex">
<div class="poster">
<h1>🧋 奶茶店老板</h1>
<p class="subtitle">市场信息收集挑战</p>
<p class="desc">
你需要收集4种市场信息才能做出正确的开店决策：<br>
📈 行业趋势 → 👤 消费群体 → 🏪 竞争对手 → 🧋 商品信息<br><br>
每关3道现实问题，全部答对才算收集完成！
</p>
<div class="tasks">
<span class="task">📈</span>
<span class="task">👤</span>
<span class="task">🏪</span>
<span class="task">🧋</span>
</div>
<button id="startBtn" class="start-btn" onclick="startGame()">开始创业</button>
</div>
</div>

<div class="page" id="page2">
<div class="top-bar">
<div>第 <span id="stageNum">1</span> / 4 关</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div>得分: <span id="scoreDisplay">0</span></div>
</div>
<div id="infoPanel"></div>
<div class="game-content" id="gameContent"></div>
</div>

<div class="page" id="page3"></div>
</body>
</html>
