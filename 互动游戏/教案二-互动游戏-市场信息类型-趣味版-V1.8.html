<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧋 奶茶店老板模拟器</title>
<script>
var gameData = {stage: 0, score: 0};

// 行业趋势信息：行业发展趋势、市场热点、行业政策、竞争格局、新兴技术
var industryQuiz = [
 {q:"奶茶行业近三年市场规模持续增长20%，这属于？", options:["A. 行业发展趋势","B. 市场热点","C. 行业政策","D. 新兴技术"], a:"A"},
 {q:"现在年轻消费者最追捧"国潮风"奶茶，这属于？", options:["A. 行业发展趋势","B. 市场热点","C. 竞争格局","D. 新兴技术"], a:"B"},
 {q:"政府出台新规要求奶茶店公示食品安全信息，这属于？", options:["A. 行业发展趋势","B. 市场热点","C. 行业政策","D. 竞争格局"}, a:"C"},
 {q:"某品牌引入AI智能制茶设备，这属于？", options:["A. 行业发展趋势","B. 竞争格局","C. 行业政策","D. 新兴技术"], a:"D"}
];

// 目标消费群体信息：基本信息、需求偏好、购买行为、消费习惯
var customerQuiz = [
 {q:"你的奶茶店主要顾客年龄在18-30岁，这属于？", options:["A. 基本信息","B. 需求偏好","C. 购买行为","D. 消费习惯"], a:"A"},
 {q:"顾客偏好低糖、健康的奶茶饮品，这属于？", options:["A. 基本信息","B. 需求偏好","C. 购买行为","D. 消费习惯"], a:"B"},
 {q:"顾客通常在下午3-5点下单最多，这属于？", options:["A. 基本信息","B. 需求偏好","C. 购买行为","D. 消费习惯"], a:"C"},
 {q:"很多顾客每周固定下单两次，形成习惯，这属于？", options:["A. 基本信息","B. 需求偏好","C. 购买行为","D. 消费习惯"], a:"D"}
];

// 竞争对手信息：市场份额、竞争优劣势、营销策略、用户评价
var competitorQuiz = [
 {q:"某奶茶品牌占据当地30%的市场份额，这属于？", options:["A. 市场份额","B. 竞争优劣势","C. 营销策略","D. 用户评价"], a:"A"},
 {q:"某竞店产品口味独特但价格偏贵，这属于？", options:["A. 市场份额","B. 竞争优劣势","C. 营销策略","D. 用户评价"], a:"B"},
 {q:"某竞店经常推出"第二杯半价"活动，这属于？", options:["A. 市场份额","B. 竞争优劣势","C. 营销策略","D. 用户评价"], a:"C"},
 {q:"大众点评上某竞店评分只有3星，这属于？", options:["A. 市场份额","B. 竞争优劣势","C. 营销策略","D. 用户评价"], a:"D"}
];

// 商品信息：功能、质量、包装、售后服务
var productQuiz = [
 {q:"奶茶具有解渴、提神的功能，这属于？", options:["A. 商品功能","B. 商品质量","C. 包装设计","D. 售后服务"], a:"A"},
 {q:"奶茶使用新鲜牛奶和茶叶，不添加香精，这属于？", options:["A. 商品功能","B. 商品质量","C. 包装设计","D. 售后服务"], a:"B"},
 {q:"采用渐变色杯身和联名IP包装，这属于？", options:["A. 商品功能","B. 商品质量","C. 包装设计","D. 售后服务"], a:"C"},
 {q:"提供免费加小料和30分钟送达服务，这属于？", options:["A. 商品功能","B. 商品质量","C. 包装设计","D. 售后服务"], a:"D"}
];

var currentQuiz = [], quizIndex = 0;
var collected = {industry:0, customer:0, competitor:0, product:0};

function startGame(){
 document.getElementById('page1').style.display='none';
 document.getElementById('page2').style.display='block';
 gameData.stage=1;
 collected={industry:0,customer:0,competitor:0,product:0};
 renderGame();
}

function renderGame(){
 var progress = ((gameData.stage-1)/4)*100;
 document.getElementById('progressBar').style.width=progress+'%';
 document.getElementById('stageNum').innerText=gameData.stage;
 document.getElementById('scoreDisplay').innerText=gameData.score;
 
 var stageNames = ['📈 行业趋势信息','👤 目标消费群体信息','🏪 竞争对手信息','🧋 商品信息'];
 var subNames = ['行业发展趋势/市场热点/行业政策/竞争格局/新兴技术','基本信息/需求偏好/购买行为/消费习惯','市场份额/竞争优劣势/营销策略/用户评价','功能/质量/包装/售后服务'];
 var stageStatus = [collected.industry,collected.customer,collected.competitor,collected.product];
 var infoStatus = '<div class="info-row">';
 for(var i=0;i<4;i++){
  var done = stageStatus[i]>=4;
  infoStatus += '<div class="info-item '+(done?'done':'')+'">'+(i+1)+'. '+stageNames[i].split(' ')[0]+' <span>'+(done?'✓':'('+stageStatus[i]+'/4)')+'</span></div>';
 }
 infoStatus += '</div>';
 document.getElementById('infoPanel').innerHTML=infoStatus;
 
 var html = '';
 if(gameData.stage===1){
  currentQuiz=industryQuiz;quizIndex=0;
  html=renderStage(1,stageNames[0],subNames[0],industryQuiz,collected.industry);
 }else if(gameData.stage===2){
  currentQuiz=customerQuiz;quizIndex=0;
  html=renderStage(2,stageNames[1],subNames[1],customerQuiz,collected.customer);
 }else if(gameData.stage===3){
  currentQuiz=competitorQuiz;quizIndex=0;
  html=renderStage(3,stageNames[2],subNames[2],competitorQuiz,collected.competitor);
 }else if(gameData.stage===4){
  currentQuiz=productQuiz;quizIndex=0;
  html=renderStage(4,stageNames[3],subNames[3],productQuiz,collected.product);
 }else if(gameData.stage===5){
  html=renderDecision();
 }else if(gameData.stage===6){
  html=renderResult();
 }
 document.getElementById('gameContent').innerHTML=html;
}

function renderStage(num,title,subtitle,quiz,progress){
 var q = quiz[progress];
 var answers = {A:"行业发展趋势",B:"市场热点",C:"行业政策",D:"竞争格局",E:"新兴技术",F:"基本信息",G:"需求偏好",H:"购买行为",I:"消费习惯",J:"市场份额",K:"竞争优劣势",L:"营销策略",M:"用户评价",N:"商品功能",O:"商品质量",P:"包装设计",Q:"售后服务"};
 var exp = answers[q.a] || '';
 return '<div class="stage-icon">'+['📈','👤','🏪','🧋'][num-1]+'</div>'+
  '<div class="stage-title">'+title+'</div>'+
  '<div class="stage-sub">包含：'+subtitle+'</div>'+
  '<div class="stage-progress">收集进度：'+progress+' / 4</div>'+
  '<div class="question-box">'+
  '<div class="q-text">'+q.q+'</div>'+
  '<div class="opts">';
 q.options.forEach(function(o,i){
  var lt=String.fromCharCode(65+i);
  html+='<div class="opt" onclick="answer(\''+lt+'\')">'+o+'</div>';
 });
 html+='</div></div>';
}

function answer(sel){
 var q = currentQuiz[quizIndex];
 if(sel===q.a){
  gameData.score+=10;
  if(gameData.stage===1)collected.industry++;
  if(gameData.stage===2)collected.customer++;
  if(gameData.stage===3)collected.competitor++;
  if(gameData.stage===4)collected.product++;
  alert('✅ 正确！ +10分');
  var currentCollected = [collected.industry,collected.customer,collected.competitor,collected.product][gameData.stage-1];
  if(currentCollected>=4){gameData.stage++;renderGame();}
  else{quizIndex++;renderGame();}
 }else{alert('❌ 不对哦，再想想~');}
}

function renderDecision(){
 var allDone = collected.industry>=4 && collected.customer>=4 && collected.competitor>=4 && collected.product>=4;
 var bonus = allDone ? '<div class="bonus-box">🎁 收集全部信息，奖励50分！</div>' : '';
 return '<div class="result-icon">🎯</div><div class="result-title">最终决策</div>'+
  '<div class="result-desc">请选择你的开店定位：</div>'+bonus+
  '<div class="decision-options">'+
  '<div class="decision-card" onclick="finalChoice(1)"><div class="d-icon">💰</div><div class="d-title">经济实惠型</div></div>'+
  '<div class="decision-card" onclick="finalChoice(2)"><div class="d-icon">⭐</div><div class="d-title">中高端网红店</div></div>'+
  '<div class="decision-card" onclick="finalChoice(3)"><div class="d-icon">🏆</div><div class="d-title">高端精品店</div></div>'+
  '</div>';
}

function finalChoice(choice){
 var bonus = (collected.industry>=4 && collected.customer>=4 && collected.competitor>=4 && collected.product>=4) ? 50 : 0;
 gameData.score += bonus;
 gameData.stage=6;renderGame();
}

function renderResult(){
 var s = gameData.score;
 var rank = s>=200?'🏆 市场洞察大师':s>=150?'📈 奶茶店小能手':s>=100?'🧋 入门创业者':'💪 加油学习';
 var desc = s>=200?'你真的懂市场！':s>=150?'基本都懂了~':s>=100?'多复习知识点！':'先把四大类型搞清楚！';
 return '<div class="final-icon">🧋</div><div class="final-score">'+s+'</div><div class="final-rank">'+rank+'</div><div class="final-desc">'+desc+'</div>'+
  '<div class="summary-box">'+
  '<div class="s-item '+(collected.industry>=4?'ok':'')+'">📈 行业趋势信息 '+(collected.industry>=4?'✓':'✗')+'</div>'+
  '<div class="s-item '+(collected.customer>=4?'ok':'')+'">👤 目标消费群体信息 '+(collected.customer>=4?'✓':'✗')+'</div>'+
  '<div class="s-item '+(collected.competitor>=4?'ok':'')+'">🏪 竞争对手信息 '+(collected.competitor>=4?'✓':'✗')+'</div>'+
  '<div class="s-item '+(collected.product>=4?'ok':'')+'">🧋 商品信息 '+(collected.product>=4?'✓':'✗')+'</div>'+
  '</div><button class="restart-btn" onclick="restartGame()">🔁 再玩一次</button>';
}

function restartGame(){
 gameData={stage:0,score:0};collected={industry:0,customer:0,competitor:0,product:0};
 document.getElementById('page2').style.display='none';document.getElementById('page3').style.display='none';
 document.getElementById('page1').style.display='flex';
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'PingFang SC',sans-serif;background:#0f0f23;color:#fff}
.page{display:none}
#page1{flex-direction:column;justify-content:center;align-items:center;min-height:100vh;padding:40px;background:linear-gradient(135deg,#1a1a2e,#16213e);position:relative}
#page1::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,200,100,0.1) 0%,transparent 50%);animation:rotate 20s linear infinite}
@keyframes rotate{transform:rotate(0deg)}
.poster{background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));backdrop-filter:blur(10px);border-radius:30px;padding:40px;border:1px solid rgba(255,255,255,0.2);max-width:420px;position:relative;z-index:1}
.poster h1{font-size:38px;margin-bottom:8px;background:linear-gradient(135deg,#ffd700,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.poster .subtitle{font-size:18px;color:rgba(255,255,255,0.8);margin-bottom:25px}
.knowledge{text-align:left;margin-bottom:25px;background:rgba(255,255,255,0.05);padding:15px;border-radius:10px}
.knowledge .k-title{font-size:14px;color:#ffd700;margin-bottom:10px}
.knowledge .k-item{font-size:12px;color:rgba(255,255,255,0.7);padding:4px 0}
.start-btn{background:linear-gradient(135deg,#ffd700,#ff6b6b);color:#000;border:none;padding:16px 50px;border-radius:50px;font-size:16px;font-weight:bold;cursor:pointer;box-shadow:0 10px 30px rgba(255,107,107,0.4)}
#page2{padding:20px;min-height:100vh;background:linear-gradient(180deg,#1a1a2e,#16213e)}
.top-bar{background:rgba(255,255,255,0.1);padding:15px 20px;border-radius:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.progress{width:120px;height:10px;background:rgba(255,255,255,0.2);border-radius:5px}
.progress-bar{height:100%;background:linear-gradient(90deg,#ffd700,#ff6b6b);width:0%;border-radius:5px}
.score{font-size:18px;font-weight:bold;color:#ffd700}
.info-row{display:flex;gap:8px;margin-bottom:20px}
.info-item{background:rgba(255,255,255,0.1);padding:8px 10px;border-radius:20px;font-size:11px;flex:1;text-align:center}
.info-item.done{background:linear-gradient(135deg,#ffd700,#ff6b6b);color:#000}
.stage-icon{font-size:50px;margin-bottom:10px}
.stage-title{font-size:24px;font-weight:bold;color:#ffd700;margin-bottom:5px}
.stage-sub{font-size:12px;opacity:0.7;margin-bottom:15px;padding:10px;background:rgba(255,255,255,0.05);border-radius:8px}
.stage-progress{color:#ff6b6b;font-size:13px;margin-bottom:20px}
.question-box{background:linear-gradient(145deg,rgba(255,255,255,0.1),rgba(255,255,255,0.05));border-radius:20px;padding:25px}
.q-text{font-size:16px;margin-bottom:20px;line-height:1.6}
.opts{display:flex;flex-direction:column;gap:10px}
.opt{padding:14px;background:rgba(255,255,255,0.08);border-radius:10px;cursor:pointer;text-align:left;font-size:14px;transition:all 0.3s;border:1px solid transparent}
.opt:hover{background:rgba(255,215,0,0.15);border-color:#ffd700}
.decision-options{display:flex;flex-direction:column;gap:12px;margin-top:25px}
.decision-card{background:linear-gradient(145deg,rgba(255,255,255,0.08),rgba(255,255,255,0.03));border-radius:14px;padding:16px;cursor:pointer;display:flex;align-items:center;gap:15px;transition:all 0.3s;border:1px solid rgba(255,255,255,0.1)}
.decision-card:hover{border-color:#ffd700}
.d-icon{font-size:24px}
.d-title{font-size:16px;font-weight:bold;color:#ffd700}
.bonus-box{background:linear-gradient(135deg,#ffd700,#ff6b6b);color:#000;padding:12px;border-radius:10px;font-weight:bold;margin:15px 0;font-size:14px}
#page3{min-height:100vh;padding:40px 20px;background:linear-gradient(135deg,#1a1a2e,#16213e);text-align:center}
.final-icon{font-size:60px;margin-bottom:15px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.final-score{font-size:60px;font-weight:bold;background:linear-gradient(135deg,#ffd700,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.final-rank{font-size:22px;color:#ffd700;margin:10px 0}
.final-desc{font-size:14px;opacity:0.8;margin-bottom:25px}
.summary-box{background:rgba(255,255,255,0.08);border-radius:14px;padding:16px;margin:15px 0;text-align:left}
.s-item{padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.1);font-size:12px}
.s-item:last-child{border:none}
.s-item.ok{color:#4ade80}
.restart-btn{background:linear-gradient(135deg,#ffd700,#ff6b6b);color:#000;border:none;padding:14px 35px;border-radius:50px;font-size:14px;font-weight:bold;cursor:pointer;margin-top:15px}
.result-icon{font-size:45px}
.result-title{font-size:26px;font-weight:bold;color:#ffd700;margin-bottom:10px}
.result-desc{font-size:13px;opacity:0.8}
</style>
</head>
<body>
<div class="page" id="page1" style="display:flex">
<div class="poster">
<h1>🧋 奶茶店老板</h1>
<p class="subtitle">市场信息收集挑战</p>
<div class="knowledge">
<div class="k-title">📚 知识点回顾</div>
<div class="k-item">📈 行业趋势信息：行业发展趋势、市场热点、行业政策、竞争格局、新兴技术</div>
<div class="k-item">👤 目标消费群体信息：基本信息、需求偏好、购买行为、消费习惯</div>
<div class="k-item">🏪 竞争对手信息：市场份额、竞争优劣势、营销策略、用户评价</div>
<div class="k-item">🧋 商品信息：商品功能、商品质量、包装设计、售后服务</div>
</div>
<button id="startBtn" class="start-btn" onclick="startGame()">开始挑战</button>
</div>
</div>
<div class="page" id="page2">
<div class="top-bar">
<div>第 <span id="stageNum">1</span> / 4 关</div>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div>得分: <span id="scoreDisplay">0</span></div>
</div>
<div id="infoPanel"></div>
<div class="game-content" id="gameContent"></div>
</div>
<div class="page" id="page3"></div>
</body>
</html>
