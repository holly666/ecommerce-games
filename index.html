<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商小游戏合集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        .header h1 {
            font-size: 3em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }
        .game-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            text-align: center;
        }
        .game-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .game-icon {
            font-size: 4em;
            margin-bottom: 15px;
        }
        .game-name {
            font-size: 1.4em;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        .game-desc {
            font-size: 1em;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎮 电商小游戏合集</h1>
            <p>选择你想玩的游戏</p>
        </div>
        
        <div class="games-grid">
            <a href="market-game.html" class="game-card">
                <div class="game-icon">🏪</div>
                <div class="game-name">市场情报官</div>
                <div class="game-desc">店铺生死战 - 市场信息处理流程</div>
            </a>
            <a href="tool-difference-game.html" class="game-card">
                <div class="game-icon">🔧</div>
                <div class="game-name">工具选择大冒险</div>
                <div class="game-desc">市场信息获取工具</div>
            </a>
            <a href="competitor-analysis-game.html" class="game-card">
                <div class="game-icon">🎯</div>
                <div class="game-name">竞店分析大师</div>
                <div class="game-desc">商业洞察力挑战</div>
            </a>
            <a href="detective-game.html" class="game-card">
                <div class="game-icon">🔍</div>
                <div class="game-name">商业侦探事务所</div>
                <div class="game-desc">竞店悬案 · 剧本杀探案版</div>
            </a>
            <a href="weekly-menu-game.html" class="game-card">
                <div class="game-icon">🍽️</div>
                <div class="game-name">一周菜谱规划师</div>
                <div class="game-desc">孕期健康饮食挑战</div>
            </a>
        </div>
    </div>
</body>
</html>
