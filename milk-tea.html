<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商小游戏合集</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .game-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .game-icon {
            font-size: 3em;
            margin-bottom: 10px;
        }
        .game-name {
            font-size: 1.2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .game-desc {
            font-size: 0.9em;
            color: #666;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .stat-card .label {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 5px;
        }
        .stat-card .value {
            color: #333;
            font-size: 1.8em;
            font-weight: bold;
        }
        .money { color: #f39c12 !important; }
        .day { color: #3498db !important; }
        .rep { color: #e74c3c !important; }
        
        .game-area {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .menu-item {
            background: linear-gradient(145deg, #f8f9fa, #e9ecef);
            border: 2px solid #dee2e6;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .menu-item:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            border-color: #667eea;
        }
        .menu-item .name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .menu-item .price {
            color: #f39c12;
            font-weight: bold;
        }
        
        .action-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .action-btn:hover {
            transform: scale(1.02);
        }
        
        .log {
            margin-top: 25px;
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .log h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .log-item {
            padding: 5px 0;
            border-bottom: 1px solid #eee;
            color: #666;
            font-size: 0.9em;
        }
        .log-item:last-child {
            border-bottom: none;
        }
        
        .customer-area {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 10px;
            text-align: center;
        }
        .customer-area .emoji {
            font-size: 3em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1🧋奶茶店模拟器</h1>
            <p>今天也是努力卖奶茶的一天！</p>
        </div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="label">💰 当前资金</div>
                <div class="value money">¥<span id="money">100</span></div>
            </div>
            <div class="stat-card">
                <div class="label">📅 营业天数</div>
                <div class="value day"><span id="day">1</span></div>
            </div>
            <div class="stat-card">
                <div class="label">⭐ 口碑</div>
                <div class="value rep"><span id="reputation">5</span></div>
            </div>
        </div>
        
        <div class="game-area">
            <h2>📋 菜单</h2>
            <div class="menu">
                <div class="menu-item" onclick="makeOrder('原味奶茶', 12)">
                    <div class="name">原味奶茶</div>
                    <div class="price">¥12</div>
                </div>
                <div class="menu-item" onclick="makeOrder('珍珠奶茶', 15)">
                    <div class="name">珍珠奶茶</div>
                    <div class="price">¥15</div>
                </div>
                <div class="menu-item" onclick="makeOrder('芝士奶盖', 18)">
                    <div class="name">芝士奶盖</div>
                    <div class="price">¥18</div>
                </div>
                <div class="menu-item" onclick="makeOrder('水果茶', 20)">
                    <div class="name">水果茶</div>
                    <div class="price">¥20</div>
                </div>
            </div>
            
            <button class="action-btn" onclick="nextDay()">🌙 打烊 / 下一天</button>
            
            <div class="customer-area">
                <div class="emoji" id="customer">👩‍🦰</div>
                <div id="customerText">等待客人点单...</div>
            </div>
            
            <div class="log">
                <h3>📝 今日流水</h3>
                <div id="logContent">
                    <div class="log-item">欢迎来到奶茶店！点击菜单开始营业~</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        let money = 100;
        let day = 1;
        let reputation = 5;
        let todayEarnings = 0;
        
        const customers = ['👩‍🦰', '👨‍🦱', '👴', '🧑‍🦳', '👧', '🧑‍🎓', '👨‍💼', '👩‍🏫'];
        const responses = [
            '真好喝！再来一杯！',
            '一般般吧...',
            '老板，再来一杯珍珠奶茶！',
            '有点甜了...',
            '完美！',
            '下次带朋友来~'
        ];
        
        function makeOrder(drink, price) {
            const customer = customers[Math.floor(Math.random() * customers.length)];
            const response = responses[Math.floor(Math.random() * responses.length)];
            
            const tip = Math.random() > 0.7 ? Math.floor(Math.random() * 5) : 0;
            const total = price + tip;
            
            money += total;
            todayEarnings += total;
            
            // 口碑变化
            const repChange = Math.random() > 0.5 ? 1 : -1;
            reputation = Math.max(1, Math.min(10, reputation + repChange));
            
            document.getElementById('customer').textContent = customer;
            document.getElementById('customerText').textContent = response;
            
            addLog(`卖出 ${drink}，收入 ¥${total}${tip > 0 ? ` (小费¥${tip})` : ''}`);
            updateStats();
        }
        
        function nextDay() {
            day++;
            todayEarnings = 0;
            
            // 每天随机事件
            const event = Math.random();
            if (event < 0.2) {
                const cost = 50;
                money -= cost;
                addLog(`📢 店铺宣传，花费 ¥${cost}`);
            } else if (event < 0.4) {
                const bonus = 30;
                money += bonus;
                addLog(`🎁 今日生意兴隆，奖励 ¥${bonus}！`);
            }
            
            document.getElementById('customer').textContent = '😴';
            document.getElementById('customerText').textContent = '打烊了，明天请早~';
            
            updateStats();
            addLog(`----- 第 ${day} 天开始 -----`);
        }
        
        function addLog(text) {
            const log = document.getElementById('logContent');
            const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
            log.insertAdjacentHTML('afterbegin', `<div class="log-item">${time} ${text}</div>`);
        }
        
        function updateStats() {
            document.getElementById('money').textContent = money;
            document.getElementById('day').textContent = day;
            document.getElementById('reputation').textContent = reputation;
        }
    </script>
</body>
</html>
