<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商业侦探事务所 - 竞店悬案</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        #start-screen { text-align: center; padding: 40px 20px; }
        .title { font-size: 2.8em; color: #00d9ff; text-shadow: 0 0 30px rgba(0,217,255,0.5); margin-bottom: 10px; }
        .subtitle { font-size: 1.2em; color: #aaa; margin-bottom: 30px; }
        .start-btn { background: linear-gradient(135deg, #00d9ff, #00ff88); color: #1a1a2e; border: none; padding: 18px 50px; font-size: 1.3em; border-radius: 50px; cursor: pointer; transition: all 0.3s; font-weight: bold; box-shadow: 0 5px 20px rgba(0,217,255,0.4); }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(0,217,255,0.6); }
        
        .story-box { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 15px; margin: 20px 0; border: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .story-title { color: #00d9ff; font-size: 1.1em; margin-bottom: 15px; font-weight: bold; }
        .story-text { line-height: 1.8; color: #ccc; }
        
        .tip-box { background: rgba(255,215,0,0.1); padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid rgba(255,215,0,0.3); text-align: left; }
        .tip-title { color: #ffd700; font-weight: bold; margin-bottom: 8px; }
        .tip-text { font-size: 0.9em; color: #aaa; line-height: 1.6; }
        
        #game-screen { display: none; }
        .progress-bar { display: flex; justify-content: space-between; margin-bottom: 30px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 15px; flex-wrap: wrap; gap: 10px; }
        .step { display: flex; align-items: center; gap: 8px; font-size: 0.8em; color: #666; }
        .step.active { color: #00d9ff; font-weight: bold; }
        .step.completed { color: #00ff88; }
        .step-num { width: 24px; height: 24px; border-radius: 50%; background: #333; display: flex; align-items: center; justify-content: center; font-size: 0.75em; }
        .step.active .step-num { background: #00d9ff; color: #1a1a2e; }
        .step.completed .step-num { background: #00ff88; color: #1a1a2e; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 10px; }
        .score { font-size: 1.4em; color: #ffd700; font-weight: bold; }
        .phase-tag { background: linear-gradient(135deg, #00d9ff, #00ff88); padding: 8px 20px; border-radius: 20px; font-size: 0.85em; color: #1a1a2e; font-weight: bold; }
        
        .question-box { background: #fff; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
        .knowledge-tag { display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 6px 15px; border-radius: 15px; font-size: 0.75em; margin-bottom: 15px; }
        
        .scenario { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; padding: 20px; border-radius: 12px; margin-bottom: 18px; text-align: left; }
        .scenario-title { font-size: 1.05em; font-weight: bold; margin-bottom: 10px; }
        
        .question-text { font-size: 1.05em; line-height: 1.7; color: #333; margin-bottom: 15px; font-weight: 500; }
        
        .think-box { background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 15px; color: #856404; border-left: 4px solid #ffc107; text-align: left; font-size: 0.9em; }
        .think-title { font-weight: bold; margin-bottom: 8px; }
        
        .options { display: grid; gap: 12px; }
        .option { background: #f8f9fa; border: 2px solid #e9ecef; padding: 16px; border-radius: 12px; cursor: pointer; transition: all 0.3s; text-align: left; font-size: 0.95em; color: #333; }
        .option:hover { border-color: #00d9ff; background: #f0ffff; transform: translateX(5px); }
        .option.correct { background: linear-gradient(135deg, #00ff88, #00d9ff); border-color: #00ff88; color: #1a1a2e; }
        .option.wrong { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); border-color: #ff6b6b; color: #fff; }
        .option.disabled { pointer-events: none; opacity: 0.7; }
        
        .explanation { background: #e8f5e9; padding: 18px; border-radius: 12px; margin-top: 18px; display: none; color: #2e7d32; border-left: 4px solid #4caf50; text-align: left; }
        .explanation.show { display: block; animation: fadeIn 0.3s; }
        .explanation-title { font-weight: bold; margin-bottom: 10px; }
        .explain-btn { background: #667eea; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9em; margin-right: 10px; }
        .explain-btn:hover { background: #5a6fd6; }
        .agency-btn { background: #764ba2; color: #fff; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 0.9em; }
        .agency-btn:hover { background: #6a4190; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        #result-screen { display: none; text-align: center; padding: 40px 20px; }
        .result-title { font-size: 2.5em; margin-bottom: 20px; }
        .final-score { font-size: 4em; color: #ffd700; margin: 20px 0; text-shadow: 0 0 30px rgba(255,215,0,0.5); }
        .result-msg { font-size: 1.25em; color: #aaa; margin-bottom: 30px; line-height: 1.6; }
        
        .stats { display: flex; justify-content: center; gap: 25px; margin: 30px 0; flex-wrap: wrap; }
        .stat { background: rgba(255,255,255,0.05); padding: 18px 25px; border-radius: 15px; }
        .stat-value { font-size: 1.6em; color: #00d9ff; font-weight: bold; }
        .stat-label { font-size: 0.8em; color: #888; margin-top: 5px; }
        
        .restart-btn { background: linear-gradient(135deg, #00d9ff, #00ff88); color: #1a1a2e; border: none; padding: 16px 45px; font-size: 1.2em; border-radius: 50px; cursor: pointer; font-weight: bold; }
        
        .agency-tip { background: linear-gradient(135deg, #667eea, #764ba2); padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; }
        .agency-tip-title { color: #fff; font-weight: bold; margin-bottom: 8px; font-size: 0.9em; }
        .agency-tip-text { color: rgba(255,255,255,0.8); font-size: 0.8em; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-screen">
            <h1 class="title">🎯 竞店分析大师</h1>
            <p class="subtitle">商业侦探经验挑战</p>
            <button class="start-btn" onclick="startGame()">开始挑战</button>
            <div class="story-box">
                <div class="story-title">📖 故事背景</div>
                <p class="story-text">你是一家电商公司的市场总监。公司要在激烈的市场竞争中脱颖而出，你需要准确识别各类竞争对手，制定正确的竞争策略。</p>
                <p style="margin-top:15px;">AI时代，真正的能力不是记住概念，而是 <strong>能够准确判断，分析原因、承担责任</strong>！</p>
            </div>
            <div class="tip-box">
                <div class="tip-title">💡 学习目标</div>
                <p class="tip-text">
                    1. 理解竞店的分类维度<br>
                    2. 能够准确判断竞争关系类型<br>
                    3. 学会分析竞争策略背后的逻辑<br>
                    4. 培养商业侦探经验和判断力
                </p>
            </div>
        </div>
        
        <div id="game-screen">
            <div class="progress-bar">
                <div class="step active" id="step1"><span class="step-num">1</span></div>
                <div class="step" id="step2"><span class="step-num">2</span></div>
                <div class="step" id="step3"><span class="step-num">3</span></div>
                <div class="step" id="step4"><span class="step-num">4</span></div>
                <div class="step" id="step5"><span class="step-num">5</span></div>
                <div class="step" id="step6"><span class="step-num">6</span></div>
                <div class="step" id="step7"><span class="step-num">7</span></div>
                <div class="step" id="step8"><span class="step-num">8</span></div>
            </div>
            <div class="header">
                <div class="phase-tag" id="phase-tag">案件</div>
                <div class="score">🏆 侦探经验: <span id="score">0</span></div>
            </div>
            <div class="question-box">
                <span class="knowledge-tag" id="knowledge-tag">知识点</span>
                <div class="scenario" id="scenario-box">
                    <div class="scenario-title" id="scenario-title"></div>
                    <p id="scenario-text"></p>
                </div>
                <p class="question-text" id="question-text"></p>
                
                <div class="think-box" id="think-box">
                    <div class="think-title">🤔 思考提示</div>
                    <p id="think-text"></p>
                </div>
                
                <div class="explanation" id="explanation">
                    <div class="explanation-title">🎯 答案解析</div>
                    <p id="explanation-text"></p>
                    
                    <div class="agency-tip" id="agency-tip" style="display:none;">
                        <div class="agency-tip-title">🌟 Agency思考</div>
                        <p class="agency-tip-text" id="agency-tip-text"></p>
                    </div>
                </div>
            </div>
            <div class="options" id="options"></div>
        </div>
        
        <div id="result-screen">
            <h1 class="result-title" id="result-title">🎉 挑战完成!</h1>
            <div class="final-score"><span id="final-score">0</span></div>
            <p class="result-msg" id="result-msg"></p>
            <div class="stats">
                <div class="stat"><div class="stat-value" id="stat-right">0</div><div class="stat-label">答对</div></div>
                <div class="stat"><div class="stat-value" id="stat-wrong">0</div><div class="stat-label">答错</div></div>
                <div class="stat"><div class="stat-value" id="stat-score">0</div><div class="stat-label">侦探经验</div></div>
            </div>
            <button class="restart-btn" onclick="restartGame()">再闯一次</button>
        </div>
    </div>

    <script>
        // 四个选项类型
        const typeOptions = [
            { type: "direct", text: "直接竞店" },
            { type: "indirect", text: "间接竞店" },
            { type: "substitute", text: "替代品竞店" },
            { type: "potential", text: "潜在竞店" }
        ];
        
        // 打乱数组
        function shuffle(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        // 生成题目选项（随机顺序）
        function generateOptions(correctType) {
            let options = [];
            
            // 正确答案
            const correct = typeOptions.find(o => o.type === correctType);
            options.push({ type: correct.type, text: correct.text, correct: true });
            
            // 三个错误选项
            const wrongTypes = typeOptions.filter(o => o.type !== correctType);
            shuffle(wrongTypes).forEach(o => {
                options.push({ type: o.type, text: o.text, correct: false });
            });
            
            // 打乱选项顺序
            shuffle(options);
            
            return options;
        }
        
        const allCases = [
    {caseName:"🛒 运动鞋店的神秘对手",caseText:"报案人：在淘宝卖运动鞋的老王\n\n案情：老王发现隔壁店铺也在卖运动鞋，两家店卖的产品一模一样，连模特图都差不多。老王的店月销1000双，对手月销800双，两家店的价格战打得火热。",question:"根据线索，这位神秘对手属于哪种类型的竞争对手？",hint:"🕵️ 侦探提示：看看两家的商品、客群，价格是否高度相似？是否在抢同一批顾客？",answer:"direct",explanation:"🔴 【直接竞店】\n\n证据确凿！两家的商品完全相同（运动鞋）、目标客群相同（淘宝运动鞋买家）、价格战激烈——这就是直接竞店的典型特征！在同一市场直接争夺份额。"},
    {caseName:"🧋 奶茶店的新邻居",caseText:"报案人：开奶茶店的小李\n\n案情：隔壁新开了一家奶茶店，虽然都是卖奶茶，但小李主打15元平价款，新店主打25元高端款。小李的顾客是学生，新店的顾客是白领。",question:"根据线索，这位新邻居属于哪种类型的竞争对手？",hint:"🕵️ 侦探提示：同样是奶茶，但价格定位和目标客群有什么不同？",answer:"indirect",explanation:"🟡 【间接竞店】\n\n真相大白！虽然都是奶茶，但价格定位不同（平价vs高端）、目标客群不同（学生vs白领）——这是间接竞争，满足的是不同细分市场的需求。"},
    {caseName:"✏️ 文具店的跨界杀手",caseText:"报案人：文具店张老板\n\n案情：现在很多人不买笔和本子了，直接用iPad做笔记。什么Notion、印象笔记app火得不行，店里营业额直线下降。",question:"根据线索，这些跨界杀手属于哪种类型的竞争对手？",hint:"🕵️ 侦探提示：文具和App看起来不一样，但满足的是不是同一个需求？",answer:"substitute",explanation:"🟠 【替代品竞店】\n\n破案了！文具和App形态完全不同，但都能满足记录这个核心需求。这就是替代品竞争——不同形式满足相同需求，随时可能取代对方！"},
    {caseName:"🚗 4S店的未来危机",caseText:"报案人：传统4S店王总\n\n案情：现在新能源车太火了，特斯拉、比亚迪、蔚来满大街跑。大家都说燃油车要完蛋了。王总感觉自己要失业了。",question:"根据线索，这些新能源车企属于哪种类型的竞争对手？",hint:"🕵️ 侦探提示：都是车，但技术路线完全不同。这是什么类型的竞争？",answer:"substitute",explanation:"🟠 【替代品竞店】\n\n经典案例！传统燃油车和新能源车都满足出行需求，但技术方案完全不同。电动化趋势可能完全颠覆传统车企——这就是替代品竞争的可怕之处！"},
    {caseName:"👗 女装店的汉服邻居",caseText:"报案人：职场女装店刘姐\n\n案情：隔壁开了家汉服店，虽然都是卖衣服，但刘姐卖的是职场正装，汉服店卖的是传统服饰。刘姐的顾客是上班白领，汉服店的顾客是大学生和汉服爱好者。",question:"根据线索，这位汉服邻居属于哪种类型的竞争对手？",hint:"🕵️ 侦探提示：同样都是卖衣服，但风格、客群定位有什么差异？",answer:"indirect",explanation:"🟡 【间接竞店】\n\n漂亮！虽然同属服装行业，但职场正装和汉服的目标客群完全不同，一个服务白领，一个服务汉服爱好者——这是典型的间接竞争！"},
    {caseName:"🏫 培训机构的跨界阴谋",caseText:"报案人：在线编程培训公司CEO老陈\n\n案情：某知名传统教育机构在全国有1000多家线下门店，最近听说他们在研发在线课程，但还没有上线，老陈寝食难安。",question:"根据线索，这家传统机构目前属于哪种类型的竞争对手？",hint:"🕵️ 侦探提示：他们现在上线了吗？未来可能成为你的对手吗？",answer:"potential",explanation:"⚫ 【潜在竞店】\n\n侦破！他们虽然还没在线课程，但有这个实力和计划——这就是潜在竞店！现在不构成威胁，但未来可能成为强劲对手！"},
    {caseName:"🏭 互联网巨头的野心",caseText:"报案人：美妆电商小张\n\n案情：某大型互联网平台还没有做美妆业务，但他们用户量巨大，技术超强。业内人士都在猜测他们会不会进军美妆。",question:"根据线索，这个巨头目前属于哪种类型的竞争对手？",hint:"🕵️ 侦探提示：他们现在做美妆吗？有没有可能随时进入？",answer:"potential",explanation:"⚫ 【潜在竞店】\n\n危险信号！虽然还没进入美妆领域，但具备入局能力——这就是潜在竞店！这种看不见的对手往往最具威胁性！"},
    {caseName:"🍜 川菜馆的健康威胁",caseText:"报案人：川菜馆老板老孙\n\n案情：商圈里开了家轻食沙拉店，老孙的川菜店主打重口味、麻辣，轻食店主打健康、低脂。两家店位置差不多，但卖的东西完全不一样。",question:"根据线索，这家轻食店属于哪种类型的竞争对手？",hint:"🕵️ 侦探提示：同样是吃饭，但两家满足的是同一种需求吗？",answer:"indirect",explanation:"🟡 【间接竞店】\n\n精彩！川菜满足口味刺激需求，轻食满足健康饮食需求——虽然都在餐饮行业，但满足的是不同层次的马斯洛需求！"}
];
        
        let caseOrder = [];
        let currentIndex = 0, score = 0, rightCount = 0, wrongCount = 0;
        let currentOptions = [];
        
        function startGame() {
            // 打乱题目顺序
            caseOrder = shuffle([...Array(allCases.length).keys()]);
            currentIndex = 0;
            score = 0;
            rightCount = 0;
            wrongCount = 0;
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            showCase();
        }
        
        function showCase() {
            const q = allCases[caseOrder[currentIndex]];
            
            // 更新进度
            for(let i=1;i<=8;i++) {
                const step = document.getElementById('step'+i);
                step.className = 'step';
                if(i-1 < currentIndex) step.className = 'step completed';
                if(i-1 === currentIndex) step.className = 'step active';
            }
            
            document.getElementById('phase-tag').textContent = '案件';
            document.getElementById('knowledge-tag').textContent = '竞店类型判断';
            document.getElementById('scenario-title').textContent = q.caseName;
            document.getElementById('scenario-text').textContent = q.caseText;
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('think-text').textContent = q.hint;
            
            // 重置解释框
            document.getElementById('explanation').classList.remove('show');
            document.getElementById('agency-tip').style.display = 'none';
            
            // 生成随机选项
            currentOptions = generateOptions(q.answer);
            
            // 生成选项
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            currentOptions.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = String.fromCharCode(65 + index) + ". " + opt.text;
                btn.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }
        
        function selectAnswer(index, isRetry = false) {
            const q = allCases[caseOrder[currentIndex]];
            const options = document.querySelectorAll('.option');
            
            // 判断对错
            if (currentOptions[index].correct) {
                // 答对了
                options.forEach((opt, i) => {
                    opt.classList.add('disabled');
                    if (currentOptions[i].correct) opt.classList.add('correct');
                });
                rightCount++;
                score += 12;
                document.getElementById('score').textContent = score;
                
                // 显示解释
                document.getElementById('explanation-text').textContent = q.explanation;
                const agencyTip = document.getElementById('agency-tip');
                document.getElementById('agency-tip-text').textContent = q.agencyTip;
                agencyTip.style.display = 'block';
                document.getElementById('explanation').classList.add('show');
                
                // 3秒后进入下一题
                setTimeout(() => { nextCase(); }, 3000);
            } else {
                // 答错了
                options[index].classList.add('wrong');
                
                // 添加重试按钮
                const optionsContainer = document.getElementById('options');
                const retryBtn = document.createElement('div');
                retryBtn.id = 'retry-btn';
                retryBtn.className = 'option';
                retryBtn.style.cssText = 'background: linear-gradient(135deg, #ff9800, #ffc107); border-color: #ff9800; color: #1a1a2e; text-align: center; font-weight: bold; margin-top: 10px;';
                retryBtn.textContent = '🔄 再试一次';
                retryBtn.onclick = (e) => {
                    e.stopPropagation();
                    // 移除重试按钮和错误样式，重新显示选项
                    retryBtn.remove();
                    options.forEach(opt => {
                        opt.classList.remove('disabled', 'wrong');
                    });
                };
                optionsContainer.appendChild(retryBtn);
            }
        }
        
        function nextCase() {
            currentIndex++;
            if (currentIndex >= allCases.length) {
                showResult();
            } else {
                showCase();
            }
        }
        
        function showResult() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('stat-right').textContent = rightCount;
            document.getElementById('stat-wrong').textContent = wrongCount;
            document.getElementById('stat-score').textContent = score;
            
            let title, msg;
            if(score >= 80) {
                title = "👑 神探!";
                msg = "你完美掌握了竞店分析能力！能准确识别各类竞争对手，这种判断力在AI时代尤为珍贵！";
            } else if(score >= 50) {
                title = "⭐ 优秀分析师!";
                msg = "你对竞店分类有较好理解，但判断还不够精准。多练习分析真实案例！";
            } else {
                title = "💪 潜力无限!";
                msg = "别灰心！竞店分析需要不断练习。建议：1)多关注真实商业案例 2)培养多角度分析习惯";
            }
            
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-msg').textContent = msg;
        }
        
        function restartGame() {
            startGame();
        }
    </script>
</body>
</html>
