<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具选择大挑战 - 市场信息获取工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        #start-screen { text-align: center; padding: 60px 20px; }
        .title { font-size: 3em; background: linear-gradient(45deg, #00d4ff, #7c3aed, #ff6b6b); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 20px; }
        .subtitle { font-size: 1.3em; color: #a0a0a0; margin-bottom: 40px; }
        .start-btn { background: linear-gradient(45deg, #7c3aed, #00d4ff); border: none; padding: 20px 60px; font-size: 1.5em; color: white; border-radius: 50px; cursor: pointer; transition: all 0.3s; box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4); }
        .start-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(124, 58, 237, 0.6); }
        .rules { margin-top: 40px; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; text-align: left; }
        .rules h3 { color: #00d4ff; margin-bottom: 15px; }
        .rules li { margin: 10px 0; color: #ccc; }
        #game-screen { display: none; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: rgba(255,255,255,0.05); border-radius: 15px; margin-bottom: 30px; }
        .score { font-size: 1.5em; color: #ffd700; }
        .question-num { font-size: 1.2em; color: #a0a0a0; }
        .question-box { background: rgba(255,255,255,0.1); border-radius: 20px; padding: 40px; margin-bottom: 30px; text-align: center; border: 2px solid rgba(0, 212, 255, 0.3); }
        .question-text { font-size: 1.3em; line-height: 1.8; margin-bottom: 30px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .option { background: linear-gradient(135deg, #2d2d44, #1a1a2e); border: 2px solid #3d3d5c; padding: 20px; border-radius: 15px; cursor: pointer; transition: all 0.3s; text-align: center; font-size: 1em; }
        .option:hover { border-color: #00d4ff; transform: scale(1.02); background: linear-gradient(135deg, #3d3d5c, #2d2d44); }
        .option.correct { background: linear-gradient(135deg, #10b981, #059669); border-color: #10b981; }
        .option.wrong { background: linear-gradient(135deg, #ef4444, #dc2626); border-color: #ef4444; }
        .option.disabled { pointer-events: none; }
        #result-screen { display: none; text-align: center; padding: 60px 20px; }
        .result-title { font-size: 2.5em; margin-bottom: 20px; }
        .final-score { font-size: 4em; color: #ffd700; margin: 30px 0; }
        .result-msg { font-size: 1.5em; color: #a0a0a0; margin-bottom: 40px; }
        .restart-btn { background: linear-gradient(45deg, #ff6b6b, #feca57); border: none; padding: 18px 50px; font-size: 1.3em; color: white; border-radius: 50px; cursor: pointer; transition: all 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-screen">
            <h1 class="title">🔧 工具选择大挑战</h1>
            <p class="subtitle">市场信息获取工具 · 互动答题</p>
            <button class="start-btn" onclick="startGame()">开始挑战</button>
            <div class="rules">
                <h3>📋 游戏规则</h3>
                <ul>
                    <li>共 <strong>6道题目</strong></li>
                    <li>根据情景选择合适的工具</li>
                    <li>答对 <strong>+10分</strong>，答错 <strong>0分</strong></li>
                    <li>看看你能得多少分？</li>
                </ul>
            </div>
        </div>
        <div id="game-screen">
            <div class="header">
                <div class="question-num">题 <span id="q-num">1</span>/6</div>
                <div class="score">🏆 <span id="score">0</span>分</div>
            </div>
            <div class="question-box">
                <p class="question-text" id="question-text"></p>
            </div>
            <div class="options" id="options"></div>
        </div>
        <div id="result-screen">
            <h1 class="result-title">🎉 挑战完成！</h1>
            <p class="final-score"><span id="final-score">0</span> 分</p>
            <p class="result-msg" id="result-msg"></p>
            <button class="restart-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>
    <script>
        const questions = [
            { question: "📝 你要做一份大学生消费习惯调查，预计收集500份问卷，应该用哪种工具？", options: ["问卷星", "生意参谋", "百度爬虫", "八爪鱼"], answer: 0 },
            { question: "📊 你想分析自己网店的访客来源和转化率，应该用哪种工具？", options: ["问卷星", "生意参谋", "飞瓜数据", "识微商情"], answer: 1 },
            { question: "🔍 你想快速了解'新能源汽车'这个关键词的搜索趋势，应该用哪种工具？", options: ["百度指数", "八爪鱼", "腾讯问卷", "生意参谋"], answer: 0 },
            { question: "🕷️ 你想自动抓取某个网站上的商品价格信息，应该用哪种工具？", options: ["问卷星", "网络爬虫", "识微商情", "飞瓜数据"], answer: 1 },
            { question: "📢 你想监控品牌在社交媒体上的口碑和用户评价，应该用哪种工具？", options: ["百度指数", "八爪鱼", "识微商情", "问卷星"], answer: 2 },
            { question: "🤖 你想用AI快速分析海量市场数据，了解消费者偏好，应该用哪种工具？", options: ["问卷星", "识微商情", "飞瓜数据", "网络爬虫"], answer: 1 }
        ];
        let currentQuestion = 0, score = 0;
        function startGame() { document.getElementById('start-screen').style.display = 'none'; document.getElementById('game-screen').style.display = 'block'; showQuestion(); }
        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('q-num').textContent = currentQuestion + 1;
            document.getElementById('question-text').textContent = q.question;
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            q.options.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(btn);
            });
        }
        function selectAnswer(index) {
            const options = document.querySelectorAll('.option');
            const correctAnswer = questions[currentQuestion].answer;
            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (i === correctAnswer) opt.classList.add('correct');
            });
            if (index === correctAnswer) { score += 10; document.getElementById('score').textContent = score; }
            else options[index].classList.add('wrong');
            setTimeout(nextQuestion, 1500);
        }
        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion >= questions.length) showResult();
            else showQuestion();
        }
        function showResult() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').textContent = score;
            let msg = score === 60 ? "🎯 太厉害了！满分通过！" : score >= 50 ? "⭐ 优秀！" : score >= 40 ? "👍 不错！" : "💪 再接再厉！";
            document.getElementById('result-msg').textContent = msg;
        }
        function restartGame() { currentQuestion = 0; score = 0; document.getElementById('score').textContent = '0'; document.getElementById('result-screen').style.display = 'none'; document.getElementById('game-screen').style.display = 'block'; showQuestion(); }
    </script>
</body>
</html>
