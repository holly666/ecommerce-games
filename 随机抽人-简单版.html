<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>йҡҸжңәжҠҪдәә</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }
        .container { 
            background: white; 
            border-radius: 20px; 
            padding: 40px; 
            text-align: center; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
        }
        .title { font-size: 2em; color: #333; margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 25px; font-size: 0.9em; }
        .number-display { 
            font-size: 8em; 
            font-weight: bold; 
            color: #667eea; 
            margin: 30px 0;
            min-height: 140px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn { 
            background: linear-gradient(135deg, #667eea, #764ba2); 
            color: white; 
            border: none; 
            padding: 18px 50px; 
            font-size: 1.2em; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        
        .settings { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; }
        .settings label { color: #666; font-size: 0.9em; }
        .settings input { width: 60px; padding: 8px; border: 1px solid #ddd; border-radius: 8px; text-align: center; font-size: 1em; margin: 0 5px; }
        
        .history { margin-top: 25px; padding-top: 20px; border-top: 1px solid #eee; }
        .history-title { color: #666; font-size: 0.85em; margin-bottom: 10px; }
        .history-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .history-item { background: #f0f0f0; padding: 5px 12px; border-radius: 15px; font-size: 0.85em; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">рҹҺІ йҡҸжңәжҠҪдәә</h1>
        <p class="subtitle">иҜҫе ӮйҡҸжңәзӮ№еҗҚе·Ҙе…·</p>
        
        <div class="settings">
            <label>еӯҰеҸ·иҢғеӣҙпјҡ</label>
            <input type="number" id="minNum" value="1" min="1">
            <span>~</span>
            <input type="number" id="maxNum" value="43" min="1">
        </div>
        
        <div class="number-display" id="display">?</div>
        
        <button class="btn" id="startBtn" onclick="startжҠҪ()">ејҖе§ӢжҠҪ</button>
        
        <div class="history" id="history" style="display:none;">
            <div class="history-title">е·ІжҠҪеҲ°пјҡ</div>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <script>
        let timer = null;
        let isжҠҪing = false;
        let history = [];
        
        function startжҠҪ() {
            if (isжҠҪing) {
                stopжҠҪ();
                return;
            }
            
            const min = parseInt(document.getElementById('minNum').value);
            const max = parseInt(document.getElementById('maxNum').value);
            
            if (min > max) {
                alert('иө·е§ӢеӯҰеҸ·дёҚиғҪеӨ§дәҺз»“жқҹеӯҰеҸ·пјҒ');
                return;
            }
            
            isжҠҪing = true;
            document.getElementById('startBtn').textContent = 'еҒңжӯў';
            
            let speed = 50;
            timer = setInterval(() => {
                const num = Math.floor(Math.random() * (max - min + 1)) + min;
                document.getElementById('display').textContent = num;
                speed = Math.min(speed * 1.15, 400);
                clearInterval(timer);
                timer = setInterval(arguments.callee, speed);
            }, 50);
        }
        
        function stopжҠҪ() {
            clearInterval(timer);
            isжҠҪing = false;
            
            const min = parseInt(document.getElementById('minNum').value);
            const max = parseInt(document.getElementById('maxNum').value);
            const result = Math.floor(Math.random() * (max - min + 1)) + min;
            
            document.getElementById('display').textContent = result;
            document.getElementById('startBtn').textContent = 'еҶҚжҠҪдёҖж¬Ў';
            
            history.unshift(result);
            if (history.length > 10) history.pop();
            updateHistory();
        }
        
        function updateHistory() {
            const historyDiv = document.getElementById('history');
            const listDiv = document.getElementById('historyList');
            
            if (history.length > 0) {
                historyDiv.style.display = 'block';
                listDiv.innerHTML = history.map(n => `<span class="history-item">${n}еҸ·</span>`).join('');
            }
        }
    </script>
</body>
</html>
