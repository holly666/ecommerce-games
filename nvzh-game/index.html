<!DOCTYPE html><html lang="zh"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>nvzh</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#1a1a2e;color:#e8d5b7;min-height:100vh}#game{max-width:680px;margin:0 auto;padding:20px}#cover{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:92vh;text-align:center}h2{color:#c9a96e;font-size:2.4em;margin-bottom:6px;letter-spacing:8px}.s{color:#a89070;font-size:1.1em;margin-bottom:28px;letter-spacing:4px}.d{color:#7a6a50;font-size:0.88em;max-width:440px;line-height:1.9;margin-bottom:36px}.bgg{background:#c9a96e;color:#1a1a2e;border:none;padding:14px 50px;border-radius:8px;cursor:pointer;font-size:1.05em;font-weight:bold;letter-spacing:4px;transition:background 0.2s}.bgg:hover{background:#e0c080}.sw{background:#16213e;border:1px solid #c9a96e;border-radius:12px;padding:22px;margin-bottom:14px;display:none}.sw.on{display:block}.st{color:#c9a96e;font-size:1.1em;text-align:center;margin-bottom:6px;font-weight:bold;letter-spacing:2px}.ss{color:#7a6a50;font-size:0.8em;text-align:center;margin-bottom:18px}.cg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 0}.cc{background:#0f3460;border:2px solid #3a3a5a;border-radius:10px;padding:14px;cursor:pointer;transition:all 0.2s;text-align:left}.cc:hover{border-color:#c9a96e;transform:translateY(-2px)}.cn{color:#c9a96e;font-size:0.98em;font-weight:bold;margin-bottom:5px}.cd{color:#a89070;font-size:0.8em;line-height:1.5;margin-bottom:5px}.ct{display:flex;flex-wrap:wrap;gap:4px}.ch{background:#1a2a4a;color:#7a9aca;font-size:0.7em;padding:2px 6px;border-radius:3px}.cbtn{display:block;width:100%;background:#4a8a4a;color:#fff;border:none;padding:13px;border-radius:8px;cursor:pointer;font-size:1em;font-weight:bold;letter-spacing:2px;margin-top:14px;transition:background 0.2s}.cbtn:hover{background:#5a9a5a}.cbtn:disabled{background:#3a5a3a;color:#6a7a6a;cursor:not-allowed}.sel{background:#1a2a1a;border:1px solid #4a8a4a;border-radius:6px;padding:10px;margin:8px 0;font-size:0.85em;color:#8aca8a}.nw{background:#0f3460;border:1px solid #c9a96e;border-radius:8px;padding:14px;margin:10px 0}.nl{color:#a89070;font-size:0.8em;display:block;margin-bottom:6px}.ni{width:100%;background:#16213e;border:1px solid #5a4a3a;color:#e8d5b7;padding:10px 12px;border-radius:6px;font-size:1em}.sc{background:#16213e;border:1px solid #c9a96e;border-radius:12px;padding:20px;margin-bottom:14px;display:none}.sc.on{display:block}.sct{color:#c9a96e;font-size:1.0em;font-weight:bold;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}.scd{font-size:0.8em;color:#7a6a50}.sctx{line-height:1.9;color:#d4c4a8;font-size:0.9em;margin-bottom:14px}.sctx p{margin-bottom:10px}.chc{display:block;width:100%;background:#0f3460;border:2px solid #5a4a3a;color:#e8d5b7;padding:12px 14px;margin:6px 0;border-radius:8px;cursor:pointer;text-align:left;font-size:0.9em;line-height:1.5;transition:all 0.18s}.chc:hover{background:#1a4a7a;transform:translateX(3px)}.chc.safe{border-color:#4a8a4a}.chc.safe:hover{background:#1a3a1a}.chc.risky{border-color:#8a3a3a}.chc.risky:hover{background:#3a1a1a}.chc.love{border-color:#8a4a6a}.chc.love:hover{background:#3a1a2a}.chc.smart{border-color:#4a4a8a}.chc.smart:hover{background:#1a1a3a}.tag{display:inline-block;font-size:0.72em;padding:1px 6px;border-radius:3px;margin-right:5px;font-weight:bold}.t-safe{background:#2a4a2a;color:#8aca8a}.t-risky{background:#4a2a2a;color:#ca8a8a}.t-love{background:#4a2a4a;color:#ca8aca}.t-smart{background:#2a2a4a;color:#8a8aca}.sb{background:#16213e;border:1px solid #c9a96e;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:none}.sb.on{display:block}.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}.st2{background:#0f3460;border-radius:6px;padding:5px 6px;text-align:center}.sn{font-size:0.65em;color:#a89070}.sv{font-size:1.0em;color:#c9a96e;font-weight:bold}.aw{display:none;background:#2a1a3e;border:1px solid #9a4a6a;border-radius:6px;padding:7px 12px;text-align:center;margin-top:8px}.aw.on{display:block}.al{color:#c96a8a;font-size:0.75em}.abb{background:#1a0a2e;border-radius:10px;height:6px;margin-top:4px}.abf{background:linear-gradient(90deg,#9a4a6a,#c96a8a);border-radius:10px;height:6px;transition:width 0.5s}.sbar{display:none;text-align:center;margin:10px 0}.sbar.on{display:block}.bs{background:#c9a96e;color:#1a1a2e;border:none;padding:6px 14px;border-radius:5px;cursor:pointer;font-size:0.82em;font-weight:bold;margin:0 3px}.bg2{background:transparent;color:#7a6a50;border:1px solid #3a3a3a;padding:6px 14px;border-radius:5px;cursor:pointer;font-size:0.82em;margin:0 3px}.lw{display:none;background:#0d1b2a;border:1px solid #222;border-radius:8px;padding:8px;margin-top:12px;max-height:110px;overflow-y:auto;font-size:0.75em;color:#6a5a4a;line-height:1.6}.lw.on{display:block}.le{border-bottom:1px solid #1a1a1a;padding:2px 0}.et{background:#3a2a1a;color:#c9a96e;font-size:0.7em;padding:2px 8px;border-radius:4px;margin-bottom:8px;letter-spacing:1px}</style></head><body><div id=game><div id=cover><h2>🏛 女尊世界</h2><div class=s>当 家 主</div><div class=d>女尊王朝，边境小镇。<br>你年过及笄，议得一门亲事。<br>破屋一间，薄田几亩，夫君一名。<br>从寒门到霸主，一切从今日开始。</div><button class=bgg onclick="s1()">开始游戏</button></div><div id=step1 class=sw><div class=st>第一步 · 你的身世</div><div class=ss>你从哪里来？</div><div class=cg id=bg-grid></div><div id=sel-bg></div></div><div id=step2 class=sw><div class=st>第二步 · 你的心性</div><div class=ss>你是什么样的人？</div><div class=cg id=trait-grid></div><div id=sel-trait></div></div><div id=step3 class=sw><div class=st>第三步 · 命名与定亲</div><div id=sel-confirm></div></div><div id=stats-bar class=sb><div class=sg id=stats-grid></div><div class=aw id=aff-wrap><div class=al>💕 夫君好感 <span id=aff-num>50</span>/100</div><div class=abb><div class=abf id=aff-bar style=width:50%></div></div></div></div><div id=scene class=sc><div class=sct><span id=scene-title-text></span><span class=scd id=day-num></span></div><div id=event-tag></div><div class=sctx id=scene-text></div><div id=choices></div></div><div id=sbar class=sbar><button class=bs onclick="saveGame()">💾 存档</button><button class=bs onclick="loadGame()">📂 读档</button><button class=bg2 onclick="if(confirm('确定重开？'))resetGame()">🔄 重开</button></div><div class=lw id=log-wrap><div id=log></div></div></div><script>
var BGS=[{id:"biz",name:"商贾之后",desc:"父亲是镇上布商，家境殷实，自幼耳濡目染商道。",tags:["善经营","人脉广"],init:{money:80,prestige:2}},{id:"scholar",name:"书香门第",desc:"祖上出过几位秀才，虽家道中落，却知书达理。",tags:["智慧高","人脉佳"],init:{money:30,prestige:4,wit:2}},{id:"gentry",name:"官宦人家",desc:"父亲曾是县城小吏，因得罪权贵被贬，但人脉犹在。",tags:["声望高","懂人情"],init:{money:20,prestige:6,social:2}},{id:"poor",name:"寒门出身",desc:"一无所有，白手起家。唯有满腔热血，和一颗不服输的心。",tags:["意志坚","无包袱"],init:{money:5,bravo:2}}];
var TRAITS=[{id:"sharp",name:"精明强干",desc:"心思缜密，算账从不出错，遇事总有办法。",effect:{wit:2},tags:["机敏","果断"]},{id:"warm",name:"温柔贤惠",desc:"待人和气，人缘极好，邻里有难处总愿相帮。",effect:{social:2},tags:["和善","包容"]},{id:"fierce",name:"泼辣直爽",desc:"敢说敢做，嘴巴不饶人，但心里最有数。",effect:{bravo:2},tags:["胆大","豪爽"]},{id:"calm",name:"内敛沉稳",desc:"话不多，但句句在点，旁人不敢小觑。",effect:{prestige:2},tags:["稳重","深沉"]}];
var HUSBANDS=[{id:"scholar",name:"顾长卿",bg:"书香门第",desc:"眉清目秀，谈吐斯文。家中曾有功名，如今家道中落。",traits:["才华","文静"]},{id:"outgoing",name:"柳云舟",bg:"商贾之家",desc:"爱说爱笑，走到哪里都是焦点。没什么心机，但总能让人开心。",traits:["人缘","活泼"]},{id:"quiet",name:"沈墨白",bg:"武勋世家",desc:"话不多，喜怒不形于色。心思细腻，往往能注意到别人忽略的细节。",traits:["细腻","机敏"]},{id:"tsundere",name:"楚灼",bg:"寒门子弟",desc:"嘴硬心软，明明在意却偏要装作不在乎。相处久了会发现意外的温柔。",traits:["傲娇","别扭"]}];
var S={};

function renderStats(){var el=document.getElementById("stats-grid");el.style.display="grid";el.style.gridTemplateColumns="repeat(4,1fr)";el.innerHTML='<div class=st2><div class=sn>💰 银两</div><div class=sv>'+(S.money||0)+'</div></div><div class=st2><div class=sn>⭐ 声望</div><div class=sv>'+(S.prestige||0)+'</div></div><div class=st2><div class=sn>🤝 人脉</div><div class=sv>'+(S.social||0)+'</div></div><div class=st2><div class=sn>📖 智慧</div><div class=sv>'+(S.wit||0)+'</div></div><div class=st2><div class=sn>⚔ 魄力</div><div class=sv>'+(S.bravo||0)+'</div></div><div class=st2><div class=sn>🏷 身份</div><div class=sv>'+(S.cls||'无业')+'</div></div><div class=st2><div class=sn>📅 第</div><div class=sv>'+S.day+'日</div></div>';}
function updateAff(){if(!S.husband)return;var a=Math.round(S.husband.affection||50);document.getElementById("aff-num").textContent=a;document.getElementById("aff-bar").style.width=a+"%";}
function addLog(m){S.log.push(m);var le=document.getElementById("log");var e=document.createElement("div");e.className="le";e.textContent=m;le.appendChild(e);le.scrollTop=le.scrollHeight;while(le.children.length>25)le.removeChild(le.firstChild);}
function saveGame(){localStorage.setItem("nvzh_v4",JSON.stringify(S));addLog("已存档");}
function loadGame(){var d=localStorage.getItem("nvzh_v4");if(d){S=JSON.parse(d);showGame();document.getElementById("aff-wrap").classList.add("on");document.getElementById("sbar").classList.add("on");document.getElementById("log-wrap").classList.add("on");renderStats();updateAff();addLog("读档成功");}else{addLog("无存档");}}
function resetGame(){localStorage.removeItem("nvzh_v4");location.reload();}
function showGame(){document.getElementById("scene").classList.add("on");document.getElementById("stats-bar").style.display="block";}
function showScene(title,text,choices,etag){document.getElementById("scene-title-text").textContent=title;document.getElementById("day-num").textContent="第 "+S.day+" 日";document.getElementById("event-tag").innerHTML=etag?'<span class=et>'+etag+'</span>':'';var t=Array.isArray(text)?text.map(function(p){return'<p>'+p+'</p>';}).join(''):text;document.getElementById("scene-text").innerHTML=t;var h='<div id=cw>';if(choices){choices.forEach(function(c){var tp=c.type||'safe';var tm={safe:'🍚',risky:'⚔',love:'💕',smart:'📖'};var cm={safe:'safe',risky:'risky',love:'love',smart:'smart'};var tcm={safe:'t-safe',risky:'t-risky',love:'t-love',smart:'t-smart'};h+='<button class="chc '+cm[tp]+'" data-next="'+c.next+'" data-type="'+tp+'"><span class="tag '+tcm[tp]+'">'+tm[tp]+'</span> '+c.text+'</button>';});}h+='</div>';document.getElementById("choices").innerHTML=h;var cw=document.getElementById("cw");if(cw){cw.onclick=function(e){var btn=e.target.closest('.chc');if(btn){go(btn.getAttribute("data-next"),btn.getAttribute("data-type"));}}};}
window.s1=function(){document.getElementById("cover").style.display="none";document.getElementById("step1").classList.add("on");var h='';BGS.forEach(function(b,i){h+='<div class=cc data-i='+i+'><div class=cn>'+b.name+'</div><div class=cd>'+b.desc+'</div><div class=ct>';b.tags.forEach(function(t){h+='<span class=ch>'+t+'</span>';});h+='</div></div>';});document.getElementById("bg-grid").innerHTML=h;document.getElementById("bg-grid").onclick=function(e){var card=e.target.closest('.cc');if(card){var idx=parseInt(card.getAttribute("data-i"));window._selBG(idx);}};};
window._selBG=function(i){S.bg=BGS[i];var b=S.bg;if(b.init.money)S.money=b.init.money;if(b.init.prestige)S.prestige=b.init.prestige;if(b.init.social)S.social=b.init.social;if(b.init.wit)S.wit=b.init.wit;if(b.init.bravo)S.bravo=b.init.bravo;document.getElementById("sel-bg").innerHTML='<div class=sel>✓ 已选择：<strong>'+b.name+'</strong> — '+b.desc+'</div><button class=cbtn onclick="s2()">下一步 →</button>';};
window.s2=function(){document.getElementById("step1").classList.remove("on");document.getElementById("step2").classList.add("on");var h='';TRAITS.forEach(function(t,i){h+='<div class=cc data-i='+i+'><div class=cn>'+t.name+'</div><div class=cd>'+t.desc+'</div><div class=ct>';t.tags.forEach(function(tag){h+='<span class=ch>'+tag+'</span>';});h+='</div></div>';});document.getElementById("trait-grid").innerHTML=h;document.getElementById("trait-grid").onclick=function(e){var card=e.target.closest('.cc');if(card){var idx=parseInt(card.getAttribute("data-i"));window._selTrait(idx);}};};
window._selTrait=function(i){S.trait=TRAITS[i];var t=S.trait;if(t.effect.wit)S.wit+=t.effect.wit;if(t.effect.social)S.social+=t.effect.social;if(t.effect.bravo)S.bravo+=t.effect.bravo;if(t.effect.prestige)S.prestige+=t.effect.prestige;document.getElementById("sel-trait").innerHTML='<div class=sel>✓ 已选择：<strong>'+t.name+'</strong> — '+t.desc+'</div><button class=cbtn onclick="s3()">下一步 →</button>';};
window.s3=function(){document.getElementById("step2").classList.remove("on");document.getElementById("step3").classList.add("on");var names=["念卿","锦绣","如玉","秋水","碧落","凝霜","映雪","思柔"];var dn=names[Math.floor(Math.random()*names.length)];var h='<div class=sel>身世：<strong>'+(S.bg?S.bg.name:"?")+'</strong>　心性：<strong>'+(S.trait?S.trait.name:"?")+'</strong></div>';h+='<div class=nw><label class=nl>为自己取个名字</label><input class=ni type=text id=player-name value="'+dn+'" placeholder="输入你的名字…"></div>';h+='<div style="color:#7a6a50;font-size:0.82em;margin:10px 0 4px">夫君候选：</div><div class=cg id=h-grid>';HUSBANDS.forEach(function(hs,i){h+='<div class=cc data-i='+i+'><div class=cn>'+hs.name+'</div><div class=cd>'+hs.desc+'</div><div class=ct><span class=ch>'+hs.bg+'</span></div></div>';});h+='</div><div id=sel-h></div>';document.getElementById("sel-confirm").innerHTML=h;document.getElementById("h-grid").onclick=function(e){var card=e.target.closest('.cc');if(card){var idx=parseInt(card.getAttribute("data-i"));window._selH(idx);}};};
window._selH=function(i){S.husband=HUSBANDS[i];S.husband.affection=50;document.getElementById("sel-h").innerHTML='<div class=sel>✓ 已选择夫君：<strong>'+S.husband.name+'</strong> — '+S.husband.traits.join("、")+'</div><button class=cbtn onclick="startGame()">✓ 确认，进入新婚</button>';};
function initS(){if(!S.log)S.log=[];if(!S.wit)S.wit=0;if(!S.social)S.social=0;if(!S.bravo)S.bravo=0;if(!S.day)S.day=1;if(!S.cls)S.cls="no";if(!S.flags)S.flags={};}window.startGame=function(){initS();var ni=document.getElementById("player-name");S.playerName=(ni&&ni.value.trim())||"念卿";addLog("角色创建："+S.playerName+"（"+(S.bg?S.bg.name:"")+"·"+(S.trait?S.trait.name:"")+"）");addLog("婚配："+S.husband.name);document.getElementById("step3").classList.remove("on");showGame();document.getElementById("stats-bar").style.display="block";document.getElementById("sbar").classList.add("on");document.getElementById("log-wrap").classList.add("on");document.getElementById("aff-wrap").classList.add("on");renderStats();updateAff();introMatchmaker();};

function introMatchmaker(){addLog("🌟 媒婆来访");showScene("议亲",["天刚蒙蒙亮，破旧的小院外便传来一阵敲门声。","媒婆李婶笑盈盈地推门进来，身后跟着几个提着礼盒的妇人。她上下打量着你，眼里闪着精明的光。","「好俊的姑娘！」李婶笑道，「你娘托我说合的亲事，我可费了好大劲。这镇上四户人家，个个人中龙凤——」","她拍了拍手，身后的小厮抬上来四幅画像。"], [{text:"认真听她说每一家的情况",next:"m_detail",type:"smart"},{text:"问李婶哪户人家最有钱有势",next:"m_money",type:"smart"},{text:"催她快点定下婚期，懒得听",next:"m_hasty",type:"fierce"}], "🌟 重点剧情");}
function m_detail(){addLog("详听媒婆介绍");showScene("四户人家",["李婶闻言，眼底闪过一丝赞许，拉过板凳坐下——","「这第一户，顾家，书香门第，祖上出过秀才，如今虽家道中落，但顾家公子生得俊俏，性子也稳重……」","「这第二户，柳家，镇上布商柳老板的独子，家里有钱，人也活络，就是爱玩了些……」","「第三户，沈家，武勋世家，祖上跟过先帝打过仗，沈家公子话不多，但心思细腻……」","「第四户，楚家——」李婶顿了顿，「寒门子弟，孤儿寡弟。模样倒是好的，就是性子有些别扭。」"], [{text:"选顾长卿（书香门第）",next:"m_choose",type:"safe"},{text:"选柳云舟（商贾之家）",next:"m_choose",type:"safe"},{text:"选沈墨白（武勋世家）",next:"m_choose",type:"safe"},{text:"选楚灼（寒门子弟）",next:"m_choose",type:"risky"}], "🌟 重点剧情");}
function m_money(){addLog("询问家境");showScene("四户人家",["李婶会心一笑，压低声音：","「要论家境，柳家最厚，布庄生意遍布三县，柳公子又是独子——啧啧。」","「但若论门第，顾家瘦死骆驼比马大，交往的都是读书人。」","「沈家名头响亮，可不复当年勇了。至于楚家——」她摇摇头，「孤儿寡弟的，能有什么好日子？」","她递上四幅画像，笑眯眯地等你自己挑。"], [{text:"选柳云舟（商贾之家，有钱）",next:"m_choose",type:"safe"},{text:"选顾长卿（书香门第）",next:"m_choose",type:"safe"},{text:"选沈墨白（武勋世家）",next:"m_choose",type:"safe"},{text:"选楚灼（寒门子弟）",next:"m_choose",type:"risky"}], "🌟 重点剧情");}
function m_hasty(){S.bravo+=1;addLog("催促婚期 魄力+1");showScene("四户人家",["你不耐烦地摆摆手。李婶讪讪一笑，也不再多言，直接把四位公子的画像铺在你面前。","「好好好，姑娘爽快！那就让我老李直说了——」","她指着四幅画像，一一报出名号家世，末了补了一句：","「这婚期嘛，女尊王朝，男子及笄便要婚配。姑娘既已年过及笈，亲事——宜早不宜迟。」"], [{text:"选顾长卿（书香门第）",next:"m_choose",type:"safe"},{text:"选柳云舟（商贾之家）",next:"m_choose",type:"safe"},{text:"选沈墨白（武勋世家）",next:"m_choose",type:"safe"},{text:"选楚灼（寒门子弟）",next:"m_choose",type:"risky"}], "🌟 重点剧情");}
function m_choose(){showScene("新婚之夜",["三日后，大婚之日。","红烛摇曳，喜帕之下，你第一次见到他——你的夫君，"+S.husband.name+"。","他微微侧过头，目光与你相触。那一瞬间，你心里对他的第一印象是——"], [{text:"他的眼神让我心安，仿佛找到了依靠",next:"fi_0",type:"love"},{text:"他看起来和镇上其他人不太一样……",next:"fi_1",type:"smart"},{text:"我暂时看不出他的深浅，得慢慢观察",next:"fi_2",type:"smart"}], "🌟 新婚之夜");}

function go_market(){addLog("去集市");var evs=[{tag:"📈 集市动态",title:"集市见闻",text:["你来到集市，今日人声鼎沸。打听之下得知，受边境局势影响，外地布匹运不进来，布价一夜涨了三成。","布商们眉开眼笑，百姓却叫苦连天。你心里盘算着，这或许是个机会……"],choices:[{text:"趁机囤货，低买高卖",next:"ev_market_buy",type:"risky"},{text:"老实买必需品，不凑热闹",next:"ev_market_calm",type:"safe"},{text:"向相熟的布商打听行情",next:"ev_market_info",type:"smart"}]},{tag:"⚠️ 街头冲突",title:"集市遇袭",text:["你在集市挑选布匹时，几个流里流气的地痞围了上来。","为首的刀疤脸嘿嘿一笑，伸手就要摸你的脸：「小娘子，跟爷走，爷请你喝酒——」","周围的人纷纷避开，没人敢出声。你感觉到他身后的同伙正在包抄过来。"],choices:[{text:"厉声斥责，吓退他们",next:"ev_rogue_scold",type:"fierce"},{text:"假装害怕，趁机脱身",next:"ev_rogue_escape",type:"smart"},{text:"直接动手反击",next:"ev_rogue_fight",type:"risky"}]},{tag:"🌟 贵人偶遇",title:"柳夫人",text:["从布庄出来时，你差点撞上一顶青布小轿。轿帘掀开，露出一张保养极好的妇人面容——","是镇上柳布商的夫人。她上下打量你一番，忽然笑了：","「你就是新搬来的小媳妇？听说你精明能干，我家老爷可好奇得很。」她递过一张名帖，「下月初三，我府上赏花宴，你也来坐坐？」"],choices:[{text:"欣然接受，道谢收下",next:"ev_rich_accept",type:"love"},{text:"婉言谢绝，不想攀附",next:"ev_rich_refuse",type:"smart"},{text:"借机攀谈，打听商机",next:"ev_rich_biz",type:"smart"}]},{tag:"🏠 房东来访",title:"房东太太",text:["门外传来敲门声，是房东王太太。她叉着腰，脸上带着几分不耐烦：","「小媳妇，这个月的租子该交了。你家那位身子不便，我可拖不起！」","她上下打量你这破旧的小屋，嘴角带着轻蔑的笑，「要不就拿五两银子出来，要不就——搬走！」"],choices:[{text:"忍气吞声，如数交租",next:"ev_landlord_pay",type:"safe"},{text:"讨价还价，争取宽限",next:"ev_landlord_negotiate",type:"smart"},{text:"强势回击，斥她欺人",next:"ev_landlord_fight",type:"fierce"}]},{tag:"💰 商机降临",title:"布庄转让",text:["你在茶馆喝茶时，听到邻桌几个人在叹气：","「……孙布庄的老孙头去世了，他儿子不争气，这布庄怕是要关门了……」","「那可是镇中心的好铺子啊！可惜要价三百两，谁能接得起……」"],choices:[{text:"想办法筹钱，哪怕借债",next:"ev_biz_attempt",type:"risky"},{text:"先去打听详情，谨慎行事",next:"ev_biz_info",type:"smart"},{text:"这不是我能觊觎的，算了",next:"ev_biz_giveup",type:"calm"}]}];var ev=evs[Math.floor(Math.random()*evs.length)];showScene(ev.title,ev.text,ev.choices,ev.tag);}

function ev_landlord_pay(){S.money-=5;addLog("如数交租 -5文");showScene("忍气交租",["你忍下这口气，如数交了五两银子。王太太这才换了一副嘴脸：「这才对嘛！下个月早些！」她扭着腰走了，你望着她的背影，心里暗暗发誓：总有一天，要有自己的房子。"], [{text:"回家休息",next:"go_home",type:"safe"}], "🏠 忍气交租");renderStats();}
function ev_landlord_negotiate(){if(S.wit>=3){S.money-=3;addLog("谈判成功 -3文");showScene("谈判成功",["你拿出账本，一笔笔算给她看——她要的租金已经超过了镇上平均水平。王太太被你算得哑口无言，最后同意减两成。你保住了面子和银子。"], [{text:"回家休息",next:"go_home",type:"safe"}], "📖 谈判成功");}else{S.money-=5;addLog("谈判失败 -5文");showScene("谈判失败",["你想讨价还价，却被王太太一顿抢白，最后还是如数交了租。不过她答应宽限三天——聊胜于无吧。"], [{text:"回家休息",next:"go_home",type:"safe"}], "📖 谈判失败");}renderStats();}
function ev_landlord_fight(){S.prestige+=1;S.husband.affection=(S.husband.affection||50)+5;addLog("强势回击 声望+1 好感+5");showScene("强势反击",["你毫不退让地和王太太对骂——「我相公是清白人家，轮不到你欺辱！下次再来无理取闹，我去县衙告你骚扰！」她被你震住，灰溜溜地跑了。"+S.husband.name+"握着你的手，眼眶竟有些红了。"], [{text:"回家休息",next:"go_home",type:"safe"}], "⚔ 强势反击");renderStats();updateAff();}
function ev_biz_attempt(){if(S.money>=300){S.money-=300;S.cls="布庄老板";addLog("买下布庄！ -300文");showScene("梦想成真",["你凑齐三百两银子，签下契约的那一刻，手都在抖。从这一刻起，你不再是穷街僻巷的小媳妇——你是孙布庄的新主人！"], [{text:"回家休息",next:"go_home",type:"safe"}], "🏆 梦想成真");}else{showScene("本钱不足",["你四处借钱，却怎么也凑不够三百两。梦想很丰满，现实很骨感。但你不甘心——总有一天，要把这布庄拿下！"], [{text:"回家休息",next:"go_home",type:"safe"}], "💸 本钱不足");}renderStats();}
function ev_biz_info(){S.social+=1;S.wit+=1;addLog("打听详情 智慧+1 人脉+1");showScene("知己知彼",["你找到孙家的旧伙计，详细打听了布庄的情况——位置好，老客户多，就是缺一个懂经营的新主人。你心里有了数，只等时机和本钱。"], [{text:"回家休息",next:"go_home",type:"safe"}], "📋 知己知彼");renderStats();}
function ev_biz_giveup(){showScene("量力而行",["三百两，是你现在想都不敢想的数字。你叹了口气，转身离开。有些事情，不是光有野心就能做到的。"], [{text:"回家休息",next:"go_home",type:"safe"}], "🌫️ 量力而行");}
function go_home(){S.day++;if(S.husband&&Math.random()<0.25){S.husband.affection=(S.husband.affection||50)+(Math.random()<0.5?1:-1);S.husband.affection=Math.max(0,Math.min(100,S.husband.affection));}renderStats();updateAff();addLog("第"+S.day+"日开始");showMorning();}
window.go=function(n,t){switch(n){case"m_detail":m_detail();break;case"m_money":m_money();break;case"m_hasty":m_hasty();break;case"m_choose":m_choose();break;case"fi_0":fi_0();break;case"fi_1":fi_1();break;case"fi_2":fi_2();break;case"day1":day1();break;case"go_market":go_market();break;case"go_work":go_work();break;case"talk_husband":talk_husband();break;case"go_town":go_town();break;case"go_shop":go_shop();break;case"buy_gift":buy_gift();break;case"do_renovate":do_renovate();break;case"do_bribe":do_bribe();break;case"do_trade":do_trade();break;case"ev_market_buy":ev_market_buy();break;case"ev_market_calm":ev_market_calm();break;case"ev_market_info":ev_market_info();break;case"ev_rogue_scold":ev_rogue_scold();break;case"ev_rogue_escape":ev_rogue_escape();break;case"ev_rogue_fight":ev_rogue_fight();break;case"ev_rich_accept":ev_rich_accept();break;case"ev_rich_refuse":ev_rich_refuse();break;case"ev_rich_biz":ev_rich_biz();break;case"ev_landlord_pay":ev_landlord_pay();break;case"ev_landlord_negotiate":ev_landlord_negotiate();break;case"ev_landlord_fight":ev_landlord_fight();break;case"ev_biz_attempt":ev_biz_attempt();break;case"ev_biz_info":ev_biz_info();break;case"ev_biz_giveup":ev_biz_giveup();break;case"go_home":go_home();break;default:go_home();}};
</script></body></html>
