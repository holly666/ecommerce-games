  {id:'scholar_lei',name:'雷子鸣',bg:'落魄书生',appearance:'眉目清冷出尘，气质如雪山之莲。身形清瘦修长，一袭洗得发白的青衫也掩不住他周身的书卷气。偶一抬头，目光清亮如寒潭。',desc:'家道中落的书生，满腹经纶却时运不济。性格有些孤傲，但和你很聊得来。',traits:['孤傲','才学'],meetEvent:'go_town',meetScene:'镇上偶遇'},

amStatus)S.examStatus='idle';if(!S.examAnnounced)S.examAnnounced=false;if(!S.examDay)S.examDay=0;if(!S.examPassed)S.examPassed=false;if(!S.lastExamDay)S.lastExamDay=0;if(!S.govTitle)S.govTitle='无';if(!S.governance)S.governance={justice:0,tax:0,security:0,publicSentiment:0};if(!S.currentRank)S.currentRank='none';if(!S.salary)S.salary=0;if(!S.lastSalaryDay)S.lastSalaryDay=0;if(!S.annualReviewYear)S.annualReviewYear=0;if(!S.promotionReady)S.promotionReady=false;if(!S.examPrepDays)S.examPrepDays=0;if(!S.examType)S.examType=null;if(!S.isOfficial)S.isOfficial=false;if(!S.govTaskDone)S.govTaskDone=0;if(S.isMarried===undefined)S.isMarried=false;if(S.searchingForHusband===undefined)S.searchingForHusband=false;if(S.gossipPressure===undefined)S.gossipPressure=0;if(S.matchmakerVisited===undefined)S.matchmakerVisited=false;}
function addLog(m){S.log.push(m);var le=document.getElementById('log');if(!le)return;var e=document.createElement('div');e.className='le';e.textContent=('[第'+S.day+'天] '+m).substring(0,28);le.appendChild(e);le.scrollTop=le.scrollHeight;while(le.children.length>15)le.removeChild(le.firstChild);}
function toggleLog(){var lw=document.getElementById('log-wrap');if(lw)lw.classList.toggle('on');}
function saveGame(){localStorage.setItem('nvzh_v5',JSON.stringify(S));addLog('已存档');}

function showScene(title,text,choices,etag){
  // 优先隐藏夜面板，防止旧onclick残留干扰
  document.getElementById('night-panel').classList.remove('on');
  document.getElementById('night-choices').innerHTML='';
  document.getElementById('night-choices').onclick=null;
  document.getElementById('scene-title-text').textContent=title;
  document.getElementById('day-num').textContent='第 '+S.day+' 日';
  document.getElementById('event-tag').innerHTML=etag?'<span class=et>'+etag+'</span>':'';
  var t=Array.isArray(text)?text.map(function(p){return'<p>'+p+'</p>';}).join(''):text;
  document.getElementById('scene-text').innerHTML=t;
  var h='';
  if(choices&&choices.length>0){
    choices.forEach(function(c){
      var tp=c.type||'safe';
      var tm={safe:'🍚',risky:'⚔',love:'💕',smart:'📖',gov:'🏛'};
      var cm={safe:'safe',risky:'risky',love:'love',smart:'smart',gov:'gov'};
      var tcm={safe:'t-safe',risky:'t-risky',love:'t-love',smart:'t-smart',gov:'t-gov'};
      var dis=c.disabled?'disabled ':'';
      h+='<button class="chc '+cm[tp]+'" '+dis+'data-next="'+c.next+'" data-type="'+tp+'" onclick="go(\''+c.next+'\',\''+tp+'\')"><span class="tag '+tcm[tp]+'">'+tm[tp]+'</span> '+c.text+'</button>';
    });
  }
  document.getElementById('choices').innerHTML=h;
  document.getElementById('scene').classList.add('on');
}
function getSeason(){
  // 春1-90 夏91-180 秋181-270 冬271-360 循环，365天一年
  var d=S.day%360||360;
  if(d<=90)return'春';
  if(d<=180)return'夏';
  if(d<=270)return'秋';
  return'冬';
}
function getWeather(){
  var w=['晴朗','薄云','微风','阴沉','细雨','大雾','烈日','小雪'];
  return w[Math.floor(Math.random()*w.length)];
}
function updateHusbandMood(){
  // 每天结算时根据当日行为调整心情
  // 0=happy,1=normal,2=sad,3=angry
  var mood=S.todayMood||1;
  var prev=S.husbandMood||1;
  var aff=S.affection;
  var concTouched=S.touchedConcubineToday||false;
  var goodToday=S.goodEventToday||false;
  // 如果摸了妾室，正夫可能不高兴
  if(concTouched&&aff<70){
    mood=Math.min(3,mood+1); // 更不高兴
  } else if(concTouched&&aff>=70){
    mood=Math.min(3,mood); // 好感高，容忍度也高
  }
  // 有好事
  if(goodToday){
    mood=Math.max(0,mood-1);
  }
  // 随机波动
  var drift=Math.floor(Math.random()*3)-1; // -1,0,1
  mood=Math.max(0,Math.min(3,mood+drift));
  // 好感极端情况
  if(aff>=80)mood=Math.max(0,mood-1);
  if(aff<30)mood=Math.min(3,mood+1);
  S.husbandMood=mood;
  S.todayMood=mood;
  // 重置今日标记
  S.touchedConcubineToday=false;
  S.goodEventToday=false;
  return mood;
}

window.startGame=function(){
  var savedBg=S.bg;
  var savedTrait=S.trait;
  var savedName=document.getElementById('player-name')?document.getElementById('player-name').value.trim():'';
  initS();
  S.bg=savedBg;
  S.trait=savedTrait;
  S.husband=null;
  S.isMarried=false;
  S.searchingForHusband=false;
  S.gossipPressure=0;
  S.matchmakerVisited=false;
  var ni=document.getElementById('player-name');
  S.playerName=(ni&&ni.value.trim())||'念卿';
  S.affection=50;
  addLog('角色：'+S.playerName+'（'+(S.bg?S.bg.name:'')+'·'+(S.trait?S.trait.name:'')+'）');
  S.flags.husbandBirthdayDay=45+Math.floor(Math.random()*21);
  S.flags.husbandBirthdayDone=false;
  document.getElementById('step3').classList.remove('on');
  showGame();
  document.getElementById('stats-bar').style.display='block';
  document.getElementById('sbar').classList.add('on');
  if(S.isMarried)document.getElementById('aff-wrap').classList.add('on');
  renderStats();updateAff();
  // 直接进入第一日清晨（婚姻为可选路线）
  document.getElementById('step1').classList.remove('on');
  document.getElementById('step2').classList.remove('on');
  document.getElementById('step3').classList.remove('on');
  if(S.isMarried)document.getElementById('aff-wrap').classList.add('on');
  document.getElementById('stats-bar').style.display='block';
  document.getElementById('sbar').classList.add('on');
  showMorning();
};

function getMorningGreeting(){

    var s=S.todaySeason||getSeason();

  if(weather==='大雾')actions.push('他牵着你的手，怕你走迷路');
  if(season==='冬')actions.push('他给你披上了厚外衣');
  if(season==='夏')actions.push('他给你摇了一晚上的扇子，眼下有淡淡的青色');
  if(season==='春')actions.push('他采了一朵小花插在窗台上');
  if(season==='秋')actions.push('他炖了一锅暖暖的汤');
  actions.push('给你梳头');actions.push('给你做了早饭');actions.push('给你念了一首诗');
  actions.push('给你泡了一壶热茶');actions.push('默默给你掖了掖被角');actions.push('给你唱了一首歌');

      happyTexts.push('你刚走出房门，就闻到了饭菜香。'+h+'正安静地在桌边等你，见你来了，只是微微点头：「来了。洗手吃饭吧。」简单的一句话，却让你觉得安心。');
    }
    else if(hid==='scholar'){
      happyTexts.push(h+'见你醒了，放下手中的书，微笑着说：「娘子早。今日春风和煦，一定是个好日子。」他的眼里满是温柔的光芒。');
      happyTexts.push(h+'已泡好了一壶好茶，见你出来，轻声道：「娘子，昨夜我读了一首诗，觉得极好——『执子之手，与子偕老』……早安。」');

    else{
      happyTexts.push(h+'见你醒来，眼睛里满是欢喜，主动迎上来牵你的手：「娘子，早。」');
    }
    base=happyTexts[Math.floor(Math.random()*happyTexts.length)];
    base+=' '+action+'，他今日心情很好。';

  // normal mood - 按夫君性格的普通问候

  if(hid==='tsundere'){
    greet.push('「哼，早、早饭……才不是我特意做的呢！」'+h+'别过脸去，但桌上已经摆满了热气腾腾的饭菜。');
    greet.push(h+'背对着你收拾屋子，听到你的脚步声，耳根红了：「……你醒啦。早饭在桌上，快吃吧，凉了就不好吃了。」');

    greet.push('「早安！娘子！」'+h+'一看到你就笑着跑过来：「告诉你一个好消息，我昨天在集市上打听到一个赚钱的好法子，等下说给你听！」');

    greet.push(h+'坐在窗边，见你出来，轻声说：「娘子……早。今日天气不错。」简单几个字，却让你觉得很踏实。');

  if(!ch){go('n_sleep','safe');return;}
  ch.martial=Math.min(100,ch.martial+3+Math.floor(Math.random()*4));
  var gender=ch.gender==='男'?'小公子':'小千金';
  var scenes=[
    [gender+'「'+ch.name+'」拿着木棍，模仿武者的样子挥来挥去。',ch.name+'虽然力气小，但一招一式有模有样。你在旁边拍手叫好，他舞得更起劲了。'],

// 看望孩子（晚间选项）
function n_child_do(idx){
  if(!S.children||!S.children[idx]){go('n_sleep','safe');return;}
  S._currentChild=idx;
  var ch=S.children[idx];
  var childAge=ch.age||0;
  var gender=ch.gender==='男'?'小公子':'小千金';
  var parentName=ch.motherId?(AVAILABLE_MEN.find(function(m){return m.id===ch.motherId;})||{name:ch.motherId}).name:S.husband.name;
  var statLine='体质:'+ch.physique+' 悟性:'+ch.intelligence+' 情商:'+ch.empathy+' 武力:'+ch.martial;

  // 根据年龄说不同的话
  var ageText;
  if(childAge<10){
    ageText=gender+'「'+ch.name+'」还在襒褓之中，睡着居多。偶尔睡醒，就眨着大眼睛看着你。';
  } else if(childAge<30){
    ageText=gender+'「'+ch.name+'」正满地乱爬，看到你进来，伸出小手要你抱：「娘子——」'+parentName+'在旁边笑着说：「这孩子开始学说话了。」';
  } else if(childAge<60){
    ageText=gender+'「'+ch.name+'」已经会走路了，见你就扑过来：「娘子！抱！」\n'+ch.name+'是个'+ch.personality+'的孩子，正在院子里追鸡玩。';
  } else {
    ageText=gender+'「'+ch.name+'」见你来了，蹦蹦跳跳地跑过来：「娘子！你来看我了！」\n'+ch.name+'是个'+ch.personality+'的孩子，缠着你要你讲故事。（'+statLine+'）';
  }

  var opts=[
    {text:'陪'+ch.name+'玩耍',next:'child_play_'+idx,type:'safe'},
    {text:'教'+ch.name+'认字',next:'child_study_'+idx,type:'smart'},
    {text:'带'+ch.name+'出门见人',next:'child_social_'+idx,type:'love'},
    {text:'陪'+ch.name+'练功',next:'child_train_'+idx,type:'risky'},
    {text:'返回',next:'n_sleep',type:'safe'},
  ];

  document.getElementById('night-panel').classList.remove('on');
  showScene('去看'+ch.name,['你在孩子房里，'+parentName+'正哄着'+ch.name+'。',ageText],null);
  var cm={safe:'safe',risky:'risky',love:'love',smart:'smart',gov:'gov'};
  var tcm={safe:'t-safe',risky:'t-risky',love:'t-love',smart:'t-smart',gov:'t-gov'};
  var tm={safe:'🍚',risky:'⚔',love:'💕',smart:'📖',gov:'🏛'};
  var h='';
  opts.forEach(function(o){h+='<button class="chc '+cm[o.type]+'" data-next="'+o.next+'" data-type="'+o.type+'"><span class="tag '+tcm[o.type]+'">'+tm[o.type]+'</span> '+o.text+'</button>';});
  document.getElementById('choices').innerHTML=h;
  document.getElementById('choices').onclick=function(e){
    var btn=e.target.closest('.chc');
    if(btn){go(btn.getAttribute('data-next'),btn.getAttribute('data-type'));}
  };
}

// ========== 在社交事件中遇到新人 ==========
function checkMeetNewMan(){
  // 随机在社交/集市/公务事件中遇到新男性
  if(!S.availableMen)S.availableMen=[];
  var unmet=AVAILABLE_MEN.filter(function(m){return !S.metMen[m.id];});
  if(unmet.length===0)return;
  // 身份要求：赏花宴需要声望>=10
  var eligible=unmet.filter(function(m){
    if(m.meetEvent==='social_event'||m.meetEvent==='social_event_2')return S.prestige>=10;
    if(m.meetEvent==='gov_dispute_fair')return S.isOfficial;
    return true;
  });
  if(eligible.length===0)return;
  // 30%概率遇到
  if(Math.random()<0.3){
    var man=eligible[Math.floor(Math.random()*eligible.length)];
    meet_new_man(man.id);
    return true;
  }
  return false;
}

  var manB=AVAILABLE_MEN.find(function(m){return m.id===sideB;});
  var nameA=manA?manA.name:sideA;
  var nameB=manB?manB.name:sideB;
  var affA=S.concubineAffection[sideA]||50;

  S.concubineAffection[sideB]=Math.max(0,affB-8);
  addLog('宅斗裁决 袒护'+nameA+' 好感+8 斥责'+nameB+' 好感-8');

}
