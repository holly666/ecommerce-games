v id="save-bar"><button class="btn-sm" onclick="saveGame()">💾 存档</button><button class="btn-sm" onclick="loadGame()">📂 读档</button><button class="btn-ghost" onclick="if(confirm('确定要重新开始吗？'))resetGame()">🔄 重开</button></div><div id="log-wrap"><div id="log"></div></div></div><script>var S={},_ig=false;
