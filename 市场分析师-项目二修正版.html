<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场分析师 - 项目二模拟</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        #start-screen { text-align: center; padding: 30px 20px; }
        .title { font-size: 2.2em; color: #00d4ff; margin-bottom: 5px; }
        .subtitle { font-size: 1em; color: #7ec8e3; margin-bottom: 20px; }
        .start-btn { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #fff; border: none; padding: 15px 40px; font-size: 1.1em; border-radius: 25px; cursor: pointer; font-weight: bold; }
        
        .info-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin: 15px 0; text-align: left; }
        .info-title { color: #00d4ff; font-size: 1.1em; margin-bottom: 10px; }
        .info-text { color: #b8d4e3; font-size: 0.9em; line-height: 1.6; }
        
        .chapter-card { background: rgba(255,255,255,0.1); border: 1px solid rgba(0,212,255,0.3); border-radius: 12px; padding: 15px; margin: 10px 0; text-align: left; }
        .chapter-name { color: #00d4ff; font-weight: bold; margin-bottom: 5px; }
        .chapter-desc { color: #888; font-size: 0.85em; }
        
        #game-screen { display: none; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .progress { background: rgba(255,255,255,0.1); padding: 8px 15px; border-radius: 20px; font-size: 0.85em; }
        .score-box { background: linear-gradient(135deg, #ffd700, #ff9500); color: #1a1a2e; padding: 8px 20px; border-radius: 20px; font-weight: bold; }
        
        .chapter-tag { display: inline-block; background: linear-gradient(135deg, #667eea, #764ba2); padding: 5px 12px; border-radius: 15px; font-size: 0.75em; margin-bottom: 15px; }
        
        .question-box { background: #fff; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .question-text { color: #333; font-size: 1em; line-height: 1.6; margin-bottom: 15px; }
        
        .options { display: grid; gap: 10px; }
        .option { background: #f8f9fa; border: 2px solid #e9ecef; padding: 12px 15px; border-radius: 10px; cursor: pointer; color: #333; font-size: 0.95em; transition: all 0.2s; text-align: left; }
        .option:hover { border-color: #00d4ff; background: #e8f4ff; }
        .option.correct { background: linear-gradient(135deg, #00ff88, #00cc6a); border-color: #00ff88; color: #fff; }
        .option.wrong { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); border-color: #ff6b6b; color: #fff; }
        .option.disabled { pointer-events: none; opacity: 0.7; }
        
        .result-popup { display: none; padding: 15px; border-radius: 10px; margin-top: 15px; text-align: left; }
        .result-popup.show { display: block; animation: fadeIn 0.3s; }
        .result-correct { background: #e8f5e9; border-left: 4px solid #4caf50; color: #2e7d32; }
        .result-wrong { background: #ffebee; border-left: 4px solid #f44336; color: #c62828; }
        
        .next-btn { display: none; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; padding: 12px 30px; border-radius: 20px; font-weight: bold; margin-top: 15px; cursor: pointer; }
        .next-btn.show { display: inline-block; }
        
        #result-screen { display: none; text-align: center; padding: 40px 20px; }
        .result-title { font-size: 2em; margin-bottom: 15px; }
        .final-score { font-size: 3em; color: #ffd700; margin: 20px 0; }
        .stats { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .stat { background: rgba(255,255,255,0.1); padding: 15px 25px; border-radius: 12px; }
        .stat-value { font-size: 1.5em; color: #00d4ff; }
        .stat-label { font-size: 0.8em; color: #888; }
        
        @media (max-width: 600px) { .title { font-size: 1.8em; } .options { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-screen">
            <h1 class="title">📊 市场分析师</h1>
            <p class="subtitle">项目二知识点模拟挑战</p>
            <button class="start-btn" onclick="startGame()">🚀 开始挑战</button>
            
            <div class="info-box">
                <div class="info-title">📖 挑战内容</div>
                <div class="info-text">本游戏涵盖项目二6大知识点：市场信息概念、类型、获取方式、获取原则、工具、途径</div>
            </div>
            
            <div class="chapter-card">
                <div class="chapter-name">📚 知识点清单</div>
                <div class="chapter-desc">1. 市场信息的概念 | 2. 市场信息的类型 | 3. 市场信息的获取方式 | 4. 市场信息获取原则 | 5. 市场信息的工具 | 6. 市场信息的了解途径</div>
            </div>
        </div>
        
        <div id="game-screen">
            <div class="header-bar">
                <div class="progress">📝 <span id="current">1</span>/<span id="total">12</span>题</div>
                <div class="score-box">💰 得分: <span id="score">0</span></div>
            </div>
            
            <div class="chapter-tag" id="chapter-tag">知识点</div>
            
            <div class="question-box">
                <p class="question-text" id="question-text"></p>
                
                <div class="options" id="options"></div>
                
                <div class="result-popup" id="result-popup">
                    <div id="result-text"></div>
                </div>
                
                <button class="next-btn" id="next-btn" onclick="nextQuestion()">下一题 →</button>
            </div>
        </div>
        
        <div id="result-screen">
            <h1 class="result-title" id="result-title">🎉 完成！</h1>
            <div class="final-score" id="final-score">0</div>
            <p class="subtitle" id="result-msg"></p>
            <div class="stats">
                <div class="stat"><div class="stat-value" id="stat-right">0</div><div class="stat-label">正确</div></div>
                <div class="stat"><div class="stat-value" id="stat-wrong">0</div><div class="stat-label">错误</div></div>
            </div>
            <button class="start-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const questions = [
            // 市场信息概念（2题）
            { chapter: "市场信息概念", text: "小王想了解今年新能源汽车市场的销量情况，这属于什么信息？", options: ["A. 企业内部信息", "B. 市场外部信息", "C. 竞争信息", "D. 用户反馈信息"], answer: 1, explanation: "市场规模、销量属于市场外部信息（行业环境信息）。" },
            { chapter: "市场信息概念", text: "以下哪项属于市场信息的范畴？", options: ["A. 员工工资表", "B. 原材料采购记录", "C. 超市促销活动", "D. 仓库库存"], answer: 2, explanation: "超市促销活动属于市场环境信息，是外部市场信息。" },
            
            // 市场信息类型（3题）
            { chapter: "市场信息类型", text: "了解国产手机市场份额分布，这属于什么类型的信息？", options: ["A. 行业信息", "B. 竞品信息", "C. 用户信息", "D. 销售渠道信息"], answer: 0, explanation: "市场份额、行业整体情况属于行业信息。" },
            { chapter: "市场信息类型", text: "了解90后消费者的购物偏好，这属于什么类型的信息？", options: ["A. 行业信息", "B. 竞品信息", "C. 用户信息", "D. 销售渠道信息"], answer: 2, explanation: "消费者的购物偏好、年龄段属于用户信息（消费者信息）。" },
            { chapter: "市场信息类型", text: "政府发布的新能源补贴政策，这属于什么类型的信息？", options: ["A. 行业信息", "B. 竞品信息", "C. 用户信息", "D. 政策信息"], answer: 3, explanation: "政府政策、法规属于政策信息，是外部环境信息的重要组成部分。" },
            
            // 市场信息获取方式（3题）
            { chapter: "市场信息获取方式", text: "小张想了解自己网店的流量数据，他应该怎么做？", options: ["A. 问朋友", "B. 看百度", "C. 查看店铺后台数据", "D. 猜测"], answer: 2, explanation: "店铺后台数据是最直接准确的获取方式。" },
            { chapter: "市场信息获取方式", text: "想了解用户对产品的真实评价，以下哪种方式最直接？", options: ["A. 搜索百度评价", "B. 看电商评论区", "C. 用户访谈/问卷", "D. 行业协会报告"], answer: 2, explanation: "用户访谈和问卷可以直接获取用户真实想法，是最直接的获取方式。" },
            { chapter: "市场信息获取方式", text: "小赵需要了解行业未来3年的发展趋势，应该找谁获取信息？", options: ["A. 街头问卷", "B. 行业研究报告", "C. 问竞争对手", "D. 自己猜测"], answer: 1, explanation: "行业发展趋势需要专业机构的研究报告，属于第三方信息源。" },
            
            // 市场信息获取原则（3题）
            { chapter: "市场信息获取原则", text: "以下哪个不是市场信息获取的基本原则？", options: ["A. 及时性", "B. 准确性", "C. 随意性", "D. 系统性"], answer: 2, explanation: "市场信息获取应遵循及时性、准确性、系统性、合法性原则，'随意性'不是原则。" },
            { chapter: "市场信息获取原则", text: "收集市场信息时，以下行为正确的是？", options: ["A. 伪装成客户套话", "B. 通过公开合法渠道收集", "C. 行贿对方员工", "D. 黑客攻击获取数据"], answer: 1, explanation: "市场信息获取应合法合规，通过公开渠道收集是正确方式。" },
            { chapter: "市场信息获取原则", text: "收集市场信息时，应该遵循什么原则？", options: ["A. 越多越好，不用整理", "B. 按需收集，系统整理", "C. 只收集免费的", "D. 一次性收集完"], answer: 1, explanation: "市场信息获取应有目的性，按需收集并系统整理，才能发挥价值。" },
            
            // 市场信息工具（3题）
            { chapter: "市场信息工具", text: "想查看自己网店的流量来源，应该使用什么工具？", options: ["A. 百度指数", "B. 生意参谋/商智", "C. 新榜", "D. 问卷星"], answer: 1, explanation: "生意参谋（淘宝）/商智（京东）是电商官方数据分析工具。" },
            { chapter: "市场信息工具", text: "想了解某个关键词在百度的搜索热度，应该用什么工具？", options: ["A. 生意参谋", "B. 百度指数", "C. 腾讯课堂", "D. PRNewswire"], answer: 1, explanation: "百度指数可以查询关键词的搜索热度、趋势等数据。" },
            { chapter: "市场信息工具", text: "以下哪个是专业的在线问卷调研工具？", options: ["A. 微信", "B. 问卷星/腾讯问卷", "C. 淘宝", "D. 抖音"], answer: 1, explanation: "问卷星、腾讯问卷是专业的在线问卷调研工具。" },
            
            // 市场信息了解途径（2题）
            { chapter: "市场信息途径", text: "想快速了解行业最新动态，以下哪个途径最有效？", options: ["A. 参加行业展会", "B. 雇佣商业间谍", "C. 占卜预测", "D. 等待客户告诉"], answer: 0, explanation: "参加行业展会可以第一时间了解行业最新动态和趋势。" },
            { chapter: "市场信息途径", text: "想了解用户对产品的评价，以下途径可行的是？", options: ["A. 电商评论区", "B. 社交媒体监测", "C. 用户访谈", "D. 以上都可以"], answer: 3, explanation: "电商评论区、社交媒体监测、用户访谈都是了解用户评价的有效途径。" },
        ];
        
        let currentIndex = 0;
        let score = 0;
        let rightCount = 0;
        let wrongCount = 0;
        let order = [];
        
        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        function startGame() {
            order = shuffle([...Array(questions.length).keys()]);
            currentIndex = 0;
            score = 0;
            rightCount = 0;
            wrongCount = 0;
            
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            document.getElementById('result-screen').style.display = 'none';
            
            showQuestion();
        }
        
        function showQuestion() {
            const q = questions[order[currentIndex]];
            
            document.getElementById('current').textContent = currentIndex + 1;
            document.getElementById('total').textContent = questions.length;
            document.getElementById('score').textContent = score;
            document.getElementById('chapter-tag').textContent = q.chapter;
            document.getElementById('question-text').textContent = q.text;
            document.getElementById('result-popup').classList.remove('show');
            document.getElementById('next-btn').classList.remove('show');
            
            const optsContainer = document.getElementById('options');
            optsContainer.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => selectAnswer(idx);
                optsContainer.appendChild(btn);
            });
        }
        
        function selectAnswer(idx) {
            const q = questions[order[currentIndex]];
            const opts = document.querySelectorAll('.option');
            
            opts.forEach(o => o.classList.add('disabled'));
            
            if (idx === q.answer) {
                opts[idx].classList.add('correct');
                score += 10;
                rightCount++;
                document.getElementById('result-text').innerHTML = `<strong>✅ 回答正确！</strong><br>${q.explanation}`;
                document.getElementById('result-popup').className = 'result-popup show result-correct';
            } else {
                opts[idx].classList.add('wrong');
                opts[q.answer].classList.add('correct');
                wrongCount++;
                document.getElementById('result-text').innerHTML = `<strong>❌ 回答错误</strong><br>${q.explanation}`;
                document.getElementById('result-popup').className = 'result-popup show result-wrong';
            }
            
            document.getElementById('score').textContent = score;
            document.getElementById('next-btn').classList.add('show');
        }
        
        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= questions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }
        
        function showResult() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            document.getElementById('final-score').textContent = score;
            document.getElementById('stat-right').textContent = rightCount;
            document.getElementById('stat-wrong').textContent = wrongCount;
            
            let title, msg;
            if (score >= 120) {
                title = "🏆 市场总监！";
                msg = "你对项目二知识点了如指掌！";
            } else if (score >= 80) {
                title = "⭐ 市场高手";
                msg = "你掌握得不错，继续保持！";
            } else {
                title = "📚 需要努力";
                msg = "项目二知识点还需要再复习一下哦！";
            }
            
            document.getElementById('result-title').textContent = title;
            document.getElementById('result-msg').textContent = msg;
        }
        
        function restartGame() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'block';
        }
    </script>
</body>
</html>
