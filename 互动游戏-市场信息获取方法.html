<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场情报局 - 互动答题游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        
        /* 开始页面 */
        #start-screen {
            text-align: center;
            padding: 60px 20px;
        }
        
        .title {
            font-size: 3.5em;
            background: linear-gradient(45deg, #00d4ff, #7c3aed, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        
        .subtitle {
            font-size: 1.3em;
            color: #a0a0a0;
            margin-bottom: 40px;
        }
        
        .start-btn {
            background: linear-gradient(45deg, #7c3aed, #00d4ff);
            border: none;
            padding: 20px 60px;
            font-size: 1.5em;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.4);
        }
        
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(124, 58, 237, 0.6);
        }
        
        .rules {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            text-align: left;
        }
        
        .rules h3 {
            color: #00d4ff;
            margin-bottom: 15px;
        }
        
        .rules li {
            margin: 10px 0;
            color: #ccc;
        }
        
        /* 游戏页面 */
        #game-screen {
            display: none;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin-bottom: 30px;
        }
        
        .score {
            font-size: 1.5em;
            color: #ffd700;
        }
        
        .timer {
            font-size: 1.5em;
            color: #00d4ff;
        }
        
        .question-num {
            font-size: 1.2em;
            color: #a0a0a0;
        }
        
        .question-box {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            text-align: center;
            border: 2px solid rgba(0, 212, 255, 0.3);
        }
        
        .question-text {
            font-size: 1.4em;
            line-height: 1.8;
            margin-bottom: 30px;
        }
        
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .option {
            background: linear-gradient(135deg, #2d2d44, #1a1a2e);
            border: 2px solid #3d3d5c;
            padding: 25px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            font-size: 1.1em;
        }
        
        .option:hover {
            border-color: #00d4ff;
            transform: scale(1.02);
            background: linear-gradient(135deg, #3d3d5c, #2d2d44);
        }
        
        .option.correct {
            background: linear-gradient(135deg, #10b981, #059669);
            border-color: #10b981;
            animation: correctPulse 0.5s;
        }
        
        @keyframes correctPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .option.wrong {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            border-color: #ef4444;
        }
        
        .option.disabled {
            pointer-events: none;
        }
        
        /* 结果页面 */
        #result-screen {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }
        
        .result-title {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        .final-score {
            font-size: 4em;
            color: #ffd700;
            margin: 30px 0;
        }
        
        .result-msg {
            font-size: 1.5em;
            color: #a0a0a0;
            margin-bottom: 40px;
        }
        
        .restart-btn {
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            padding: 18px 50px;
            font-size: 1.3em;
            color: white;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .restart-btn:hover {
            transform: scale(1.05);
        }
        
        /* 特效 */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #ffd700;
            animation: fall 3s linear forwards;
        }
        
        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 开始页面 -->
        <div id="start-screen">
            <h1 class="title">🔍 市场情报局</h1>
            <p class="subtitle">市场信息获取方法 · 互动答题挑战</p>
            <button class="start-btn" onclick="startGame()">开始挑战</button>
            <div class="rules">
                <h3>📋 游戏规则</h3>
                <ul>
                    <li>共 <strong>6道题目</strong>，每题 <strong>10秒</strong> 答题时间</li>
                    <li>答对 <strong>+10分</strong>，答错 <strong>0分</strong></li>
                    <li>根据情景选择正确的市场信息获取方法</li>
                    <li>看看你能得多少分？</li>
                </ul>
            </div>
        </div>
        
        <!-- 游戏页面 -->
        <div id="game-screen">
            <div class="header">
                <div class="question-num">题 <span id="q-num">1</span>/6</div>
                <div class="timer">⏱️ <span id="timer">10</span>s</div>
                <div class="score">🏆 <span id="score">0</span>分</div>
            </div>
            
            <div class="question-box">
                <p class="question-text" id="question-text"></p>
            </div>
            
            <div class="options" id="options"></div>
        </div>
        
        <!-- 结果页面 -->
        <div id="result-screen">
            <h1 class="result-title">🎉 挑战完成！</h1>
            <p class="final-score"><span id="final-score">0</span> 分</p>
            <p class="result-msg" id="result-msg"></p>
            <button class="restart-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "📱 你想了解今年大学生群体对数码产品的偏好和购买意向，应该用哪种方法？",
                options: ["市场调研法", "社交媒体监测法", "竞品信息挖掘法", "客户反馈法"],
                answer: 0
            },
            {
                question: "🔥 你想快速了解某个网红产品在小红书上的口碑和用户评价，应该用哪种方法？",
                options: ["搜索引擎检索法", "社交媒体监测法", "市场调研法", "大数据工具法"],
                answer: 1
            },
            {
                question: "🏪 你想知道隔壁竞争对手店铺今天的促销活动的具体内容，应该用哪种方法？",
                options: ["客户反馈法", "竞品信息挖掘法", "社交媒体监测法", "市场调研法"],
                answer: 1
            },
            {
                question: "📞 你是手机售后客服，想收集用户对最新款手机的改进建议，应该用哪种方法？",
                options: ["客户反馈法", "市场调研法", "搜索引擎检索法", "竞品信息挖掘法"],
                answer: 0
            },
            {
                question: "📈 你想分析'新能源汽车'这个关键词在过去一年的搜索趋势和行业发展方向，应该用哪种方法？",
                options: ["社交媒体监测法", "搜索引擎检索法", "客户反馈法", "市场调研法"],
                answer: 1
            },
            {
                question: "🤖 你想用AI工具快速分析海量市场数据，追踪实时市场动态，应该用哪种方法？",
                options: ["大数据工具法", "竞品信息挖掘法", "市场调研法", "搜索引擎检索法"],
                answer: 0
            }
        ];
        
        let currentQuestion = 0;
        let score = 0;
        let timer = 10;
        let timerInterval;
        
        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            showQuestion();
        }
        
        function showQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('q-num').textContent = currentQuestion + 1;
            document.getElementById('question-text').textContent = q.question;
            
            const optionsContainer = document.getElementById('options');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('div');
                btn.className = 'option';
                btn.textContent = opt;
                btn.onclick = () => selectAnswer(index);
                optionsContainer.appendChild(btn);
            });
            
            startTimer();
        }
        
        function startTimer() {
            timer = 10;
            document.getElementById('timer').textContent = timer;
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timer--;
                document.getElementById('timer').textContent = timer;
                
                if (timer <= 3) {
                    document.getElementById('timer').style.color = '#ef4444';
                } else {
                    document.getElementById('timer').style.color = '#00d4ff';
                }
                
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    timeUp();
                }
            }, 1000);
        }
        
        function selectAnswer(index) {
            clearInterval(timerInterval);
            
            const options = document.querySelectorAll('.option');
            const correctAnswer = questions[currentQuestion].answer;
            
            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (i === correctAnswer) {
                    opt.classList.add('correct');
                }
            });
            
            if (index === correctAnswer) {
                score += 10;
                document.getElementById('score').textContent = score;
            } else {
                options[index].classList.add('wrong');
            }
            
            setTimeout(() => {
                nextQuestion();
            }, 1500);
        }
        
        function timeUp() {
            const options = document.querySelectorAll('.option');
            const correctAnswer = questions[currentQuestion].answer;
            
            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (i === correctAnswer) {
                    opt.classList.add('correct');
                }
            });
            
            setTimeout(() => {
                nextQuestion();
            }, 1500);
        }
        
        function nextQuestion() {
            currentQuestion++;
            
            if (currentQuestion >= questions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }
        
        function showResult() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            document.getElementById('final-score').textContent = score;
            
            let msg = '';
            if (score === 60) {
                msg = "🎯 太厉害了！满分通过！你是市场调研高手！";
                createConfetti();
            } else if (score >= 50) {
                msg = "⭐ 优秀！你对市场信息获取方法掌握得很好！";
                createConfetti();
            } else if (score >= 40) {
                msg = "👍 不错！再复习一下知识点会更棒！";
            } else {
                msg = "💪 再接再厉！多练习几次就能掌握！";
            }
            
            document.getElementById('result-msg').textContent = msg;
        }
        
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.background = ['#ffd700', '#ff6b6b', '#00d4ff', '#7c3aed', '#10b981'][Math.floor(Math.random() * 5)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                document.body.appendChild(confetti);
                
                setTimeout(() => confetti.remove(), 3000);
            }
        }
        
        function restartGame() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('score').textContent = '0';
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
            showQuestion();
        }
    </script>
</body>
</html>
