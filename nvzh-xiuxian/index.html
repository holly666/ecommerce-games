<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仙侠缘·情动九天</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a0a2e 0%,#2d1b4e 40%,#1a0a2e 100%);min-height:100vh;font-family:'Noto Serif SC',serif;color:#e8d5f0;overflow-x:hidden}
.particle{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.particle span{position:absolute;border-radius:50%;background:rgba(180,120,255,0.3);animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) rotate(720deg);opacity:0}}
#game-container{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:20px;min-height:100vh}
.screen{display:none;padding:20px}
.screen.active{display:block}
.title-screen{text-align:center;padding-top:60px}
.game-title{font-family:'Ma Shan Zheng',cursive;font-size:4em;background:linear-gradient(135deg,#c084fc,#f472b6,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 40px rgba(192,132,252,0.5);margin-bottom:10px;animation:glow 3s ease-in-out infinite}
.game-subtitle{font-size:1.2em;color:#a78bfa;margin-bottom:40px;letter-spacing:4px}
@keyframes glow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
.start-btn{background:linear-gradient(135deg,#7c3aed,#db2777);border:none;padding:15px 60px;font-size:1.3em;color:#fff;border-radius:50px;cursor:pointer;font-family:'Noto Serif SC',serif;box-shadow:0 0 30px rgba(124,58,237,0.5);transition:all 0.3s;letter-spacing:3px}
.start-btn:hover{transform:scale(1.08);box-shadow:0 0 50px rgba(219,39,119,0.7)}
.load-btn{margin-top:15px;background:linear-gradient(135deg,#4c1d95,#6d28d9);border:1px solid #8b5cf6;padding:10px 40px;font-size:1em;color:#c4b5fd;border-radius:50px;cursor:pointer;font-family:'Noto Serif SC',serif;transition:all 0.3s}
.load-btn:hover{background:linear-gradient(135deg,#5b21b6,#7c3aed)}
.creation-title{text-align:center;font-family:'Ma Shan Zheng',cursive;font-size:2.5em;color:#e9d5ff;margin-bottom:30px}
.section-box{background:linear-gradient(135deg,rgba(88,28,135,0.4),rgba(30,10,60,0.6));border:1px solid rgba(192,132,252,0.3);border-radius:16px;padding:20px;margin-bottom:20px;backdrop-filter:blur(10px)}
.section-title{font-size:1.1em;color:#c084fc;margin-bottom:12px;border-bottom:1px solid rgba(192,132,252,0.2);padding-bottom:8px;letter-spacing:2px}
.name-input{width:100%;background:rgba(0,0,0,0.3);border:1px solid #6d28d9;border-radius:10px;padding:12px;color:#e9d5ff;font-size:1.1em;font-family:'Noto Serif SC',serif;text-align:center;letter-spacing:2px}
.name-input:focus{outline:none;border-color:#c084fc;box-shadow:0 0 15px rgba(192,132,252,0.3)}
.option-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.option-card{background:rgba(0,0,0,0.25);border:1px solid rgba(139,92,246,0.3);border-radius:10px;padding:12px;cursor:pointer;transition:all 0.3s;text-align:center}
.option-card:hover{border-color:#a78bfa;background:rgba(139,92,246,0.15)}
.option-card.selected{border-color:#c084fc;background:rgba(192,132,252,0.2);box-shadow:0 0 15px rgba(192,132,252,0.2)}
.option-card .opt-title{color:#e9d5ff;font-weight:600}
.option-card .opt-desc{color:#a78bfa;font-size:0.85em;margin-top:4px}
.traits-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.trait-card{background:rgba(0,0,0,0.25);border:1px solid rgba(139,92,246,0.3);border-radius:10px;padding:10px;cursor:pointer;transition:all 0.3s;text-align:center;font-size:0.9em}
.trait-card:hover{border-color:#f472b6;background:rgba(244,114,182,0.1)}
.trait-card.selected{border-color:#f472b6;background:rgba(244,114,182,0.2)}
.male-lead-card{background:rgba(0,0,0,0.25);border:1px solid rgba(139,92,246,0.3);border-radius:12px;padding:15px;cursor:pointer;transition:all 0.3s;margin-bottom:10px}
.male-lead-card:hover{border-color:#c084fc;transform:translateY(-2px)}
.male-lead-card.selected{border-color:#f472b6;background:rgba(244,114,182,0.15);box-shadow:0 0 20px rgba(244,114,182,0.2)}
.male-lead-card .lead-name{color:#e9d5ff;font-size:1.2em;font-weight:600}
.male-lead-card .lead-title{color:#f472b6;font-size:0.85em;margin-top:3px}
.male-lead-card .lead-desc{color:#a78bfa;font-size:0.8em;margin-top:5px;line-height:1.5}
.confirm-btn{width:100%;background:linear-gradient(135deg,#7c3aed,#db2777);border:none;padding:15px;border-radius:12px;color:#fff;font-size:1.1em;cursor:pointer;font-family:'Noto Serif SC',serif;box-shadow:0 0 20px rgba(124,58,237,0.4);transition:all 0.3s;letter-spacing:3px;margin-top:10px}
.confirm-btn:hover{transform:scale(1.02);box-shadow:0 0 30px rgba(219,39,119,0.5)}
.confirm-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:15px}
.stat-item{background:rgba(0,0,0,0.3);border:1px solid rgba(139,92,246,0.3);border-radius:8px;padding:6px 10px;font-size:0.8em}
.stat-item .stat-label{color:#a78bfa}
.stat-item .stat-val{color:#e9d5ff;font-weight:600}
.stat-bar-outer{height:4px;background:rgba(0,0,0,0.4);border-radius:2px;margin-top:3px}
.stat-bar-inner{height:100%;border-radius:2px;background:linear-gradient(90deg,#7c3aed,#db2777);transition:width 0.5s}
.scene-box{background:linear-gradient(135deg,rgba(30,10,60,0.7),rgba(88,28,135,0.3));border:1px solid rgba(192,132,252,0.2);border-radius:16px;padding:25px;margin-bottom:15px;backdrop-filter:blur(8px);min-height:200px;animation:slideIn 0.4s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.scene-text{font-size:1.05em;line-height:2;color:#e8d5f0;text-align:justify;white-space:pre-wrap}
.narrator{color:#a78bfa;font-style:italic;border-left:3px solid #6d28d9;padding-left:12px;margin:10px 0}
.dialogue{color:#f0e6ff;background:rgba(139,92,246,0.1);border-radius:8px;padding:10px 15px;margin:8px 0;border-left:3px solid #c084fc}
.dialogue .speaker{color:#f472b6;font-weight:600}
.choices{display:flex;flex-direction:column;gap:10px;margin-top:15px}
.choice-btn{background:rgba(0,0,0,0.3);border:1px solid rgba(139,92,246,0.4);border-radius:10px;padding:12px 18px;color:#e9d5ff;font-size:0.95em;cursor:pointer;transition:all 0.3s;font-family:'Noto Serif SC',serif;text-align:left;line-height:1.6}
.choice-btn:hover{transform:translateX(5px)}
.choice-btn.safe{border-left:3px solid #22c55e}
.choice-btn.safe:hover{background:rgba(34,197,94,0.1)}
.choice-btn.risky{border-left:3px solid #ef4444}
.choice-btn.risky:hover{background:rgba(239,68,68,0.1)}
.choice-btn.love{border-left:3px solid #f472b6}
.choice-btn.love:hover{background:rgba(244,114,182,0.1)}
.choice-btn.smart{border-left:3px solid #a78bfa}
.choice-btn.smart:hover{background:rgba(167,139,250,0.1)}
.hub-title{text-align:center;font-family:'Ma Shan Zheng',cursive;font-size:2em;color:#e9d5ff;margin-bottom:20px}
.hub-desc-text{text-align:center;color:#a78bfa;font-size:0.9em;margin-bottom:20px;line-height:1.6;font-style:italic}
.hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hub-btn{background:linear-gradient(135deg,rgba(88,28,135,0.5),rgba(30,10,60,0.7));border:1px solid rgba(192,132,252,0.3);border-radius:14px;padding:20px;color:#e9d5ff;font-size:1.1em;cursor:pointer;transition:all 0.3s;font-family:'Noto Serif SC',serif;text-align:center;letter-spacing:2px}
.hub-btn:hover{border-color:#c084fc;transform:translateY(-3px);box-shadow:0 8px 25px rgba(124,58,237,0.3)}
.hub-btn .hub-icon{font-size:1.8em;display:block;margin-bottom:5px}
.hub-btn .hub-desc{font-size:0.75em;color:#a78bfa;margin-top:3px}
.romance-panel{background:rgba(0,0,0,0.3);border:1px solid rgba(244,114,182,0.3);border-radius:12px;padding:15px;margin-bottom:15px}
.romance-title{color:#f472b6;font-size:1em;margin-bottom:8px}
.heart-bar{height:8px;background:rgba(0,0,0,0.4);border-radius:4px;overflow:hidden}
.heart-fill{height:100%;background:linear-gradient(90deg,#f472b6,#fb7185);transition:width 0.8s}
.heart-text{color:#f9a8d4;font-size:0.85em;margin-top:5px}
.event-card{background:rgba(0,0,0,0.25);border:1px solid rgba(192,132,252,0.2);border-radius:12px;padding:15px;margin-bottom:10px;cursor:pointer;transition:all 0.3s}
.event-card:hover{border-color:#a78bfa;background:rgba(139,92,246,0.1)}
.event-card .evt-title{color:#e9d5ff;font-weight:600}
.event-card .evt-type{color:#a78bfa;font-size:0.8em}
.notif{position:fixed;top:20px;right:20px;background:linear-gradient(135deg,#4c1d95,#7c3aed);border:1px solid #c084fc;border-radius:10px;padding:12px 20px;color:#e9d5ff;font-size:0.9em;z-index:100;opacity:0;transform:translateX(120%);transition:all 0.5s;max-width:280px}
.notif.show{opacity:1;transform:translateX(0)}
.notif.positive{background:linear-gradient(135deg,#064e3b,#059669);border-color:#34d399}
.notif.negative{background:linear-gradient(135deg,#7f1d1d,#dc2626);border-color:#f87171}
.notif.love{background:linear-gradient(135deg,#831843,#be185d);border-color:#f472b6}
.save-load-bar{display:flex;gap:8px;margin-bottom:15px}
.sbtn{flex:1;padding:8px;background:rgba(0,0,0,0.3);border:1px solid rgba(139,92,246,0.3);border-radius:8px;color:#a78bfa;cursor:pointer;font-size:0.85em;font-family:'Noto Serif SC',serif;transition:all 0.3s}
.sbtn:hover{border-color:#c084fc;color:#e9d5ff}
.day-badge{display:inline-block;background:rgba(139,92,246,0.3);border:1px solid #7c3aed;border-radius:20px;padding:4px 16px;font-size:0.8em;color:#c4b5fd;margin-bottom:15px;letter-spacing:2px}
.back-btn{background:rgba(0,0,0,0.3);border:1px solid rgba(139,92,246,0.3);border-radius:8px;padding:8px 16px;color:#a78bfa;cursor:pointer;font-family:'Noto Serif SC',serif;margin-bottom:15px;transition:all 0.3s;font-size:0.85em;display:inline-block;border:none}
.back-btn:hover{border-color:#c084fc;color:#e9d5ff}
.cultivate-effect{animation:flashIn 1.5s ease-out}
@keyframes flashIn{0%{opacity:0;transform:scale(0.95)}20%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0}}
</style>
</head>
<body>
<div class="particle" id="particles"></div>
<div class="notif" id="notif"></div>
<div id="game-container">
  <div class="screen active" id="screen-title">
    <div class="title-screen">
      <div class="game-title">仙侠缘</div>
      <div class="game-subtitle">情动九天</div>
      <div style="font-size:0.85em;color:#a78bfa;margin-bottom:40px;line-height:2;text-align:center">红尘万丈，修仙路遥<br>情之所钟，虽死不悔</div>
      <button class="start-btn" onclick="newGame()">开始新游戏</button><br>
      <button class="load-btn" onclick="loadGame()">读取存档</button>
    </div>
  </div>
  <div class="screen" id="screen-create">
    <div class="creation-title">命定之人</div>
    <div class="section-box">
      <div class="section-title">姓名</div>
      <input class="name-input" id="playerName" placeholder="请输入你的名字" maxlength="6">
    </div>
    <div class="section-box">
      <div class="section-title">身世背景</div>
      <div class="option-grid" id="bgOptions"></div>
    </div>
    <div class="section-box">
      <div class="section-title">性格特质（选择一项）</div>
      <div class="traits-grid" id="traitOptions"></div>
    </div>
    <div class="section-box">
      <div class="section-title">命定之人（选择一位男主）</div>
      <div id="maleLeadOptions"></div>
    </div>
    <button class="confirm-btn" id="confirmCreate" onclick="confirmCreation()" disabled>确认创建</button>
  </div>
  <div class="screen" id="screen-game">
    <div class="save-load-bar">
      <button class="sbtn" onclick="saveGame()">存档</button>
      <button class="sbtn" onclick="toTitle()">主页</button>
    </div>
    <div class="day-badge" id="dayBadge"></div>
    <div class="stats-bar" id="statsBar"></div>
    <div id="hubArea"></div>
    <div id="sceneArea"></div>
    <div id="choicesArea"></div>
  </div>
</div>
<script>
const BACKGROUNDS=[
  {id:'noble',title:'世家贵女',desc:'名门望族，自幼锦衣玉食',bonus:{声望:5,银两:10}},
  {id:'orphan',title:'孤儿弃婴',desc:'不知来处，却有坚韧之心',bonus:{战力:3,灵力:3}},
  {id:'survivor',title:'宗门遗孤',desc:'宗门覆灭之夜幸存，背负血仇',bonus:{战力:5,灵力:3}},
  {id:'wander',title:'江湖游医',desc:'四处漂泊，悬壶济世',bonus:{智慧:5,银两:5}},
];
const TRAITS=[
  {id:'brave',title:'勇敢',desc:'直面危险'},
  {id:'wise',title:'睿智',desc:'洞察人心'},
  {id:'kind',title:'善良',desc:'心怀慈悲'},
  {id:'crafty',title:'狡黠',desc:'机敏灵活'},
  {id:'cold',title:'清冷',desc:'外冷内热'},
  {id:'passionate',title:'热忱',desc:'敢爱敢恨'},
];
const MALE_LEADS=[
  {id:'lengyehan',name:'冷夜寒',title:'寒渊剑宗·少宗主',desc:'冷若冰霜的剑道天才，眼中只有剑与复仇，却在遇见你时流露出一丝不易察觉的温度。',color:'#60a5fa'},
  {id:'xiaowuhen',name:'萧无痕',title:'碧落仙岛·神秘岛主',desc:'博学多识，神秘莫测，擅长奇门遁甲，似乎知晓世间一切秘密。',color:'#a78bfa'},
  {id:'subaiyi',name:'苏白衣',title:'天医谷·嫡传弟子',desc:'温润如玉，医术无双，笑起来如春风拂面。',color:'#f0abfc'},
  {id:'xiongmanr',name:'熊蛮儿',title:'蛮荒部落·少主',desc:'粗犷豪爽，力大无穷，对你有着笨拙的温柔。',color:'#fb923c'},
];
const REALMS=['炼气初期','炼气中期','炼气后期','筑基初期','筑基中期','筑基后期','金丹初期','金丹中期','金丹后期'];
const CULT_STEPS=[3,4,5,5,6,7,7,8,0];
const STAT_MAX={灵力:100,战力:100,智慧:100,银两:9999,声望:100};
let G={};
function defaultState(){
  return{playerName:'',background:null,trait:null,maleLead:null,
    stats:{灵力:10,战力:10,智慧:10,银两:20,声望:5,境界:0},
    affection:10,day:1,currentScene:'prologue_lengyehan',sceneData:{},flags:{},cultivationProgress:0};
}
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<30;i++){
    const s=document.createElement('span');
    const sz=Math.random()*4+2;
    s.style.cssText='width:'+sz+'px;height:'+sz+'px;left:'+(Math.random()*100)+'%;animation-duration:'+(Math.random()*15+10)+'s;animation-delay:'+(Math.random()*10)+'s;background:rgba('+(Math.random()>0.5?'180,120,255':'244,114,182')+','+(Math.random()*0.3+0.1)+')';
    c.appendChild(s);
  }
})();
function showScreen(id){document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});document.getElementById('screen-'+id).classList.add('active');}
function notify(msg,type){type=type||'normal';var el=document.getElementById('notif');el.textContent=msg;el.className='notif show '+(type==='normal'?'':type);setTimeout(function(){el.classList.remove('show')},3000);}
function newGame(){G=defaultState();showScreen('create');renderCreation();}
function loadGame(){var d=localStorage.getItem('xiuxian_save');if(!d){notify('没有找到存档','negative');return}G=JSON.parse(d);showScreen('game');renderHub();renderStats();if(G.currentScene){playScene(G.currentScene)}}
function saveGame(){localStorage.setItem('xiuxian_save',JSON.stringify(G));notify('存档成功！','positive')}
function toTitle(){showScreen('title')}
function getLeadName(){var m=MALE_LEADS.find(function(x){return x.id===G.maleLead});return m?m.name:'???'}
function getLeadTitle(){var m=MALE_LEADS.find(function(x){return x.id===G.maleLead});return m?m.title:'???'}
function getBgName(){var b=BACKGROUNDS.find(function(x){return x.id===G.background});return b?b.title:'???'}
function renderCreation(){
  var bgDiv=document.getElementById('bgOptions');
  var bgHTML='';
  BACKGROUNDS.forEach(function(b){bgHTML+='<div class="option-card" data-bg="'+b.id+'" onclick="selectBg(\''+b.id+'\')"><div class="opt-title">'+b.title+'</div><div class="opt-desc">'+b.desc+'</div></div>'});
  bgDiv.innerHTML=bgHTML;
  var trDiv=document.getElementById('traitOptions');
  var trHTML='';
  TRAITS.forEach(function(t){trHTML+='<div class="trait-card" data-trait="'+t.id+'" onclick="selectTrait(\''+t.id+'\')"><div>'+t.title+'</div><div style="font-size:0.75em;color:#a78bfa">'+t.desc+'</div></div>'});
  trDiv.innerHTML=trHTML;
  var mlDiv=document.getElementById('maleLeadOptions');
  var mlHTML='';
  MALE_LEADS.forEach(function(m){mlHTML+='<div class="male-lead-card" data-lead="'+m.id+'" onclick="selectLead(\''+m.id+'\')"><div class="lead-name" style="color:'+m.color+'">'+m.name+'</div><div class="lead-title">'+m.title+'</div><div class="lead-desc">'+m.desc+'</div></div>'});
  mlDiv.innerHTML=mlHTML;
  checkCreateReady();
}
function selectBg(id){G.background=id;document.querySelectorAll('#bgOptions .option-card').forEach(function(c){c.classList.toggle('selected',c.dataset.bg===id)});checkCreateReady()}
function selectTrait(id){G.trait=id;document.querySelectorAll('#traitOptions .trait-card').forEach(function(c){c.classList.toggle('selected',c.dataset.trait===id)});checkCreateReady()}
function selectLead(id){G.maleLead=id;document.querySelectorAll('#maleLeadOptions .male-lead-card').forEach(function(c){c.classList.toggle('selected',c.dataset.lead===id)});checkCreateReady()}
document.getElementById('playerName').addEventListener('input',checkCreateReady);
function checkCreateReady(){var nameOk=document.getElementById('playerName').value.trim().length>0;document.getElementById('confirmCreate').disabled=!(nameOk&&G.background&&G.trait&&G.maleLead)}
function confirmCreation(){
  G.playerName=document.getElementById('playerName').value.trim();
  if(!G.playerName)return notify('请输入名字','negative');
  var bg=BACKGROUNDS.find(function(b){return b.id===G.background});
  if(bg&&bg.bonus)for(var k in bg.bonus)G.stats[k]=(G.stats[k]||0)+bg.bonus[k];
  G.currentScene='prologue_'+G.maleLead;
  G.sceneData={};G.flags={};G.affection=10;G.day=1;G.cultivationProgress=0;
  showScreen('game');renderHub();renderStats();playScene(G.currentScene);
}
function renderStats(){
  var bars=document.getElementById('statsBar');
  var entries=Object.entries(G.stats).filter(function(e){return['灵力','战力','智慧','银两','声望'].indexOf(e[0])>-1});
  var realmName=REALMS[G.stats.境界]||'炼气初期';
  var html='';
  entries.forEach(function(e){
    var pct=Math.min(100,Math.round((e[1]/STAT_MAX[e[0]])*100));
    html+='<div class="stat-item"><div><span class="stat-label">'+e[0]+'</span> <span class="stat-val">'+e[1]+'</span></div><div class="stat-bar-outer"><div class="stat-bar-inner" style="width:'+pct+'%"></div></div></div>';
  });
  html+='<div class="stat-item"><div><span class="stat-label">境界</span> <span class="stat-val">'+realmName+'</span></div></div>';
  bars.innerHTML=html;
}
// ── HUB ──────────────────────────────────────────────────────────
function renderHub(){
  document.getElementById('dayBadge').textContent='第 '+G.day+' 天';
  var lead=getLeadName(),lid=G.maleLead;
  var hp=Math.min(100,G.affection);
  var hl=hp<30?'陌路':hp<50?'好感':hp<70?'心动':hp<90?'深情':'命定';
  var rp='<div class="romance-panel"><div class="romance-title">与 '+lead+' 的羁绊</div><div class="heart-bar"><div class="heart-fill" style="width:'+hp+'%"></div></div><div class="heart-text">好感度：'+G.affection+' / 100 【'+hl+'】</div></div>';
  var h='';
  if(lid==='lengyehan'){

function applyEffect(eff,aff){
  if(!eff)return;
  for(var k in eff){
    if(k==='境界'){
      if(eff[k]>0&&G.stats.境界<REALMS.length-1){
        G.stats.境界+=1;
        notify('突破成功！晋升为 '+REALMS[G.stats.境界]+'！','positive');
      }
    } else {
      G.stats[k]=(G.stats[k]||0)+eff[k];
      if(G.stats[k]<0)G.stats[k]=0;
    }
  }
  if(aff)G.affection=Math.max(0,Math.min(100,G.affection+aff));
  renderStats();
}

function hubRomance(){

  else if(lid==='xiaowuhen')events=getXiaowuhenRomance();

  else events=getDefaultRomance();

  var ev=events[Math.floor(Math.random()*events.length)];
  document.getElementById('hubArea').innerHTML='';

  var html='<div class="scene-box"><div class="scene-text"><div style="text-align:center;margin-bottom:15px"><span style="color:#f472b6;font-size:1.2em">&#128149; '+ev.title+' &#128149;</span></div><div style="color:#a78bfa;margin-bottom:12px">'+ev.desc+'</div><div class="narrator" style="margin-top:15px">'+ev.text.replace(/\n/g,'<br>')+'</div></div></div>';
  document.getElementById('sceneArea').innerHTML=html;

  G.affection=Math.max(0,Math.min(100,G.affection+ag));
  notify('好感度 '+(ag>=0?'+':'')+ag,ag>=10?'love':'positive');
  G.day+=1;
  renderStats();

  var choicesHtml='<div class="choices">';
  if(ev.choices&&ev.choices.length>0){
    ev.choices.forEach(function(c){

}

var SCENES={};
function buildScenes(){}

function playScene(sceneId){
  buildScenes();
  var scene=SCENES[sceneId];
  if(!scene){notify('场景加载失败：'+sceneId,'negative');return}
  G.currentScene=sceneId;
  document.getElementById('hubArea').innerHTML='';
  document.getElementById('sceneArea').innerHTML='<div class="scene-box"><div class="scene-text">'+scene.text.replace(/\n/g,'<br>')+'</div></div>';
  var choicesHTML='<div class="choices">';
  (scene.choices||[]).forEach(function(c,i){
    var label=c.type?'['+c.type+'] ':'';
    var clean=c.text.replace(/^\[(safe|risky|love|smart)\]\s*/,'');
    choicesHTML+='<button class="choice-btn '+(c.type||'')+'" onclick="makeChoice('+i+')">'+label+clean+'</button>';
  });
  choicesHTML+='</div>';
  document.getElementById('choicesArea').innerHTML=choicesHTML;
  window._currentChoices=scene.choices||[];
}

function makeChoice(idx){
  buildScenes();
  var cs=window._currentChoices;
  if(!cs||!cs[idx])return;
  var c=cs[idx];
  if(c.flag)G.flags[c.flag]=true;
  if(c.effect)applyEffect(c.effect,c.affection||0);
  else if(c.affection)G.affection=Math.max(0,Math.min(100,G.affection+c.affection));
  if(c.next==='hub_return'){G.day+=1;renderHub();renderStats();return}
  playScene(c.next);
}
