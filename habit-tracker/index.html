<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>习惯打卡追踪</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin-bottom: 30px; font-size: 28px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card h2 { color: #333; margin-bottom: 15px; font-size: 18px; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .stat-box {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: white;
        }
        .stat-box:nth-child(2) { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .stat-box:nth-child(3) { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .stat-box:nth-child(4) { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .stat-number { font-size: 36px; font-weight: bold; }
        .stat-label { font-size: 14px; opacity: 0.9; }
        .streak-card {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }
        .streak-item {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }
        .streak-item .icon { font-size: 28px; margin-bottom: 5px; }
        .streak-item .count { font-size: 24px; font-weight: bold; color: #333; }
        .streak-item .label { font-size: 12px; color: #888; margin-top: 3px; }
        .habit-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .habit-item {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .habit-icon { font-size: 32px; }
        .habit-info { flex: 1; }
        .habit-name { font-weight: bold; color: #333; font-size: 15px; }
        .habit-target { font-size: 12px; color: #888; margin-top: 2px; }
        .habit-status { font-size: 20px; }
        .progress-section { margin-top: 20px; }
        .progress-item { margin-bottom: 15px; }
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }
        .progress-bar {
            background: #eee;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.5s ease;
        }
        .fill-red { background: linear-gradient(90deg, #f093fb, #f5576c); }
        .fill-blue { background: linear-gradient(90deg, #4facfe, #00f2fe); }
        .fill-green { background: linear-gradient(90deg, #43e97b, #38f9d7); }
        .fill-orange { background: linear-gradient(90deg, #fa709a, #fee140); }
        .fill-purple { background: linear-gradient(90deg, #a8edea, #fed6e3); }
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            margin-top: 20px;
        }
        .week-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .week-nav h3 { color: #333; font-size: 16px; }
        .week-nav button {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }
        .week-nav button:hover { background: #5a6fd6; }
        .day-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }
        .day-header {
            text-align: center;
            font-size: 11px;
            color: #888;
            padding: 4px 0;
        }
        .day-cell {
            aspect-ratio: 1;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .day-cell.completed { background: linear-gradient(135deg, #43e97b, #38f9d7); color: white; }
        .day-cell.partial { background: linear-gradient(135deg, #fed6e3, #a8edea); color: #555; }
        .day-cell.missed { background: #f0f0f0; color: #ccc; }
        .day-cell.future { background: #f8f9fa; color: #ddd; }
        .day-cell.today { border: 2px solid #667eea; }
        .day-cell .icons { font-size: 14px; }
        .recent-list { display: grid; gap: 8px; }
        .recent-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 14px;
        }
        .recent-item .date { color: #888; font-size: 12px; }
        .recent-item .status { font-weight: bold; }
        .recent-item .status.done { color: #43e97b; }
        .recent-item .status.missed { color: #f5576c; }
        .summary-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-row .label { color: #666; }
        .summary-row .value { font-weight: bold; color: #333; }
        .total-liquid {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            border-radius: 15px;
            padding: 20px;
            color: white;
            text-align: center;
            margin-top: 15px;
        }
        .total-liquid .number { font-size: 42px; font-weight: bold; }
        .total-liquid .unit { font-size: 18px; opacity: 0.9; }
        .total-liquid .label { font-size: 14px; opacity: 0.8; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🦶 习惯打卡追踪</h1>

        <!-- 本周概况 -->
        <div class="card">
            <h2>📅 本周打卡概况</h2>
            <div id="weekSummary"></div>
        </div>

        <!-- 每日详情 -->
        <div class="card">
            <h2>📊 近两周记录</h2>
            <div id="recentRecords"></div>
        </div>

        <!-- 本周进度 -->
        <div class="card">
            <h2>🎯 本周目标完成率</h2>
            <div id="weekProgress"></div>
        </div>

        <div class="footer">
            数据更新于 <span id="updateDate"></span> | 坚持就是胜利！💪
        </div>
    </div>

<script>
const DATA = {
  "习惯列表": [
    {
      "id": "paojiao",
      "name": "泡脚",
      "icon": "🦶",
      "target": "每日",
      "unit": ""
    },
    {
      "id": "heshui",
      "name": "每日液体",
      "icon": "💧",
      "target": "每日2000ml",
      "unit": "ml"
    },
    {
      "id": "duanlian",
      "name": "锻炼",
      "icon": "🏃",
      "target": "每周3-4次",
      "unit": ""
    },
    {
      "id": "shuijiao",
      "name": "22点前睡觉",
      "icon": "😴",
      "target": "每日",
      "unit": ""
    },
    {
      "id": "dabian",
      "name": "大便",
      "icon": "💩",
      "target": "每日1次",
      "unit": ""
    },
    {
      "id": "chiyao",
      "name": "吃药",
      "icon": "💊",
      "target": "每日",
      "unit": ""
    },
    {
      "id": "heparin",
      "name": "肝素针",
      "icon": "💉",
      "target": "每天",
      "unit": ""
    }
  ],
  "打卡记录": [
    {
      "日期": "2026-03-23",
      "周": "周日",
      "paojiao": 0,
      "heshui": 0,
      "duanlian": 0,
      "shuijiao": 0,
      "dabian": 1,
      "_简版": true
    },
    {
      "日期": "2026-03-24",
      "周": "周一",
      "paojiao": 0,
      "heshui": 0,
      "duanlian": 0,
      "shuijiao": 0,
      "dabian": 1,
      "_简版": true
    },
    {
      "日期": "2026-03-25",
      "周": "周二",
      "paojiao": 0,
      "heshui": 0,
      "duanlian": 0,
      "shuijiao": 0,
      "dabian": 1,
      "_简版": true
    },
    {
      "日期": "2026-03-28",
      "周": "周六",
      "paojiao": 0,
      "heshui": 3850,
      "duanlian": 30,
      "shuijiao": 1,
      "dabian": 0
    },
    {
      "日期": "2026-03-29",
      "周": "周日",
      "paojiao": 1,
      "heshui": 1000,
      "doujiang": 400,
      "milk": 0,
      "water": 400,
      "duanlian": 30,
      "shuijiao": 0,
      "dabian": 0,
      "chiyao": 1,
      "zhongyao": 200
    },
    {
      "日期": "2026-03-30",
      "周": "周一",
      "paojiao": 1,
      "heshui": 1550,
      "doujiang": 400,
      "milk": 0,
      "zhongyao": 200,
      "duanlian": 0,
      "shuijiao": 1,
      "dabian": 1,
      "chiyao": 0,
      "water": 950
    },
    {
      "日期": "2026-04-03",
      "周": "周五",
      "paojiao": 0,
      "heshui": 750,
      "duanlian": 0,
      "shuijiao": 0,
      "dabian": 1,
      "chiyao": 0,
      "water": 50,
      "doujiang": 500,
      "zhongyao": 200
    },
    {
      "日期": "2026-04-05",
      "周": "周日",
      "paojiao": 0,
      "heshui": 200,
      "duanlian": 0,
      "shuijiao": 0,
      "dabian": 0,
      "chiyao": 0,
      "heparin": 1,
      "doujiang": 0,
      "zhongyao": 0
    },
    {
      "日期": "2026-04-06",
      "周": "周一",
      "paojiao": 0,
      "heshui": 300,
      "duanlian": 1,
      "shuijiao": 0,
      "dabian": 0,
      "chiyao": 0,
      "heparin": 1,
      "doujiang": 500,
      "zhongyao": 0
    }
  ]
};

// 从打卡记录和最新数据合并
function getAllRecords() {
  const records = JSON.parse(JSON.stringify(DATA['打卡记录'] || []));
  // 加入最新日期条目（去重，保留最新的）
  const latestKeys = Object.keys(DATA).filter(k => k.match(/^\d{4}-\d{2}-\d{2}$/));
  latestKeys.forEach(date => {
    const existing = records.findIndex(r => r['日期'] === date);
    const entry = DATA[date];
    const newRec = {
      '日期': date,
      '周': ['周日','周一','周二','周三','周四','周五','周六'][new Date(date).getDay()],
      'paojiao': entry['泡脚'] ? 1 : 0,
      'heshui': entry['喝水'] || 0,
      'duanlian': entry['运动'] ? 1 : 0,
      'shuijiao': entry['早睡'] ? 1 : 0,
      'dabian': 0,
      'chiyao': 0,
      'heparin': 1,
      'doujiang': entry['doujiang'] || 0,
      'zhongyao': Array.isArray(entry['中药']) ? entry['中药'].length * 200 : 0
    };
    if (existing >= 0) {
      records[existing] = newRec;
    } else {
      records.push(newRec);
    }
  });
  return records.sort((a,b) => a['日期'].localeCompare(b['日期']));
}

function getWeekDates() {
  const today = new Date();
  const dayOfWeek = today.getDay();
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dayOfWeek === 0 ? 6 : dayOfWeek - 1));
  const dates = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    dates.push(d.toISOString().split('T')[0]);
  }
  return dates;
}

function getRecordByDate(date, records) {
  return records.find(r => r['日期'] === date) || null;
}

function isCompleted(habit, record) {
  if (!record) return false;
  if (habit.unit === 'ml') {
    return (record[habit.id] || 0) >= 2000;
  }
  return (record[habit.id] || 0) > 0;
}

function renderWeekSummary() {
  const records = getAllRecords();
  const weekDates = getWeekDates();
  const today = new Date().toISOString().split('T')[0];
  const habits = DATA['习惯列表'];
  
  let html = '<div class="day-grid"><div class="day-header">一</div><div class="day-header">二</div><div class="day-header">三</div><div class="day-header">四</div><div class="day-header">五</div><div class="day-header">六</div><div class="day-header">日</div></div>';
  html += '<div class="day-grid">';
  weekDates.forEach(date => {
    const rec = getRecordByDate(date, records);
    const isToday = date === today;
    const isFuture = date > today;
    const completedCount = habits.filter(h => isCompleted(h, rec)).length;
    const totalCount = habits.length;
    let cls = isFuture ? 'future' : (completedCount >= totalCount * 0.6 ? 'completed' : completedCount > 0 ? 'partial' : 'missed');
    if (isToday) cls += ' today';
    const icons = [];
    if (rec) {
      if (rec.paojiao) icons.push('🦶');
      if ((rec.heshui || 0) >= 500) icons.push('💧');
      if (rec.duanlian) icons.push('🏃');
      if (rec.shuijiao) icons.push('😴');
      if (rec.chiyao) icons.push('💊');
      if (rec.heparin) icons.push('💉');
    }
    html += `<div class="day-cell ${cls}"><div>${date.slice(5)}</div><div class="icons">${icons.slice(0,3).join('')}</div></div>`;
  });
  html += '</div>';
  
  // 本周液体总量
  let totalLiquid = 0;
  weekDates.forEach(date => {
    const rec = getRecordByDate(date, records);
    if (rec) totalLiquid += (rec.heshui || 0) + (rec.doujiang || 0) + (rec.zhongyao || 0);
  });
  html += `<div class="total-liquid"><div class="number">${totalLiquid}</div><div class="unit">ml</div><div class="label">本周液体合计（含中药·目标2000ml/日）</div></div>`;
  
  document.getElementById('weekSummary').innerHTML = html;
}

function renderRecentRecords() {
  const records = getAllRecords();
  const habits = DATA['习惯列表'];
  const recent = records.slice(-14);
  
  let html = '<div class="recent-list">';
  recent.reverse().forEach(rec => {
    const date = rec['日期'];
    const dayNames = ['周日','周一','周二','周三','周四','周五','周六'];
    const d = new Date(date);
    const dayName = dayNames[d.getDay()];
    const today = new Date().toISOString().split('T')[0];
    const isToday = date === today;
    
    const items = [];
    habits.forEach(h => {
      if (h.unit === 'ml') {
        const val = rec[h.id] || 0;
        if (val > 0) items.push(`${h.icon} ${h.name}: ${val}ml`);
      } else {
        if (rec[h.id] > 0) items.push(`${h.icon} ${h.name}`);
      }
    });
    if (rec.doujiang > 0) items.push(`🥛 豆浆: ${rec.doujiang}ml`);
    if (rec.zhongyao > 0) items.push(`🍵 中药: ${rec.zhongyao}ml`);
    
    const status = items.length >= 4 ? 'done' : items.length > 0 ? 'done' : 'missed';
    html += `<div class="recent-item">
      <div><span class="status ${status}">${date} ${dayName}${isToday ? ' [今天]' : ''}</span>
      <div style="font-size:12px;color:#888;margin-top:3px">${items.length > 0 ? items.join(' · ') : '无记录'}</div></div>
    </div>`;
  });
  html += '</div>';
  document.getElementById('recentRecords').innerHTML = html;
}

function renderWeekProgress() {
  const records = getAllRecords();
  const weekDates = getWeekDates();
  const habits = DATA['习惯列表'];
  
  // 计算本周每天完成情况
  const weekDays = weekDates.map(date => {
    const rec = getRecordByDate(date, records);
    const result = { date, record: rec };
    habits.forEach(h => {
      if (h.unit === 'ml') {
        result[h.id] = (rec && (rec[h.id] || 0) >= 2000) ? 1 : 0;
      } else {
        result[h.id] = (rec && rec[h.id] > 0) ? 1 : 0;
      }
    });
    return result;
  });
  
  const actualDays = weekDays.filter(d => d.date <= new Date().toISOString().split('T')[0]).length;
  
  let html = '<div class="progress-section">';
  habits.forEach(h => {
    const done = weekDays.filter(d => d[h.id] > 0).length;
    const pct = actualDays > 0 ? Math.round(done / actualDays * 100) : 0;
    const color = pct >= 80 ? 'fill-green' : pct >= 50 ? 'fill-blue' : pct > 0 ? 'fill-orange' : 'fill-red';
    const targetLabel = h.unit === 'ml' ? `${done}/${actualDays}天(≥2000ml)` : `${done}/${actualDays}天`;
    html += `<div class="progress-item">
      <div class="progress-label"><span>${h.icon} ${h.name}</span><span>${pct}% (${targetLabel})</span></div>
      <div class="progress-bar"><div class="progress-fill ${color}" style="width:${pct}%"></div></div>
    </div>`;
  });
  
  // 锻炼特别统计（每周3-4次）
  const exerciseDays = weekDays.filter(d => d.duanlian > 0).length;
  const exPct = Math.round(exerciseDays / 4 * 100);
  html += `<div class="progress-item">
    <div class="progress-label"><span>🏃 锻炼（每周3-4次）</span><span>${exerciseDays}/4次</span></div>
    <div class="progress-bar"><div class="progress-fill fill-purple" style="width:${Math.min(100,exPct)}%"></div></div>
  </div>`;
  
  html += '</div>';
  document.getElementById('weekProgress').innerHTML = html;
}

function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('updateDate').textContent = today;
  renderWeekSummary();
  renderRecentRecords();
  renderWeekProgress();
}

init();
</script>
</body>
</html>
