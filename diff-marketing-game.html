<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>淘宝新店突围战 - 差异化营销策略</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }

#start-screen { text-align: center; padding-top: 40px; }
.title { font-size: 2.2em; color: #ffd700; margin-bottom: 10px; }
.subtitle { font-size: 1.1em; color: #aaa; margin-bottom: 30px; }
.start-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 16px 48px; font-size: 1.2em; border-radius: 50px; cursor: pointer; transition: transform 0.2s; }
.start-btn:hover { transform: scale(1.05); }
.game-desc { background: #16213e; border-radius: 16px; padding: 24px; margin-top: 30px; text-align: left; }
.game-desc h3 { color: #ffd700; margin-bottom: 12px; }
.game-desc p { color: #ccc; line-height: 1.8; font-size: 0.95em; margin-bottom: 8px; }

#game-screen { display: none; }
.situation-box { background: linear-gradient(135deg, #16213e, #0f3460); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.situation-title { color: #ffd700; font-size: 1.1em; margin-bottom: 12px; }
.situation-text { color: #ddd; line-height: 1.9; font-size: 1em; margin-bottom: 12px; }
.data-panel { background: #0f3460; border-radius: 12px; padding: 16px; margin-top: 16px; }
.data-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.95em; }
.data-row:last-child { border-bottom: none; }
.data-label { color: #aaa; }
.data-value { color: #ffd700; font-weight: bold; }
.data-value.bad { color: #ff6b6b; }
.data-value.good { color: #51cf66; }

.question { font-size: 1.1em; color: #fff; margin-bottom: 16px; line-height: 1.7; }
.think-hint { background: rgba(255, 215, 0, 0.1); border-left: 3px solid #ffd700; padding: 10px 14px; margin-bottom: 16px; font-size: 0.9em; color: #ffd700; border-radius: 0 8px 8px 0; }

.options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.option-btn { background: #16213e; border: 2px solid #334; color: #ddd; padding: 14px 16px; border-radius: 12px; cursor: pointer; font-size: 0.95em; text-align: left; transition: all 0.2s; line-height: 1.6; min-height: 60px; }
.option-btn:hover { border-color: #667eea; background: #1a237e; color: #fff; }
.option-btn.selected { border-color: #ffd700; background: rgba(255, 215, 0, 0.15); color: #ffd700; }
.option-btn.correct { border-color: #51cf66; background: rgba(81, 207, 102, 0.15); color: #51cf66; }
.option-btn.wrong { border-color: #ff6b6b; background: rgba(255, 107, 107, 0.15); color: #ff6b6b; }
.option-btn.neutral { border-color: #ffd700; background: rgba(255, 215, 0, 0.1); color: #ffd700; }
.option-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.action-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 14px 36px; font-size: 1em; border-radius: 50px; cursor: pointer; margin-top: 20px; }
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

#result-screen { display: none; text-align: center; padding-top: 40px; }
.result-title { font-size: 1.8em; color: #ffd700; margin-bottom: 16px; }
.result-score { font-size: 1.2em; color: #aaa; margin-bottom: 30px; }
.result-detail { background: #16213e; border-radius: 16px; padding: 24px; text-align: left; margin-bottom: 24px; }
.result-detail h4 { color: #ffd700; margin-bottom: 12px; }
.result-detail p { color: #ccc; line-height: 1.8; margin-bottom: 8px; font-size: 0.95em; }
.round-result { background: #0f3460; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.round-result .round-title { color: #667eea; font-size: 0.9em; margin-bottom: 8px; }
.round-result .choice { color: #ffd700; margin-bottom: 4px; }
.round-result .outcome { color: #aaa; font-size: 0.9em; }

.step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
.step-dot { width: 10px; height: 10px; border-radius: 50%; background: #334; }
.step-dot.active { background: #ffd700; }
.step-dot.done { background: #51cf66; }

.strategy-list { background: #0f3460; border-radius: 12px; padding: 16px; margin-top: 16px; }
.strategy-tag { display: inline-block; background: rgba(102,126,234,0.2); color: #667eea; padding: 4px 10px; border-radius: 20px; font-size: 0.85em; margin: 3px; }

.hidden { display: none !important; }
@media (max-width: 600px) {
  .options { grid-template-columns: 1fr; }
  .title { font-size: 1.6em; }
}
</style>
</head>
<body>
<div class="container">

<div id="start-screen">
  <div class="title">🛒 淘宝新店突围战</div>
  <div class="subtitle">7大差异化营销策略 · 沉浸式决策游戏</div>
  <button class="start-btn" id="startBtn">开始挑战</button>
  <div class="game-desc">
    <h3>📋 游戏说明</h3>
    <p>你是淘宝新开业的美妆店「颜究社」掌柜。面临7家同类竞争店铺，你需要运用<strong style="color:#ffd700">差异化营销策略</strong>来突围。</p>
    <p>⚠️ 每一步决策后，你会看到<strong style="color:#ffd700">真实数据反馈</strong>——选错策略会直接影响店铺评分、流量、转化率。</p>
    <p>💡 涵盖7大策略：商品差异化、价格差异化、渠道差异化、消费者差异化、品牌差异化、服务差异化、推广差异化。</p>
  </div>
  <div class="strategy-list">
    <div style="color:#aaa;font-size:0.9em;margin-bottom:8px;">📚 本游戏覆盖的7大差异化策略：</div>
    <span class="strategy-tag">商品差异化</span>
    <span class="strategy-tag">价格差异化</span>
    <span class="strategy-tag">渠道差异化</span>
    <span class="strategy-tag">消费者差异化</span>
    <span class="strategy-tag">品牌差异化</span>
    <span class="strategy-tag">服务差异化</span>
    <span class="strategy-tag">推广差异化</span>
  </div>
</div>

<div id="game-screen">
  <div class="step-indicator" id="stepIndicator"></div>  
  <div class="situation-box">
    <div class="situation-title" id="situationTitle"></div>
    <div class="situation-text" id="situationText"></div>
    <div class="data-panel" id="dataPanel"></div>
  </div>
  <div class="question" id="questionText"></div>
  <div class="think-hint" id="thinkHint">🤔 思考提示：这个困境涉及哪种差异化策略？选择时要看对手没有而你有的独特优势是什么？</div>
  <div class="options" id="optionsContainer"></div>
  <div style="text-align:center;">
    <button class="action-btn" id="actionBtn" disabled>请先选择一个策略</button>
  </div>
</div>

<div id="result-screen">
  <div class="result-title" id="resultTitle"></div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-detail" id="resultDetail"></div>
  <button class="start-btn" onclick="restartGame()">再玩一次</button>
</div>

</div>

// ===== 游戏状态 =====
let currentRound = 0;
let selectedOption = null;
let roundResults = [];
let gamePhase = 'choice'; // 'choice' -> 'feedback' -> 'next'

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-screen').style.display = 'block';
  currentRound = 0;
  roundResults = [];
  loadRound(currentRound);
}

function loadRound(roundIndex) {
  const round = gameData.rounds[roundIndex];
  gamePhase = 'choice';
  
  // 更新步骤指示器
  const indicator = document.getElementById('stepIndicator');
  indicator.innerHTML = gameData.rounds.map((_, i) => 
    `<div class="step-dot ${i < roundIndex ? 'done' : i === roundIndex ? 'active' : ''}"></div>`
  ).join('');

  document.getElementById('situationTitle').textContent = round.situationTitle;
  document.getElementById('situationText').innerHTML = round.situationText;
  
  const dataPanel = document.getElementById('dataPanel');
  dataPanel.innerHTML = round.data.map(d => 
    `<div class="data-row">
      <span class="data-label">${d.label}</span>
      <span class="data-value ${d.type === 'bad' ? 'bad' : d.type === 'good' ? 'good' : ''}">${d.value}</span>
    </div>`
  ).join('');

  document.getElementById('questionText').textContent = round.question;
  document.getElementById('thinkHint').textContent = '🤔 思考提示：这个困境涉及哪种策略？对手没有而你有的独特优势是什么？';

  // 随机选项
  const shuffledOpts = shuffle(round.options.map((opt, i) => ({...opt, idx: i})));
  const container = document.getElementById('optionsContainer');
  container.innerHTML = shuffledOpts.map((opt, i) => 
    `<button class="option-btn" onclick="selectOption('${opt.key}', this)">${opt.text}</button>`
  ).join('');
  
  selectedOption = null;
  const btn = document.getElementById('actionBtn');
  btn.disabled = true;
  btn.textContent = '请先选择一个策略';
  btn.onclick = null;
}

function selectOption(key, btn) {
  if (gamePhase !== 'choice') return;
  
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOption = key;
  
  const btnEl = document.getElementById('actionBtn');
  btnEl.disabled = false;
  btnEl.textContent = '确认策略';
  btnEl.onclick = confirmChoice;
}

function confirmChoice() {
  if (!selectedOption || gamePhase !== 'choice') return;
  
  const round = gameData.rounds[currentRound];
  const feedback = round.feedback[selectedOption];
  
  gamePhase = 'feedback';
  
  // 禁用所有选项，显示对错
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.classList.contains('selected')) {
      if (selectedOption === 'correct') b.classList.add('correct');
      else b.classList.add('wrong');
    }
  });

  // 显示反馈
  const container = document.getElementById('optionsContainer');
  const feedbackColor = selectedOption === 'correct' ? '#51cf66' : selectedOption === 'wrong' ? '#ff6b6b' : '#ffd700';
  const feedbackBg = selectedOption === 'correct' ? 'rgba(81,207,102,0.1)' : selectedOption === 'wrong' ? 'rgba(255,107,107,0.1)' : 'rgba(255,215,0,0.1)';
  container.innerHTML = `
    <div style="grid-column: 1/-1; background: ${feedbackBg}; border-radius: 12px; padding: 20px; border: 2px solid ${feedbackColor}">
      <div style="color: ${feedbackColor}; font-size: 1.1em; font-weight: bold; margin-bottom: 10px;">${feedback.title}</div>
      <div style="color: #ccc; line-height: 1.8; font-size: 0.95em;">${feedback.text}</div>
    </div>
  `;

  // 记录结果
  roundResults.push({
    round: currentRound + 1,
    strategy: round.strategy,
    choice: selectedOption,
    feedback: feedback
  });

  // 下一按钮
  const btn = document.getElementById('actionBtn');
  btn.disabled = false;
  if (currentRound < gameData.rounds.length - 1) {
    btn.textContent = '下一关 →';
    btn.onclick = goNextRound;
  } else {
    btn.textContent = '查看战报';
    btn.onclick = showResult;
  }
}

function goNextRound() {
  currentRound++;
  loadRound(currentRound);
}

function showResult() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const correctCount = roundResults.filter(r => r.choice === 'correct').length;
  const total = roundResults.length;
  
  let title = '';
  if (correctCount === 7) title = '🏆 差异化营销大师！';
  else if (correctCount >= 5) title = '🌟 优秀掌柜！';
  else if (correctCount >= 3) title = '📚 潜力无限';
  else title = '💡 继续学习';

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').textContent = `策略正确率：${correctCount}/${total}` ;
  
  const detail = document.getElementById('resultDetail');
  detail.innerHTML = `
    <h4>📊 各关决策回顾</h4>
    ${roundResults.map((r, i) => `
      <div class="round-result">
        <div class="round-title">第${i+1}关 · ${r.strategy}</div>
        <div class="choice">决策：${r.choice === 'correct' ? '✅ 正确' : r.choice === 'wrong' ? '❌ 有误' : '⚠️ 欠佳'}</div>
        <div class="outcome">${r.feedback.title.replace(/^[✅❌⚠️]/, '')}</div>
      </div>
    `).join('')}
    
    <h4 style="margin-top: 20px;">💡 核心收获</h4>
    <p><strong style="color:#ffd700;">差异化的本质：</strong>不是比对手便宜，而是让特定人群觉得\"这家店就是为我开的\"。</p>
    <p style="margin-top:6px;"><strong style="color:#ffd700;">7大策略回顾：</strong></p>
    <p>📦 商品差异化——找到产品独特的物理或感知价值</p>
    <p>💰 价格差异化——不是最低价，而是目标用户愿意接受的最优价</p>
    <p>📱 渠道差异化——用户在哪你去哪，而不是硬砸广告</p>
    <p>👩 消费者差异化——聚焦某一类用户，而不是满足所有人</p>
    <p>🏥 品牌差异化——让用户记住你\"不一样在哪里\"</p>
    <p>🤝 服务差异化——用服务承诺建立信任壁垒</p>
    <p>🎯 推广差异化——精准触达，而不是广撒网</p>
  `;
}

function restartGame() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').classList.remove('hidden');
}

document.getElementById('startBtn').onclick = startGame;
</script>
