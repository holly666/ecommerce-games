<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>二次元小店突围战 - 差异化营销策略</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }

#start-screen { text-align: center; padding-top: 40px; }
.title { font-size: 2.2em; color: #ffd700; margin-bottom: 10px; }
.subtitle { font-size: 1.1em; color: #aaa; margin-bottom: 30px; }
.start-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 16px 48px; font-size: 1.2em; border-radius: 50px; cursor: pointer; transition: transform 0.2s; }
.start-btn:hover { transform: scale(1.05); }
.game-desc { background: #16213e; border-radius: 16px; padding: 24px; margin-top: 30px; text-align: left; }
.game-desc h3 { color: #ffd700; margin-bottom: 12px; }
.game-desc p { color: #ccc; line-height: 1.8; font-size: 0.95em; margin-bottom: 8px; }

#game-screen { display: none; }
.situation-box { background: linear-gradient(135deg, #16213e, #0f3460); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.situation-title { color: #ffd700; font-size: 1.1em; margin-bottom: 12px; }
.situation-text { color: #ddd; line-height: 1.9; font-size: 1em; }
.data-panel { background: #0f3460; border-radius: 12px; padding: 16px; margin-top: 16px; display: flex; flex-wrap: wrap; gap: 12px; justify-content: space-between; }
.data-item { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 10px 14px; min-width: 120px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
.data-label { color: #aaa; font-size: 0.85em; white-space: nowrap; }
.data-value { color: #ffd700; font-weight: bold; font-size: 0.95em; white-space: nowrap; }
.data-value.bad { color: #ff6b6b; }
.data-value.good { color: #51cf66; }

.question { font-size: 1.1em; color: #fff; margin-bottom: 16px; line-height: 1.7; }
.think-hint { background: rgba(255, 215, 0, 0.1); border-left: 3px solid #ffd700; padding: 10px 14px; margin-bottom: 16px; font-size: 0.9em; color: #ffd700; border-radius: 0 8px 8px 0; }

.options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.option-btn { background: #16213e; border: 2px solid #334; color: #ddd; padding: 12px 16px; border-radius: 12px; cursor: pointer; font-size: 0.95em; text-align: left; transition: all 0.2s; line-height: 1.5; min-height: 60px; display: flex; align-items: center; }
.option-btn:hover { border-color: #667eea; background: #1a237e; color: #fff; }
.option-btn.selected { border-color: #ffd700; background: rgba(255, 215, 0, 0.15); color: #ffd700; }
.option-btn.correct { border-color: #51cf66; background: rgba(81, 207, 102, 0.15); color: #51cf66; }
.option-btn.wrong { border-color: #ff6b6b; background: rgba(255, 107, 107, 0.15); color: #ff6b6b; }
.option-btn.neutral { border-color: #ffd700; background: rgba(255, 215, 0, 0.1); color: #ffd700; }
.option-btn:disabled { opacity: 0.6; cursor: not-allowed; }

.action-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 14px 36px; font-size: 1em; border-radius: 50px; cursor: pointer; margin-top: 20px; }
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

#result-screen { display: none; text-align: center; padding-top: 40px; }
.result-title { font-size: 1.8em; color: #ffd700; margin-bottom: 16px; }
.result-score { font-size: 1.2em; color: #aaa; margin-bottom: 30px; }
.result-detail { background: #16213e; border-radius: 16px; padding: 24px; text-align: left; margin-bottom: 24px; }
.result-detail h4 { color: #ffd700; margin-bottom: 12px; }
.result-detail p { color: #ccc; line-height: 1.8; margin-bottom: 8px; font-size: 0.95em; }
.round-result { background: #0f3460; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.round-result .round-title { color: #667eea; font-size: 0.9em; margin-bottom: 8px; }
.round-result .choice { color: #ffd700; margin-bottom: 4px; }
.round-result .outcome { color: #aaa; font-size: 0.9em; }

.step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
.step-dot { width: 10px; height: 10px; border-radius: 50%; background: #334; }
.step-dot.active { background: #ffd700; }
.step-dot.done { background: #51cf66; }

.strategy-tags { background: #0f3460; border-radius: 12px; padding: 16px; margin-top: 16px; }
.strategy-tag { display: inline-block; background: rgba(102,126,234,0.2); color: #667eea; padding: 4px 10px; border-radius: 20px; font-size: 0.85em; margin: 3px; }

.hidden { display: none !important; }
@media (max-width: 600px) { .options { grid-template-columns: 1fr; } .title { font-size: 1.6em; } }
</style>
</head>
<body>
<div class="container">

<div id="start-screen">
  <div class="title">🎮 二次元小店突围战</div>
  <div class="subtitle">差异化营销策略 · 沉浸式决策游戏</div>
  <button class="start-btn" id="startBtn">开始挑战</button>
  <div class="game-desc">
    <h3>📋 游戏说明</h3>
    <p>你是「次元杂货铺」淘宝店的掌柜，主营二次元周边。<br>同类店铺竞争激烈，你需要做出正确的经营决策。</p>
    <p>⚠️ 每个决策都会影响店铺数据——选错策略会导致亏损、流量下滑。</p>
    <p>💡 这个游戏考察的是你对<strong style="color:#ffd700">营销策略</strong>的理解，不是背知识点。</p>
  </div>
  <div class="strategy-tags">
    <div style="color:#aaa;font-size:0.9em;margin-bottom:8px;">📚 游戏中你会用到7种营销策略（题目不会提示是哪种）：</div>
    <span class="strategy-tag">策略类型1</span>
    <span class="strategy-tag">策略类型2</span>
    <span class="strategy-tag">策略类型3</span>
    <span class="strategy-tag">策略类型4</span>
    <span class="strategy-tag">策略类型5</span>
    <span class="strategy-tag">策略类型6</span>
    <span class="strategy-tag">策略类型7</span>
  </div>
</div>

<div id="game-screen">
  <div class="step-indicator" id="stepIndicator"></div>  
  <div class="situation-box">
    <div class="situation-title" id="situationTitle"></div>
    <div class="situation-text" id="situationText"></div>
    <div class="data-panel" id="dataPanel"></div>
  </div>
  <div class="question" id="questionText"></div>
  <div class="think-hint" id="thinkHint">🤔 思考提示：仔细看数据，想清楚这个问题的关键是什么。</div>
  <div class="options" id="optionsContainer"></div>
  <div style="text-align:center;">
    <button class="action-btn" id="actionBtn" disabled>请先选择一个策略</button>
  </div>
</div>

<div id="result-screen">
  <div class="result-title" id="resultTitle"></div>
  <div class="result-score" id="resultScore"></div>
  <div class="result-detail" id="resultDetail"></div>
  <button class="start-btn" onclick="restartGame()">再玩一次</button>
</div>

</div>

      situationTitle: "🗓️ 第七关 · 终极复盘",
      situationText: "经过6轮决策，你的店铺已经形成了独特风格，回头看第一关的选择，你有什么感悟？",
      data: [
        { label: "店铺月销", value: "1.2万", type: "good" },
        { label: "用户复购率", value: "48%", type: "good" },
        { label: "DSR评分", value: "4.7", type: "good" },
        { label: "用户对你的认知", value: "\"专业的学生党周边店\"", type: "good" }
      ],
      question: "回顾整个过程，你认为第一关面对价格战时，最正确的做法是什么？",
      options: [
        { text: "跟着打折——先用低价把用户拉过来再说", key: "wrong" },
        { text: "找到自己最强的点——不是跟对手比价格，是让用户觉得\"这家店不一样\"", key: "correct" },
        { text: "观望等待——让对手先打，等促销结束再说", key: "wrong" },
        { text: "降价不如送赠品——用小恩小惠吸引用户", key: "neutral" }
      ],
      feedback: {
        correct: {
          title: "✅ 你已经理解了差异化营销的精髓！",
          strategy: "差异化思维（综合）",
          text: "营销的本质不是\"我比对手便宜\"，而是\"我在对手没有的方向建立优势\"。价格战是最低效的竞争方式——因为永远有人比你便宜。找到自己最强的点，让用户因为\"不一样\"而选择你，这才是可持续的商业模式。"
        },
        wrong: {
          title: "❌ 价格战没有赢家",
          text: "价格战的结果是全行业利润崩塌。你打价格战，对手也打，最后谁都不赚钱。用户只记住\"谁便宜\"，不记住\"谁好\"。"
        },
        neutral: {
          title: "⚠️ 赠品是辅助手段，不是核心竞争力",
          text: "赠品可以短期促单，但用户记住的是\"赠品\"，不是\"这家店\"。没有差异化支撑的赠品，只是变相降价。"
        }
      }
    }
  ]
};

let currentRound = 0;
let selectedOption = null;
let roundResults = [];
let gamePhase = 'choice';

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-screen').style.display = 'block';
  currentRound = 0;
  roundResults = [];
  loadRound(currentRound);
}

function loadRound(roundIndex) {
  const round = gameData.rounds[roundIndex];
  gamePhase = 'choice';
  
  const existingNextBtn = document.getElementById('nextRoundExtraBtn');
  if (existingNextBtn) existingNextBtn.remove();
  
  const indicator = document.getElementById('stepIndicator');
  indicator.innerHTML = gameData.rounds.map((_, i) => 
    `<div class="step-dot ${i < roundIndex ? 'done' : i === roundIndex ? 'active' : ''}"></div>`
  ).join('');

  document.getElementById('situationTitle').textContent = round.situationTitle;
  document.getElementById('situationText').innerHTML = round.situationText;
  
  const dataPanel = document.getElementById('dataPanel');
  dataPanel.innerHTML = round.data.map(d => 
    `<div class="data-item">
      <span class="data-label">${d.label}</span>
      <span class="data-value ${d.type === 'bad' ? 'bad' : d.type === 'good' ? 'good' : ''}">${d.value}</span>
    </div>`
  ).join('');

  document.getElementById('questionText').textContent = round.question;
  document.getElementById('thinkHint').textContent = '🤔 思考提示：仔细看数据，想清楚这个问题的关键是什么。';

  const shuffledOptions = shuffle(round.options);
  const letters = ['A', 'B', 'C', 'D'];
  const container = document.getElementById('optionsContainer');
  container.innerHTML = shuffledOptions.map((opt, i) => 
    `<button class="option-btn" onclick="selectOption('${opt.key}', this)"><span style="font-weight:bold;color:#ffd700;margin-right:10px;font-size:1.1em;">${letters[i]}</span>${opt.text}</button>`
  ).join('');
  
  selectedOption = null;
  const btn = document.getElementById('actionBtn');
  btn.disabled = true;
  btn.textContent = '请先选择一个策略';
  btn.onclick = null;
}

function selectOption(key, btn) {
  if (gamePhase !== 'choice') return;
  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedOption = key;
  const btnEl = document.getElementById('actionBtn');
  btnEl.disabled = false;
  btnEl.textContent = '确认策略';
  btnEl.onclick = confirmChoice;
}

function confirmChoice() {
  if (!selectedOption || gamePhase !== 'choice') return;
  const round = gameData.rounds[currentRound];
  const feedback = round.feedback[selectedOption];
  gamePhase = 'feedback';
  
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.classList.contains('selected')) {
      if (selectedOption === 'correct') b.classList.add('correct');
      else b.classList.add('wrong');
    }
  });

  const container = document.getElementById('optionsContainer');
  const fc = selectedOption === 'correct' ? '#51cf66' : selectedOption === 'wrong' ? '#ff6b6b' : '#ffd700';
  const fb = selectedOption === 'correct' ? 'rgba(81,207,102,0.1)' : selectedOption === 'wrong' ? 'rgba(255,107,107,0.1)' : 'rgba(255,215,0,0.1)';
  const strategyBadge = selectedOption === 'correct' && feedback.strategy
    ? `<div style="display:inline-block; background:rgba(81,207,102,0.2); color:#51cf66; padding:4px 12px; border-radius:20px; font-size:0.85em; margin-bottom:10px;">🏷️ ${feedback.strategy}</div>` : '';
  container.innerHTML = `
    <div style="grid-column: 1/-1; background: ${fb}; border-radius: 12px; padding: 20px; border: 2px solid ${fc}">
      <div style="color: ${fc}; font-size: 1.1em; font-weight: bold; margin-bottom: 8px;">${feedback.title}</div>
      ${strategyBadge}
      <div style="color: #ccc; line-height: 1.8; font-size: 0.95em;">${feedback.text}</div>
    </div>
  `;

  roundResults.push({ round: currentRound + 1, strategy: feedback.strategy || round.strategy || '', choice: selectedOption, feedback: feedback });

  const btn = document.getElementById('actionBtn');
  btn.disabled = false;
  if (selectedOption !== 'correct' && currentRound < gameData.rounds.length - 1) {
    btn.textContent = '🔄 重试本关';
    btn.onclick = () => { gamePhase = 'choice'; loadRound(currentRound); };
    const retryBtn = document.createElement('button');
    retryBtn.className = 'action-btn';
    retryBtn.style.marginLeft = '12px';
    retryBtn.textContent = '下一关 →';
    retryBtn.id = 'nextRoundExtraBtn';
    retryBtn.onclick = goNextRound;
    btn.parentElement.appendChild(retryBtn);
  } else if (currentRound < gameData.rounds.length - 1) {
    btn.textContent = '下一关 →';
    btn.onclick = goNextRound;
  } else {
    btn.textContent = '查看战报';
    btn.onclick = showResult;
  }
}

function goNextRound() {
  currentRound++;
  loadRound(currentRound);
}

function showResult() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';

  const correctCount = roundResults.filter(r => r.choice === 'correct').length;
  const total = roundResults.length;
  
  let title = '';
  if (correctCount === 7) title = '🏆 营销天才！';
  else if (correctCount >= 5) title = '🌟 优秀掌柜！';
  else if (correctCount >= 3) title = '📚 潜力无限';
  else title = '💡 继续学习';

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultScore').textContent = `策略正确率：${correctCount}/${total}`;
  
  const detail = document.getElementById('resultDetail');
  detail.innerHTML = `
    <h4>📊 各关决策回顾</h4>
    ${roundResults.map((r, i) => `
      <div class="round-result">
        <div class="round-title">第${i+1}关${r.strategy ? ' · ' + r.strategy : ''}</div>
        <div class="choice">${r.choice === 'correct' ? '✅ 正确' : r.choice === 'wrong' ? '❌ 有误' : '⚠️ 欠佳'}</div>
        <div class="outcome">${r.feedback.title.replace(/^[✅❌⚠️]/, '')}</div>
      </div>
    `).join('')}
    
    <h4 style="margin-top: 20px;">💡 核心感悟</h4>
    <p>营销的本质不是"我比对手便宜"，而是"我在对手没有的方向建立优势"。</p>
    <p style="margin-top:6px;">面对竞争，首先想的是：<strong style="color:#ffd700">"我能做对手做不到的哪一点"</strong>，而不是"我怎么降价跟他抢"。</p>
  `;
}

function restartGame() {
  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('start-screen').classList.remove('hidden');
}

document.getElementById('startBtn').onclick = startGame;
</script>
</body>
</html>
