// ========== FUNCTIONS ==========
function startGame() {
  document.getElementById('cover').style.display = 'none';
  document.getElementById('scene').classList.add('on');
  document.querySelector('.top-bar').style.display = 'flex';
  loadScene('ch1_s1');
}

function loadScene(sceneId) {
  var scene;
  if (SCENES[sceneId]) scene = SCENES[sceneId];
  else if (CHAPTER2_SCENES[sceneId]) scene = CHAPTER2_SCENES[sceneId];
  else return;

  S.currentScene = sceneId;

  if (scene.onEnter) scene.onEnter();

  document.getElementById('scene-title').textContent = scene.title || '';
  document.getElementById('scene-text').textContent = scene.text || '';

  var choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  (scene.choices || []).forEach(function(c) {
    if (c.condition && !c.condition()) return;
    var btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c.text;
    btn.onclick = function() {
      if (c.aff !== undefined) {
        S.affection += c.aff;
        updateAffection();
      }
      loadScene(c.next);
    };
    choicesEl.appendChild(btn);
  });

  renderLog();
}

function addLog(msg) {
  S.log.push(msg);
  if (S.log.length > 50) S.log.shift();
}

function renderLog() {
  var el = document.getElementById('log-wrap');
  el.innerHTML = S.log.map(function(m) {
    return '<div class=log-entry>· ' + m + '</div>';
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function updateDay() {
  document.getElementById('day-label').textContent = '第' + S.day + '天';
}

function updateAffection() {
  var label = document.getElementById('affection-label');
  var val = S.affection;
  var text = '好感 ' + val;
  if (val >= 80) text += ' ★★★★★';
  else if (val >= 60) text += ' ★★★★';
  else if (val >= 40) text += ' ★★★';
  else if (val >= 20) text += ' ★★';
  else if (val >= 10) text += ' ★';
  label.textContent = text;
}

window.startGame = startGame;
window.loadScene = loadScene;
</script>
