<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>女尊世界当家主</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #e8d5b7; min-height: 100vh; }
#game { max-width: 700px; margin: 0 auto; padding: 20px; }
h1 { text-align: center; color: #c9a96e; font-size: 1.8em; margin: 20px 0; letter-spacing: 4px; }
#cover { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; text-align: center; }
#cover h2 { color: #c9a96e; font-size: 2.2em; margin-bottom: 10px; letter-spacing: 6px; }
#cover .subtitle { color: #a89070; font-size: 1em; margin-bottom: 40px; letter-spacing: 2px; }
#cover .desc { color: #7a6a50; font-size: 0.9em; max-width: 480px; line-height: 1.8; margin-bottom: 40px; }
#cover button.start-btn { background: #c9a96e; color: #1a1a2e; border: none; padding: 15px 50px; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; letter-spacing: 4px; transition: background 0.2s; }
#cover button.start-btn:hover { background: #e0c080; }
#stats, #scene, #choices, #save-bar, #game > h1 { display: none; }
.show { display: block; }
#stats.show { display: grid; }
#cover.gone { visibility: hidden; position: absolute; pointer-events: none; }
h2 { color: #c9a96e; font-size: 1.1em; margin: 15px 0 10px; border-bottom: 1px solid #333; padding-bottom: 5px; }
#stats { background: #16213e; border: 1px solid #c9a96e; border-radius: 10px; padding: 15px; margin-bottom: 20px; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
.stat { background: #0f3460; border-radius: 6px; padding: 8px 12px; text-align: center; }
.stat-name { font-size: 0.75em; color: #a89070; }
.stat-val { font-size: 1.3em; color: #c9a96e; font-weight: bold; }
#scene { background: #16213e; border: 1px solid #c9a96e; border-radius: 10px; padding: 20px; margin-bottom: 15px; min-height: 200px; }
#scene.show { display: block; }
#scene-title { color: #c9a96e; font-size: 1.1em; margin-bottom: 12px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 8px; }
#scene-text { line-height: 1.8; color: #d4c4a8; font-size: 0.95em; margin-bottom: 15px; }
.choice { display: block; width: 100%; background: #0f3460; border: 1px solid #c9a96e; color: #e8d5b7; padding: 12px 16px; margin: 8px 0; border-radius: 6px; cursor: pointer; text-align: left; font-size: 0.95em; transition: background 0.2s; }
.choice:hover { background: #1a4a7a; }
.choice:disabled { opacity: 0.4; cursor: not-allowed; }
.choice.safe { border-color: #4a8a4a; }
.choice.safe:hover { background: #1a3a1a; }
.choice.risky { border-color: #8a3a3a; }
.choice.risky:hover { background: #3a1a1a; }
.choice.love { border-color: #8a4a6a; }
.choice.love:hover { background: #3a1a2a; }
.choice.smart { border-color: #4a4a8a; }
.choice.smart:hover { background: #1a1a3a; }
.choice .type-tag { display: inline-block; width: 18px; text-align: center; margin-right: 4px; font-size: 0.9em; }
#inventory { background: #16213e; border: 1px solid #c9a96e; border-radius: 10px; padding: 15px; margin-top: 15px; }
#inventory h3 { color: #c9a96e; font-size: 0.9em; margin-bottom: 8px; }
.item-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.item { background: #0f3460; color: #a89070; padding: 4px 10px; border-radius: 4px; font-size: 0.8em; }
#log { background: #0d1b2a; border: 1px solid #333; border-radius: 8px; padding: 12px; margin-top: 15px; max-height: 150px; overflow-y: auto; font-size: 0.8em; color: #7a6a50; line-height: 1.6; }
.log-entry { border-bottom: 1px solid #222; padding: 3px 0; }
#save-bar { text-align: center; margin: 15px 0; }
#choices.show { display: block; }
#save-bar.show { display: block; }
button.btn { background: #c9a96e; color: #1a1a2e; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 0 5px; }
.husband-card { background: #0f3460; border: 1px solid #c9a96e; border-radius: 8px; padding: 12px; margin: 8px 0; }
.husband-card .name { color: #c9a96e; font-size: 1.1em; font-weight: bold; }
.husband-card .desc { color: #a89070; font-size: 0.85em; margin-top: 4px; }
.hint-box { background: #1a0a2e; border: 1px solid #6a4a9a; border-radius: 6px; padding: 10px; margin: 10px 0; font-size: 0.85em; color: #a890c0; }
.sub-text { background: #0f3460; border-radius: 6px; padding: 12px; margin-top: 10px; color: #d4c4a8; font-style: italic; line-height: 1.7; }
</style>
</head>
<body>
<div id="game">
  <div id="cover">
    <h2>🏛️ 女尊世界</h2>
    <div class="subtitle">当 家 主</div>
    <div class="desc">女尊王朝。<br>你将选择自己的出身——寒门、书香、商贾、武勋、杏林，或是皇族旁支？<br>你将选择你的夫君——他的家世与性格，将决定你命运的走向。<br>从一无所有到一方霸主，一切从今日开始。</div>
    <button class="start-btn" onclick="startGame()">开始游戏</button>
  </div>
  <div id="stats" style="visibility:hidden">
    <div class="stat"><div class="stat-name">💰 银两</div><div class="stat-val" id="s-money">0</div></div>
    <div class="stat"><div class="stat-name">⭐ 声望</div><div class="stat-val" id="s-prestige">1</div></div>
    <div class="stat"><div class="stat-name">🤝 人脉</div><div class="stat-val" id="s-social">1</div></div>
    <div class="stat"><div class="stat-name">📖 智慧</div><div class="stat-val" id="s-wit">1</div></div>
    <div class="stat"><div class="stat-name">⚔️ 魄力</div><div class="stat-val" id="s-bravo">1</div></div>
    <div class="stat"><div class="stat-name">🏠 身份</div><div class="stat-val" id="s-class">寒门子弟</div></div>
    <div class="stat"><div class="stat-name">📅 第</div><div class="stat-val" id="s-day">1</div></div>
    <div class="stat" id="s-affection-stat" style="display:none"><div style="color:#c96a8a;font-size:0.75em">💕 夫君好感 <span id="s-affection">50</span>/100</div><div style="background:#1a0a2e;border-radius:8px;height:6px;margin-top:3px"><div id="s-affection-bar" style="background:linear-gradient(90deg,#9a4a6a,#c96a8a);border-radius:8px;height:6px;width:50%;transition:width 0.4s"></div></div>
  </div>
  <div id="scene">
    <div id="scene-title"></div>
    <div id="scene-text"></div>
  </div>
  <div id="choices"></div>
  <div id="log"><div class="log-entry">—— 游戏开始 ——</div></div>
  <div id="save-bar">
    <button class="btn" onclick="saveGame()">💾 存档</button>
    <button class="btn" onclick="loadGame()">📂 读档</button>
    <button class="btn" onclick="resetGame()">🔄 重开</button>
  </div>
</div>
<script>

var _selBg = null;

var BACKGROUNDS = [
  { id: 'scholar', name: '书香门第', desc: '父亲是落魄秀才，自幼教授诗书，略通文墨。性格温和，但不善交际。', traits: ['文采', '软懦'], bonus: { wit: 2, social: -1 } },
  { id: 'merchant', name: '商贾之子', desc: '家中经营布匹生意，自小耳濡目染，算账精明。性格圆滑，善于察言观色。', traits: ['精明', '务实'], bonus: { wit: 1, bravo: 1 } },
  { id: 'martial', name: '武勋遗孤', desc: '父亲是边境小吏，战死沙场。性格刚烈，嫉恶如仇，但不善权谋。', traits: ['刚烈', '正直'], bonus: { bravo: 2, wit: -1 } },
  { id: 'noble', name: '罪臣之后', desc: '祖父曾任朝官，后遭贬谪。家道中落，但心中藏有惊天秘密。', traits: ['隐忍', '深沉'], bonus: { wit: 1, social: 1 } },
  { id: 'medical', name: '杏林世家', desc: '祖上三代行医，医术精湛。性格纯善，不谙世事。', traits: ['仁心', '单纯'], bonus: { wit: 1, bravo: 1 } },
  { id: 'artistic', name: '伶人血脉', desc: '生母是青楼花魁，身份低微。容貌出众，能歌善舞，但自卑敏感。', traits: ['多艺', '敏感'], bonus: { social: 2, bravo: -1 } },
];

var PERSONALITIES = [
  { id: 'gentle', name: '温顺柔和', desc: '体贴入微，唯命是从，让做什么就做什么。' },
  { id: 'proud', name: '清高傲气', desc: '性子倔强，有自己的主见，不轻易服软。' },
  { id: 'scheming', name: '心机深沉', desc: '心思缜密，擅长算计，笑里藏刀。' },
  { id: 'brave', name: '刚烈正直', desc: '嫉恶如仇，眼里不揉沙子，敢说敢做。' },
  { id: 'kind', name: '善良多情', desc: '心软如棉，见不得人受苦，常自作主张。' },
  { id: 'cold', name: '冷漠寡言', desc: '惜字如金，喜怒不形于色，难以捉摸。' },
];

var PLAYER_BACKGROUNDS = [
  { id: 'poor', name: '寒门子弟', desc: '家道中落，一贫如洗，只有破屋一间薄田几亩。需要从零开始，一步步翻身。', bonus: { money: 0, prestige: 0, social: 0, wit: 0, bravo: 0, cls: '寒门子弟' } },
  { id: 'scholar', name: '书香门第', desc: '家中曾出过秀才，留下些书籍典藏。文采过人，在镇上小有声望。', bonus: { money: 3, prestige: 1, social: 0, wit: 2, bravo: 0, cls: '书香后人' } },
  { id: 'merchant', name: '商贾之家', desc: '父母经营布匹生意，家境殷实。耳濡目染之下，精通算账，眼光独到。', bonus: { money: 8, prestige: 0, social: 1, wit: 1, bravo: 0, cls: '商户之女' } },
  { id: 'martial', name: '武勋世家', desc: '祖上是边境将领，虽已没落，但留下了一把佩刀和一身搏击之术。', bonus: { money: 2, prestige: 1, social: 0, wit: 0, bravo: 3, cls: '武勋之后' } },
  { id: 'medical', name: '杏林人家', desc: '家中祖传医术，父亲早逝，母亲略通药理。会些简单的针灸草药。', bonus: { money: 3, prestige: 1, social: 1, wit: 1, bravo: 0, cls: '医家之女' } },
  { id: 'official', name: '小吏之女', desc: '父亲是镇上一名文书小吏，虽无权无势，但认识些衙门中人，了解官场门道。', bonus: { money: 2, prestige: 2, social: 2, wit: 1, bravo: 0, cls: '吏员之女' } },
  { id: 'imperial', name: '皇族旁支', desc: '你身上流着大燕皇族的血——虽是旁支末流，却也姓着那个天下至尊的姓氏。因家族失势被遣就藩，但你深知京城风云变幻，一切皆有可能。', bonus: { money: 10, prestige: 5, social: 3, wit: 2, bravo: 1, cls: '皇族旁支' } },
];

var persText = {
  gentle: '一切都听娘子的，娘子说怎样便怎样。',
  proud: '既已嫁你，便盼你能出人头地。我不求依附，只求并肩。',
  scheming: '我知娘子不是凡人……愿为娘子暗中筹谋。',
  brave: '我恨不能与娘子一同打天下，不愿只做宅中男子！',
  kind: '我只盼你我同心，在这世道好好活下去。',
  cold: '（沉默良久）……我既入了你家的门，便是你家的人。',
};

function render() {
  document.getElementById('s-money').textContent = S.money + '文';
  document.getElementById('s-prestige').textContent = S.prestige;
  document.getElementById('s-social').textContent = S.social;
  document.getElementById('s-wit').textContent = S.wit;
  document.getElementById('s-bravo').textContent = S.bravo;
  document.getElementById('s-class').textContent = S.cls;
  document.getElementById('s-day').textContent = S.day;
  var items = S.items.length ? S.items.map(function(i){return '<span class="item">'+i+'</span>';}).join('') : '<span class="item">空空如也</span>';
  document.getElementById('item-list').innerHTML = items;
  var affStat = document.getElementById('s-affection-stat');
  if(affStat){ affStat.style.display = S.husband ? 'block' : 'none'; }
  if(S.husband){
    var aff = Math.round(S.husband.affection || 50);
    document.getElementById('s-affection').textContent = aff;
    var bar = document.getElementById('s-affection-bar');
    if(bar) bar.style.width = aff + '%';
  }
}

function addLog(text) {
  S.log.push(text);
  var logDiv = document.getElementById('log');
  var entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.textContent = text;
  logDiv.appendChild(entry);
  logDiv.scrollTop = logDiv.scrollHeight;
  if (S.log.length > 50) S.log.shift();
}

var RANDOM_EVENTS = [
  { id: 'found_money', title: '天降横财', text: '你在回家路上，低头看见墙角有一只旧布袋，打开一看——里面竟有五百文铜钱！', effect: function(){S.money+=5;}, chance: 0.08 },
  { id: 'husband_sick', title: '夫君生病', text: ''+hName()+'今日神色倦怠，似乎着了风寒。你需要花钱给他买药。', effect: function(){S.money-=3;S.flags.husband_sick=true;}, chance: 0.06, condition: function(){return S.money>=3;} },
  { id: 'kind_stranger', title: '陌生女子', text: '一位衣着华贵的女子向你问路，临走时随手赏了你一两银子。"这点小钱，拿去喝茶。"', effect: function(){S.money+=10;S.prestige+=1;}, chance: 0.05 },
  { id: 'robbery', title: '遭遇劫匪', text: '你行至小巷，忽被两名劫匪拦住去路！', effect: function(){S.money=Math.max(0,S.money-5);S.bravo+=0.5;}, chance: 0.06, condition: function(){return S.money>=5;} },
  { id: 'old_friend', title: '故人相遇', text: '街头偶遇一位故人——是从小一起长大的邻家姐姐，如今已嫁入富户。她邀你改日去她府上喝茶。', effect: function(){S.social+=2;}, chance: 0.07 },
  { id: 'lucky_find', title: '地摊淘宝', text: '集市边有个清仓摊位，你挑中一件小物件，竟是件有来历的古物——有人出价收购，赚了一笔。', effect: function(){S.money+=8;S.prestige+=1;}, chance: 0.05, condition: function(){return S.wit>=2;} },
  { id: 'tax_collector', title: '官差查税', text: '两名官差拦住你，说是例行查税。你被迫交了两百文"过路费"。', effect: function(){S.money=Math.max(0,S.money-2);}, chance: 0.06, condition: function(){return S.money>=2;} },
  { id: 'black_brief', title: '有人捎信', text: '一个陌生小厮塞给你一封信就走。你拆开一看——竟是一张揭露某富商走私的密信！有人想借你之手告发。', effect: function(){S.flags.secret_letter=true;S.prestige+=1;}, chance: 0.04 },
  { id: 'merchant_robbed', title: '布商遇难', text: '集市上一位布商遭遇地痞哄抢，你出手相助，帮他保住了货款。他感激之余，送你两匹布作为酬谢。', effect: function(){S.items.push('布匹x2');S.social+=1;S.prestige+=1;}, chance: 0.05 },
  { id: 'night_theft', title: '梁上君子', text: '深夜，你被一阵窃窃声惊醒——有贼入室偷走了两百文铜钱！', effect: function(){S.money=Math.max(0,S.money-2);}, chance: 0.06, condition: function(){return S.money>=2;} },
  { id: 'widow_help', title: '寡妇求助', text: '一位年轻寡妇跪在街头，哭诉婆婆逼她改嫁。你动了惻隐之心，给了她几百文度日。', effect: function(){S.money=Math.max(0,S.money-1);S.prestige+=2;}, chance: 0.06, condition: function(){return S.money>=1;} },
  { id: 'talent_discover', title: '发现商机', text: '你敏锐地发现镇上最近流行一种新布料，于是抢先进货，大赚了一笔！', effect: function(){S.money+=15;S.prestige+=1;}, chance: 0.05, condition: function(){return S.wit>=3;} },
  { id: 'accident', title: '街头意外', text: '街角处一名男子被马车撞伤，无人敢救。你犹豫着是否出手。', effect: function(){S.flags.witness_accident=true;}, chance: 0.05 },
  { id: 'merchant_invite', title: '商号招新', text: '镇上最大商号"永丰号"张贴告示，招募能干的伙计。你决定去试试。', effect: function(){S.flags.yongfeng=true;}, chance: 0.06 },
  { id: 'nightmare', title: '噩梦惊醒', text: ''+hName()+'半夜从噩梦中惊醒——他梦见了自己的父亲战死沙场的场景。', effect: function(){S.flags.husband_nightmare=true;}, chance: 0.05, condition: function(){return S.husband&&S.husband.bgId==='martial';} },
  { id: 'shuang_event', title: '天赐良缘？', text: '一名陌生男子拦住你，自称是算命先生，说你与某位贵人有着命中注定的缘分……', effect: function(){S.flags.strange_fate=true;}, chance: 0.04 },
];

var _pendingNext = null;

function triggerRandomEvent(nextSceneId) {
  var eligible = RANDOM_EVENTS.filter(function(e){
    return (!e.condition || e.condition()) && Math.random() < e.chance;
  });
  if (eligible.length === 0) {
    showScene(nextSceneId);
    return;
  }
  var ev = eligible[Math.floor(Math.random() * eligible.length)];
  ev.effect();
  var sceneText = document.getElementById('scene-text').innerHTML;
  document.getElementById('scene-title').textContent = '⚡ ' + ev.title;
  document.getElementById('scene-text').innerHTML = '<div style="background:#1a0a2e;border:1px solid #6a4a9a;border-radius:8px;padding:15px;margin-bottom:15px;color:#a890c0;font-style:italic">🎲 随机事件触发！</div>' + ev.text;
  var choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  var btn = document.createElement('button');
  btn.className = 'choice';
  btn.textContent = '继续';
  btn.onclick = function(){
    addLog('⚡ 随机事件：' + ev.title);
    render();
    showScene(nextSceneId);
  };
  choicesDiv.appendChild(btn);
  render();
}

function go(c) {
  if (c.effect) c.effect();
  addLog(c.text);
  // 随机好感度波动
  if (S.husband && Math.random() < 0.25) {
    var delta = c.type === 'love' ? 2 : (c.type === 'risky' ? (Math.random()<0.5 ? 1 : -1) : (Math.random()<0.7 ? 1 : -1));
    S.husband.affection = Math.max(0, Math.min(100, S.husband.affection + delta));
    updateAffection();
  }
  render();
  if (c.next === 'reset') { resetGame(); return; }
  if (c.next) {
    _pendingNext = c.next;
    triggerRandomEvent(c.next);
  } else { showScene('start'); }
}

function showScene(id) {
  var scene = scenes[id];
  if (!scene) return;
  document.getElementById('scene-title').textContent = scene.title || '';
  document.getElementById('scene-text').innerHTML = scene.text || '';
  var choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  if (scene.choices) {
    scene.choices.forEach(function(c) {
      var btn = document.createElement('button');
      var type = c.type || 'safe';
      var tagMap = { safe: '🍚', risky: '⚔', love: '💕', smart: '📖' };
      var tag = tagMap[type] || '🍚';
      btn.className = 'choice ' + type;
      btn.innerHTML = '<span class="type-tag">' + tag + '</span>' + c.text;
      if (c.condition && !c.condition()) { btn.disabled = true; }
      btn.onclick = function(){ go(c); };
      choicesDiv.appendChild(btn);
    });
  }
  render();
}

function hName() { return S.husband ? S.husband.name : '顾长安'; }
function hBg() { return S.husband ? S.husband.bgName : '某家'; }
function hPers() { return S.husband ? S.husband.persId : 'kind'; }
function hTraits() { return S.husband ? S.husband.traits.join(' / ') : '无'; }

function startGame() {
  var cover = document.getElementById('cover');
  cover.style.position = 'absolute';
  cover.style.visibility = 'hidden';
  cover.style.pointerEvents = 'none';
  cover.style.top = '0';
  cover.style.left = '0';
  cover.style.width = '100%';
  cover.style.zIndex = '-1';
  // stats stay hidden during character creation (already visibility:hidden)

window.confirmHusband = function() {

function saveGame(){localStorage.setItem('nvzh_save',JSON.stringify(S));addLog('💾 存档成功！');}
function loadGame(){var d=localStorage.getItem('nvzh_save');if(d){Object.assign(S,JSON.parse(d));addLog('📂 读档成功！');var s=document.getElementById('stats');s.style.visibility='';s.classList.add('show');render();showScene('start');}else addLog('无存档！');}
function resetGame(){Object.assign(S,{money:0,prestige:1,social:1,wit:1,bravo:1,cls:'寒门子弟',items:[],log:[],day:1,phase:1,flags:{},husband:null,playerBg:null,playerBgName:null});localStorage.removeItem('nvzh_save');document.getElementById('log').innerHTML='<div class="log-entry">—— 重新开始 ——</div>';var cover=document.getElementById('cover');cover.classList.remove('gone');cover.style.position='';cover.style.visibility='';cover.style.pointerEvents='';cover.style.top='';cover.style.left='';cover.style.width='';cover.style.zIndex='';var s=document.getElementById('stats');s.style.visibility='hidden';s.classList.remove('show');document.querySelectorAll('#scene,#choices,#save-bar').forEach(function(el){el.classList.remove('show');});var h1=document.querySelector('#game>h1');if(h1)h1.style.display='none';}

// startGame() is called by the "开始游戏" button — not auto-run
