<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>竞品侦察兵 - 你是哪种竞品？</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #fff; }
.container { max-width: 800px; margin: 0 auto; padding: 20px; }

#start-screen { text-align: center; padding: 40px 20px; }
.title { font-size: 2.4em; color: #00d4ff; text-shadow: 0 0 30px rgba(0,212,255,0.5); margin-bottom: 10px; }
.subtitle { font-size: 1.2em; color: #7ec8e3; margin-bottom: 30px; }
.start-btn { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #fff; border: none; padding: 18px 50px; font-size: 1.3em; border-radius: 50px; cursor: pointer; transition: all 0.3s; font-weight: bold; box-shadow: 0 5px 20px rgba(0,212,255,0.4); }
.start-btn:hover { transform: translateY(-3px); }
.story-box { background: rgba(255,255,255,0.1); padding: 25px; border-radius: 15px; margin: 20px 0; border: 1px solid rgba(0,212,255,0.3); text-align: left; }
.story-title { color: #00d4ff; font-size: 1.2em; margin-bottom: 15px; font-weight: bold; }
.story-text { line-height: 1.8; color: #b8d4e3; }
.tip-box { background: rgba(255,193,7,0.1); padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid rgba(255,193,7,0.3); text-align: left; }
.type-card { background: linear-gradient(135deg, #1a1a2e, #16213e); border: 2px solid #00d4ff; border-radius: 15px; padding: 20px; margin: 15px 0; text-align: left; }
.type-name { color: #00d4ff; font-weight: bold; font-size: 1.1em; margin-bottom: 8px; }
.type-desc { color: #b8d4e3; font-size: 0.9em; line-height: 1.5; }
.type-example { color: #ffc107; font-size: 0.85em; margin-top: 8px; }

#game-screen { display: none; }
.step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
.step-dot { width: 10px; height: 10px; border-radius: 50%; background: #334; }
.step-dot.active { background: #ffd700; }
.step-dot.done { background: #51cf66; }

.question-box { background: #fff; border-radius: 20px; padding: 25px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.3); }
.knowledge-tag { display: inline-block; background: linear-gradient(135deg, #ff6b6b, #ee5a5a); color: #fff; padding: 5px 12px; border-radius: 12px; font-size: 0.75em; margin-bottom: 15px; }
.scenario { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 20px; border-radius: 12px; margin-bottom: 18px; text-align: left; }
.scenario-title { font-size: 1.1em; font-weight: bold; margin-bottom: 10px; }
.scenario-text { line-height: 1.7; font-size: 0.95em; white-space: pre-line; }
.question-text { font-size: 1.05em; line-height: 1.7; color: #333; margin-bottom: 15px; font-weight: 500; }
.think-box { background: #fff3cd; padding: 15px; border-radius: 10px; margin-bottom: 15px; color: #856404; border-left: 4px solid #ffc107; text-align: left; font-size: 0.9em; }
.think-title { font-weight: bold; margin-bottom: 8px; }

.options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
.option-btn { background: #f8f9fa; border: 2px solid #e9ecef; padding: 12px 16px; border-radius: 12px; cursor: pointer; transition: all 0.3s; text-align: center; font-size: 0.95em; color: #333; font-weight: 500; min-height: 60px; display: flex; align-items: center; justify-content: center; }
.option-btn:hover { border-color: #00d4ff; background: #e8f4ff; transform: translateY(-2px); }
.option-btn.selected { border-color: #ffd700; background: rgba(255,215,0,0.2); color: #ffd700; font-weight: bold; }
.option-btn.correct { background: linear-gradient(135deg, #00ff88, #00cc6a); border-color: #00ff88; color: #fff; }
.option-btn.wrong { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); border-color: #ff6b6b; color: #fff; }
.option-btn.disabled { opacity: 0.7; cursor: not-allowed; }

.feedback-box { background: #e8f5e9; padding: 18px; border-radius: 12px; margin-top: 16px; display: none; color: #2e7d32; border-left: 4px solid #4caf50; text-align: left; }
.feedback-box.show { display: block; animation: fadeIn 0.3s; }
.feedback-title { font-weight: bold; margin-bottom: 10px; font-size: 1.1em; }
.feedback-type { display: inline-block; background: #51cf66; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; margin-bottom: 8px; }
.feedback-text { line-height: 1.7; font-size: 0.95em; }
.retry-btn { background: #ff9800; border: none; color: #fff; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-size: 0.9em; margin-top: 12px; }
.next-btn { background: #51cf66; border: none; color: #fff; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-size: 0.9em; margin-top: 12px; margin-left: 8px; }

.action-btn { background: linear-gradient(135deg, #00d4ff, #0099cc); border: none; color: #fff; padding: 14px 36px; font-size: 1em; border-radius: 50px; cursor: pointer; margin-top: 8px; }
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

#result-screen { display: none; text-align: center; padding: 40px 20px; }
.result-title { font-size: 2.5em; margin-bottom: 20px; }
.final-score { font-size: 4em; color: #ffd700; margin: 20px 0; text-shadow: 0 0 30px rgba(255,215,0,0.5); }
.result-msg { font-size: 1.2em; color: #aaa; margin-bottom: 30px; line-height: 1.6; }
.stats { display: flex; justify-content: center; gap: 20px; margin: 30px 0; flex-wrap: wrap; }
.stat { background: rgba(255,255,255,0.05); padding: 15px 20px; border-radius: 15px; }
.stat-value { font-size: 1.5em; color: #00d4ff; font-weight: bold; }
.stat-label { font-size: 0.75em; color: #888; margin-top: 5px; }
.result-detail { background: #16213e; border-radius: 16px; padding: 24px; text-align: left; margin-bottom: 24px; }
.result-round { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.result-round:last-child { border-bottom: none; }
.result-round-title { font-weight: bold; margin-bottom: 4px; }
.result-correct { color: #51cf66; font-size: 0.9em; }
.result-wrong { color: #ff6b6b; font-size: 0.9em; }
.result-answer { color: #888; font-size: 0.85em; margin-top: 4px; }

@media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="container">

<div id="start-screen">
  <h1 class="title">🔍 竞品侦察兵</h1>
  <p class="subtitle">商业视角大挑战</p>
  <button class="start-btn" id="startBtn">🚀 开始挑战</button>
  <div class="story-box">
    <div class="story-title">📖 玩法说明</div>
    <p class="story-text">你是商业侦察事务所的新晋侦探！各路老板纷纷报案，声称发现了可疑的竞争对手，需要你帮忙分析对手类型。</p>
    <p style="margin-top:15px;">🎯 <strong>任务目标：</strong>准确识别直接竞品、间接竞品、潜在竞品！</p>
  </div>
  <div class="tip-box">
    <div class="story-title">📋 竞品分类速查</div>
    <div class="type-card">
      <div class="type-name">🎯 直接竞品</div>
      <div class="type-desc">产品相似、目标用户相同、市场定位一致，直接抢同一批客户</div>
      <div class="type-example">例：淘宝两家同类女装店</div>
    </div>
    <div class="type-card">
      <div class="type-name">🔗 间接竞品</div>
      <div class="type-desc">产品或用户有部分重叠，但不是完全竞争</div>
      <div class="type-example">例：奶茶店 vs 咖啡店</div>
    </div>
    <div class="type-card">
      <div class="type-name">🌊 潜在竞品</div>
      <div class="type-desc">现在还不是对手，但未来可能取代你</div>
      <div class="type-example">例：抖音入局外卖</div>
    </div>
  </div>
</div>

<div id="game-screen">
  <div class="step-indicator" id="stepIndicator"></div>
  <div class="question-box">
    <span class="knowledge-tag" id="knowledgeTag">竞品判断</span>
    <div class="scenario">
      <div class="scenario-title" id="scenarioTitle"></div>
      <div class="scenario-text" id="scenarioText"></div>
    </div>
    <div class="question-text" id="questionText"></div>
    <div class="think-box">
      <div class="think-title">💡 思考提示</div>
      <div id="thinkText"></div>
    </div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback-box" id="feedbackBox">
      <div class="feedback-title" id="feedbackTitle"></div>
      <div id="feedbackType"></div>
      <div class="feedback-text" id="feedbackText"></div>
      <button class="retry-btn" id="retryBtn" onclick="retryRound()">🔄 再试一次</button>
      <button class="next-btn" id="nextBtn" onclick="nextRound()">下一关 →</button>
    </div>
    <div style="text-align:center;">
      <button class="action-btn" id="actionBtn" disabled onclick="confirmChoice()">请先选择一种竞品类型</button>
    </div>
  </div>
</div>

<div id="result-screen">
  <div class="result-title" id="resultTitle"></div>
  <div class="final-score"><span id="finalScore">0</span>分</div>
  <div class="result-msg" id="resultMsg"></div>
  <div class="stats">
    <div class="stat"><div class="stat-value" id="statRight">0</div><div class="stat-label">正确</div></div>
    <div class="stat"><div class="stat-value" id="statWrong">0</div><div class="stat-label">错误</div></div>
  </div>
  <div class="result-detail" id="resultDetail"></div>
  <button class="start-btn" onclick="restartGame()">再闯一次</button>
</div>

</div>

let selectedIndex = -1;
let score = 0;
let roundResults = [];

function shuffle(array) {
  let arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  currentRound = 0;
  score = 0;
  roundResults = [];
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  loadRound();
}

function loadRound() {
  selectedIndex = -1;
  const round = gameData.rounds[currentRound];
  
  const indicator = document.getElementById('stepIndicator');
  indicator.innerHTML = gameData.rounds.map((_, i) => 
    `<div class="step-dot ${i < currentRound ? 'done' : i === currentRound ? 'active' : ''}"></div>`
  ).join('');
  
  document.getElementById('scenarioTitle').textContent = round.title;
  document.getElementById('scenarioText').textContent = round.caseText;
  document.getElementById('questionText').textContent = round.question;
  document.getElementById('thinkText').textContent = round.hint;
  
  const shuffledOptions = shuffle(round.options.map((opt, i) => ({ ...opt, originalIndex: i })));
  
  const container = document.getElementById('optionsContainer');
  container.innerHTML = shuffledOptions.map((opt, i) => 
    `<div class="option-btn" data-index="${i}" data-key="${opt.key}" onclick="selectOption(${i})">${opt.text}</div>`
  ).join('');
  
  document.getElementById('feedbackBox').classList.remove('show');
  document.getElementById('retryBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  document.getElementById('actionBtn').disabled = true;
  document.getElementById('actionBtn').textContent = '请先选择一种竞品类型';
}

function selectOption(index) {
  if (document.getElementById('feedbackBox').classList.contains('show')) return;
  document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
  document.querySelectorAll('.option-btn')[index].classList.add('selected');
  selectedIndex = index;
  document.getElementById('actionBtn').disabled = false;
  document.getElementById('actionBtn').textContent = '确认侦查结果';
}

function confirmChoice() {
  if (selectedIndex < 0) return;
  
  const round = gameData.rounds[currentRound];
  const btns = document.querySelectorAll('.option-btn');
  const selectedBtn = btns[selectedIndex];
  const selectedKey = selectedBtn.dataset.key;
  const isCorrect = selectedKey === round.correctKey;
  
  btns.forEach(btn => btn.classList.add('disabled'));
  
  if (isCorrect) {
    selectedBtn.classList.add('correct');
    score += 12;
    roundResults.push({ id: round.id, title: round.title, correct: true });
    document.getElementById('feedbackTitle').textContent = round.feedback.correct.title;
    document.getElementById('feedbackType').innerHTML = `<span class="feedback-type">🏷️ ${round.feedback.correct.type}</span>`;
    document.getElementById('feedbackText').textContent = round.feedback.correct.text;
    document.getElementById('nextBtn').style.display = 'inline-block';
    document.getElementById('retryBtn').style.display = 'none';
  } else {
    selectedBtn.classList.add('wrong');
    roundResults.push({ id: round.id, title: round.title, correct: false, yourAnswer: selectedKey, correctAnswer: round.correctKey });
    document.getElementById('feedbackTitle').textContent = round.feedback.wrong.title;
    document.getElementById('feedbackType').innerHTML = '';
    document.getElementById('feedbackText').textContent = round.feedback.wrong.text;
    document.getElementById('retryBtn').style.display = 'inline-block';
    document.getElementById('nextBtn').style.display = currentRound < gameData.rounds.length - 1 ? 'inline-block' : 'none';
  }
  
  document.getElementById('feedbackBox').classList.add('show');
  document.getElementById('actionBtn').disabled = true;
  document.getElementById('actionBtn').textContent = '已确认';
}

function retryRound() {
  document.getElementById('feedbackBox').classList.remove('show');
  loadRound();
}

function nextRound() {
  currentRound++;
  if (currentRound >= gameData.rounds.length) {
    showResult();
  } else {
    loadRound();
  }
}

function showResult() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  
  const correctCount = roundResults.filter(r => r.correct).length;
  const total = roundResults.length;
  
  document.getElementById('finalScore').textContent = score;
  document.getElementById('statRight').textContent = correctCount;
  document.getElementById('statWrong').textContent = total - correctCount;
  
  let title, msg;
  if (correctCount === total) {
    title = "👑 竞品大师！";
    msg = "完美掌握竞品分析能力！能准确识别各类竞争对手，这种判断力在电商时代尤为珍贵！";
  } else if (correctCount >= total * 0.7) {
    title = "⭐ 竞品高手";
    msg = "对竞品分类有较好理解，但还需加强某些类型的判断。多练习分析真实商业案例！";
  } else {
    title = "💪 潜力无限";
    msg = "竞品分析需要不断练习。建议：1)多关注电商行业动态 2)培养多角度分析习惯";
  }
  
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
  
  document.getElementById('resultDetail').innerHTML = roundResults.map(r => {
    const round = gameData.rounds.find(g => g.id === r.id);
    const correctText = round.options.find(o => o.key === round.correctKey).text;
    if (r.correct) {
      return `<div class="result-round"><div class="result-round-title">第${r.id}关 ${r.title}</div><div class="result-correct">✅ 正确</div></div>`;
    } else {
      const yourText = round.options.find(o => o.key === r.yourAnswer)?.text || '未知';
      return `<div class="result-round"><div class="result-round-title">第${r.id}关 ${r.title}</div><div class="result-wrong">❌ 错误</div><div class="result-answer">你的答案：${yourText} ｜ 正确答案：${correctText}</div></div>`;
    }
  }).join('');
}

function restartGame() {
  startGame();
}

document.getElementById('startBtn').addEventListener('click', startGame);
</script>
</body>
</html>
