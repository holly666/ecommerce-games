<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商业侦探事务所 - 竞店悬案</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }

/* 开始页面 */
#start-screen { text-align: center; padding-top: 40px; }
.title { font-size: 2.2em; color: #ffd700; margin-bottom: 10px; }
.subtitle { font-size: 1.1em; color: #d4a574; margin-bottom: 20px; }
.start-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 16px 48px; font-size: 1.2em; border-radius: 50px; cursor: pointer; }
.start-btn:hover { transform: scale(1.05); }
.story-box { background: rgba(102,126,234,0.2); border-radius: 16px; padding: 24px; margin: 20px 0; text-align: left; border-left: 4px solid #667eea; }
.story-text { line-height: 1.8; color: #ccc; margin-bottom: 12px; }

/* 游戏页面 */
#game-screen { display: none; }
.step-indicator { display: flex; justify-content: center; gap: 8px; margin-bottom: 24px; }
.step-dot { width: 10px; height: 10px; border-radius: 50%; background: #334; }
.step-dot.active { background: #ffd700; }
.step-dot.done { background: #51cf66; }

.situation-box { background: linear-gradient(135deg, #16213e, #0f3460); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
.situation-title { font-size: 1.1em; color: #ffd700; margin-bottom: 12px; font-weight: bold; }
.situation-text { line-height: 1.8; color: #d4d4d4; margin-bottom: 16px; white-space: pre-line; }
.case-box { background: rgba(255,215,0,0.1); border: 1px solid rgba(255,215,0,0.3); border-radius: 10px; padding: 16px; margin-top: 12px; }
.case-label { color: #ffd700; font-weight: bold; font-size: 0.85em; margin-bottom: 6px; }
.case-text { color: #d4c4a8; line-height: 1.7; font-size: 0.95em; white-space: pre-line; }

.question { font-size: 1.05em; color: #fff; margin-bottom: 16px; line-height: 1.6; font-weight: 500; }
.think-hint { background: #fff3cd; color: #856404; padding: 12px 16px; border-radius: 10px; margin-bottom: 16px; font-size: 0.9em; border-left: 4px solid #ffc107; text-align: left; }

.options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
.option-btn { background: #16213e; border: 2px solid #334; color: #ddd; padding: 12px 16px; border-radius: 12px; cursor: pointer; font-size: 0.95em; text-align: left; min-height: 60px; display: flex; align-items: center; transition: all 0.2s; }
.option-btn:hover { border-color: #667eea; background: rgba(102,126,234,0.15); }
.option-btn.selected { border-color: #ffd700; background: rgba(255,215,0,0.15); color: #ffd700; }
.option-btn.correct { border-color: #51cf66; background: rgba(81,207,102,0.2); color: #51cf66; }
.option-btn.wrong { border-color: #ff6b6b; background: rgba(255,107,107,0.2); color: #ff6b6b; }
.option-btn.disabled { opacity: 0.6; cursor: not-allowed; }

.action-btn { background: linear-gradient(135deg, #667eea, #764ba2); border: none; color: white; padding: 14px 36px; font-size: 1em; border-radius: 50px; cursor: pointer; margin-top: 8px; }
.action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.feedback-box { background: #e8f5e9; padding: 18px; border-radius: 12px; margin-top: 16px; display: none; color: #2e7d32; border-left: 4px solid #4caf50; text-align: left; }
.feedback-box.show { display: block; animation: fadeIn 0.3s; }
.feedback-title { font-weight: bold; margin-bottom: 10px; font-size: 1.05em; }
.feedback-type { display: inline-block; background: #51cf66; color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; margin-bottom: 8px; }
.feedback-text { line-height: 1.7; font-size: 0.95em; }
.retry-btn { background: #ff9800; border: none; color: #fff; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-size: 0.9em; margin-top: 12px; }
.retry-btn:hover { background: #f57c00; }
.next-btn { background: #51cf66; border: none; color: #fff; padding: 10px 24px; border-radius: 20px; cursor: pointer; font-size: 0.9em; margin-top: 12px; margin-left: 8px; }
.next-btn:hover { background: #43a047; }

/* 结果页面 */
#result-screen { display: none; text-align: center; padding-top: 40px; }
.result-title { font-size: 2em; margin-bottom: 20px; }
.final-score { font-size: 4em; color: #ffd700; margin: 20px 0; }
.result-msg { font-size: 1.1em; color: #aaa; margin-bottom: 30px; line-height: 1.6; }
.result-detail { background: #16213e; border-radius: 16px; padding: 24px; text-align: left; margin-bottom: 24px; }
.result-round { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.result-round:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
.result-round-title { font-weight: bold; margin-bottom: 4px; }
.result-correct { color: #51cf66; font-size: 0.9em; }
.result-wrong { color: #ff6b6b; font-size: 0.9em; }
.result-answer { color: #888; font-size: 0.85em; margin-top: 4px; }

@media (max-width: 600px) { .options { grid-template-columns: 1fr; } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>

// 游戏状态
let currentRound = 0;
let selectedIndex = -1;
let score = 0;
let roundResults = [];

// 随机打乱数组
function shuffle(array) {
  let arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function startGame() {
  currentRound = 0;
  score = 0;
  roundResults = [];
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  loadRound();
}

function loadRound() {
  selectedIndex = -1;
  const round = gameData.rounds[currentRound];
  
  // 更新进度点
  const indicator = document.getElementById('stepIndicator');
  indicator.innerHTML = gameData.rounds.map((_, i) => 
    `<div class="step-dot ${i < currentRound ? 'done' : i === currentRound ? 'active' : ''}"></div>`
  ).join('');
  
  document.getElementById('situationTitle').textContent = `第${round.id}关 · ${round.title}`;
  document.getElementById('situationText').textContent = '';
  document.getElementById('caseText').textContent = round.caseText;
  document.getElementById('questionText').textContent = round.question;
  document.getElementById('thinkHint').textContent = round.hint;
  
  // 选项固定ABCD顺序，不打乱
  const container = document.getElementById('optionsContainer');
  container.innerHTML = round.options.map((opt, i) => 
    `<div class="option-btn" data-index="${i}" data-key="${opt.key}" onclick="selectOption(${i})">${opt.text}</div>`
  ).join('');
  
  // 隐藏反馈
  document.getElementById('feedbackBox').classList.remove('show');
  document.getElementById('retryBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';
  
  // 禁用按钮
  document.getElementById('actionBtn').disabled = true;
  document.getElementById('actionBtn').textContent = '请先选择一种竞店类型';
}

function selectOption(index) {
  if (document.getElementById('feedbackBox').classList.contains('show')) return;
  
  // 移除之前的选中
  document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
  // 选中当前
  document.querySelectorAll('.option-btn')[index].classList.add('selected');
  selectedIndex = index;
  
  // 启用确认按钮
  const btn = document.getElementById('actionBtn');
  btn.disabled = false;
  btn.textContent = '确认侦查结果';
}

function confirmChoice() {
  if (selectedIndex < 0) return;
  
  const round = gameData.rounds[currentRound];
  const btns = document.querySelectorAll('.option-btn');
  const selectedBtn = btns[selectedIndex];
  const selectedKey = selectedBtn.dataset.key;
  const isCorrect = selectedKey === round.correctKey;
  
  // 禁用所有选项
  btns.forEach(btn => btn.classList.add('disabled'));
  
  if (isCorrect) {
    selectedBtn.classList.add('correct');
    score += 12;
    roundResults.push({ id: round.id, title: round.title, correct: true });
    document.getElementById('feedbackTitle').textContent = round.feedback.correct.title;
    document.getElementById('feedbackType').innerHTML = `<span class="feedback-type">🏷️ ${round.feedback.correct.type}</span>`;
    document.getElementById('feedbackText').textContent = round.feedback.correct.text;
    document.getElementById('nextBtn').style.display = 'inline-block';
    document.getElementById('retryBtn').style.display = 'none';
  } else {
    selectedBtn.classList.add('wrong');
    roundResults.push({ id: round.id, title: round.title, correct: false, yourAnswer: selectedKey, correctAnswer: round.correctKey });
    document.getElementById('feedbackTitle').textContent = round.feedback.wrong.title;
    document.getElementById('feedbackType').innerHTML = '';
    document.getElementById('feedbackText').textContent = round.feedback.wrong.text;
    document.getElementById('retryBtn').style.display = 'inline-block';
    document.getElementById('nextBtn').style.display = currentRound < gameData.rounds.length - 1 ? 'inline-block' : 'none';
  }
  
  document.getElementById('feedbackBox').classList.add('show');
  document.getElementById('actionBtn').disabled = true;
  document.getElementById('actionBtn').textContent = '已确认';
}

function retryRound() {
  document.getElementById('feedbackBox').classList.remove('show');
  loadRound();
}

function nextRound() {
  currentRound++;
  if (currentRound >= gameData.rounds.length) {
    showResult();
  } else {
    loadRound();
  }
}

function showResult() {
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('result-screen').style.display = 'block';
  
  const correctCount = roundResults.filter(r => r.correct).length;
  const total = roundResults.length;
  
  document.getElementById('finalScore').textContent = score;
  
  let title, msg;
  if (correctCount === total) {
    title = "👑 神探！";
    msg = "完美掌握竞店分析能力！能准确识别各类竞争对手，这种判断力在AI时代尤为珍贵！";
  } else if (correctCount >= total * 0.7) {
    title = "⭐ 优秀分析师";
    msg = "对竞店分类有较好理解，但还需加强某些类型的判断。多练习分析真实案例！";
  } else {
    title = "💪 潜力无限";
    msg = "竞店分析需要不断练习。建议：1)多关注真实商业案例 2)培养多角度分析习惯";
  }
  
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultMsg').textContent = msg;
  
  document.getElementById('resultDetail').innerHTML = roundResults.map(r => {
    const round = gameData.rounds.find(g => g.id === r.id);
    const correctText = round.options.find(o => o.key === round.correctKey).text;
    if (r.correct) {
      return `<div class="result-round"><div class="result-round-title">第${r.id}关 ${r.title}</div><div class="result-correct">✅ 正确</div></div>`;
    } else {
      const yourText = round.options.find(o => o.key === r.yourAnswer)?.text || '未知';
      return `<div class="result-round"><div class="result-round-title">第${r.id}关 ${r.title}</div><div class="result-wrong">❌ 错误</div><div class="result-answer">你的答案：${yourText} ｜ 正确答案：${correctText}</div></div>`;
    }
  }).join('');
}

function restartGame() {
  startGame();
}

// 绑定开始按钮
document.getElementById('startBtn').addEventListener('click', startGame);
</script>
</body>
</html>
