        .start-btn:hover { transform: scale(1.05); }

        .stats-bar { display: flex; justify-content: space-around; background: white; border-radius: 15px; padding: 12px; margin-bottom: 18px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); flex-wrap: wrap; gap: 8px; }

        .stat-icon { font-size: 1.3em; }
        .stat-value { font-size: 1.2em; font-weight: bold; color: #56ab2f; }
        .stat-label { font-size: 0.7em; color: #888; }

        .week-dot.current { background: #f39c12; box-shadow: 0 0 0 3px rgba(243,156,18,0.3); }
        .week-dot .day-label { font-size: 0.6em; color: #888; }

        .story-title { color: #33691e; font-weight: bold; margin-bottom: 8px; font-size: 1em; }
        .story-text { color: #555; line-height: 1.8; font-size: 0.95em; }
        .story-text em { color: #56ab2f; font-style: normal; font-weight: bold; }

        .options { display: grid; gap: 10px; }
        .option { background: #f8f9fa; border: 2px solid #e8f5e9; padding: 14px; border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .option:hover { border-color: #56ab2f; background: #f1f8e9; transform: translateX(5px); }
        .option .opt-title { font-size: 0.95em; color: #333; margin-bottom: 4px; font-weight: bold; }
        .option .opt-desc { font-size: 0.82em; color: #777; line-height: 1.5; }
        .option .opt-tag { display: inline-block; font-size: 0.72em; padding: 2px 8px; border-radius: 8px; margin-top: 5px; }
        .option.correct { background: linear-gradient(135deg, #00e676, #00c853); border-color: #00c853; }
        .option.correct .opt-title, .option.correct .opt-desc { color: white; }
        .option.wrong { background: linear-gradient(135deg, #ff6b6b, #e53935); border-color: #e53935; }
        .option.wrong .opt-title, .option.wrong .opt-desc { color: white; }
        .option.disabled { pointer-events: none; opacity: 0.7; }

        .result-box { display: none; padding: 14px; border-radius: 10px; margin-top: 12px; }
        .result-box.show { display: block; animation: fadeIn 0.3s; }
        .result-correct { background: #e8f5e9; border: 2px solid #4caf50; color: #2e7d32; }
        .result-wrong { background: #ffebee; border: 2px solid #f44336; color: #c62828; }

        .continue-btn.show { display: inline-block; }

        #end-screen { display: none; text-align: center; padding: 40px 20px; }

        .end-score { font-size: 3em; font-weight: bold; color: #56ab2f; margin: 20px 0; }
        .end-stars { font-size: 2.5em; margin-bottom: 15px; }

</head>
<body>
<div class="container">

    <!-- 开始界面 -->
    <div id="start-screen">
        <div class="logo">🍽️</div>
        <div class="title">一周菜谱规划师</div>
        <div class="subtitle">孕期健康饮食挑战</div>
        <div class="desc-box">
            <h3>📋 挑战规则</h3>
            <ul>
                <li>根据每日营养需求，搭配三餐</li>
                <li>叶菜类 2-3 天内要吃完（菠菜、小青菜、茼蒿）</li>
                <li>山药可以慢慢吃，灵活搭配</li>
                <li>调味不加糖、不加葱蒜</li>
                <li>学校供餐日按实际情况选择</li>
            </ul>
        </div>
        <div class="desc-box">
            <h3>🍎 营养目标</h3>
            <ul>
                <li>每天有优质蛋白（鱼、蛋、肉）</li>
                <li>粗粮主食（杂粮包、红薯、山药）</li>
                <li>绿叶蔬菜（菠菜、茼蒿、小青菜）</li>
                <li>避免重复同一种食物超过2天</li>
            </ul>
        </div>
        <button class="start-btn" onclick="startGame()">🎮 开始挑战</button>
    </div>

    <!-- 游戏界面 -->
    <div id="game-screen" style="display:none">
        <div class="stats-bar">
            <div class="stat-item"><div class="stat-icon">🌿</div><div class="stat-value" id="score">0</div><div class="stat-label">得分</div></div>
            <div class="stat-item"><div class="stat-icon">✅</div><div class="stat-value" id="day-count">0/7</div><div class="stat-label">已完成天数</div></div>
            <div class="stat-item"><div class="stat-icon">🔥</div><div class="stat-value" id="streak">0</div><div class="stat-label">连续正确</div></div>
        </div>

        <div class="week-summary">
            <h4>📅 本周进度</h4>
            <div class="week-grid" id="week-dots"></div>
        </div>

        <div class="game-area">
            <div class="round-tag" id="round-tag">第 1 天</div>
            <div class="story-box">
                <div class="story-title" id="story-title">营养搭配挑战</div>
                <div class="story-text" id="story-text">加载中...</div>
            </div>
            <div class="options" id="options"></div>
            <div class="result-box" id="result-box"></div>
            <button class="continue-btn" id="continue-btn" onclick="nextRound()">继续 →</button>
        </div>
    </div>

    <!-- 结束界面 -->
    <div id="end-screen">
        <div class="end-logo">🏆</div>
        <div class="end-title">挑战完成！</div>
        <div class="end-stars" id="end-stars">⭐⭐⭐</div>
        <div class="end-score" id="end-score">0 分</div>
        <div class="end-detail">
            <h3>📊 营养搭配评估</h3>
            <p id="end-eval"></p>
            <div class="end-tip" id="end-tip"></div>
        </div>
        <button class="restart-btn" onclick="restartGame()">🔄 再玩一次</button>
    </div>

</div>

        text: "周四早餐要吃好！<em>杂粮包</em>粗粮，<em>山药泥</em>健脾，<em>荷包蛋</em>优质蛋白。",
        options: [
            { t:"杂粮包 + 山药泥 + 荷包蛋", d:"✅ 满分早餐！粗粮+健脾+蛋白", correct:true },
            { t:"杂粮包 + 花生酱 + 煎蛋", d:"❌ 花生酱脂肪高，不宜天天吃", correct:false },
            { t:"白粥 + 肉松 + 甜豆花", d:"❌ 甜豆花糖分高", correct:false },
            { t:"油条 + 豆腐脑 + 卤牛肉", d:"❌ 早餐太重口，孕期宜清淡", correct:false },
        ],
        tip: "山药泥健脾养胃，孕期每周吃2-3次"
    },
    {
        title: "🍽️ 周四晚餐搭配",
        text: "周四收尾晚餐。<em>清蒸鱼</em>高蛋白低脂肪，<em>青菜</em>补充纤维，简单清淡收尾这一周。",
        options: [
            { t:"清蒸鱼 + 青菜（简单吃）", d:"✅ 清淡收尾，一周完美结束！", correct:true },
            { t:"红烧鱼 + 油焖大虾 + 白米饭", d:"❌ 红烧太油腻，不适合收尾", correct:false },
            { t:"水煮鱼 + 酸菜 + 啤酒", d:"❌ 水煮鱼油多，酸菜盐高，啤酒禁饮", correct:false },
            { t:"烤鱼 + 配菜 + 可乐", d:"❌ 烤鱼盐分高，可乐含糖", correct:false },
        ],
        tip: "清蒸是最健康的烹饪方式，孕期首选"
    },
];

let state = { score: 0, round: 0, streak: 0, correct: 0, answers: [] };

function startGame() {
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('end-screen').classList.remove('show');
    state = { score: 0, round: 0, streak: 0, correct: 0, answers: [] };
    buildWeekDots();
    renderRound();
}

function buildWeekDots() {
    const grid = document.getElementById('week-dots');
    grid.innerHTML = '';
    DAYS.forEach((d, i) => {
        const dot = document.createElement('div');
        dot.style.display = 'flex';
        dot.style.flexDirection = 'column';
        dot.style.alignItems = 'center';
        dot.style.gap = '2px';
        const dotDiv = document.createElement('div');
        dotDiv.className = 'week-dot';
        dotDiv.id = 'dot-' + i;
        const label = document.createElement('span');
        label.className = 'day-label';
        label.textContent = d.day;
        dot.appendChild(dotDiv);
        dot.appendChild(label);
        grid.appendChild(dot);
    });
}

function renderRound() {
    if (state.round >= ROUNDS.length) { endGame(); return; }
    const r = ROUNDS[state.round];
    document.getElementById('score').textContent = state.score;
    document.getElementById('day-count').textContent = state.round + '/' + ROUNDS.length;
    document.getElementById('streak').textContent = state.streak;
    document.getElementById('round-tag').textContent = '第 ' + (state.round + 1) + ' 题';
    document.getElementById('story-title').textContent = r.title;
    document.getElementById('story-text').innerHTML = r.text;

    // Update current dot
    for (let i = 0; i < DAYS.length; i++) {
        const dot = document.getElementById('dot-' + i);
        dot.className = 'week-dot';
        if (i < state.round) dot.classList.add('done');
        if (i === state.round) dot.classList.add('current');
    }

    const opts = document.getElementById('options');
    opts.innerHTML = '';
    r.options.forEach((o, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerHTML = '<div class="opt-title">' + o.t + '</div><div class="opt-desc">' + o.d + '</div>';
        div.onclick = () => selectOption(div, o.correct, r.tip);
        opts.appendChild(div);
    });
    document.getElementById('result-box').classList.remove('show');
    document.getElementById('result-box').textContent = '';
    document.getElementById('continue-btn').classList.remove('show');
}

function selectOption(el, correct, tip) {
    const opts = document.querySelectorAll('.option');
    opts.forEach(o => o.classList.add('disabled'));
    if (correct) {
        el.classList.add('correct');
        state.score += 10 + state.streak * 2;
        state.streak++;
        state.correct++;
        document.getElementById('result-box').className = 'result-box show result-correct';
        document.getElementById('result-box').innerHTML = '<strong>✅ 正确！</strong> +' + (10 + (state.streak-1)*2) + '分 &nbsp;' + tip;
    } else {
        el.classList.add('wrong');
        // Highlight correct answer
        opts.forEach(o => { if (o !== el && !o.classList.contains('disabled')) o.classList.add('disabled'); });
        state.streak = 0;
        document.getElementById('result-box').className = 'result-box show result-wrong';
        document.getElementById('result-box').innerHTML = '<strong>❌ 答错了～</strong> ' + tip;
    }
    state.answers.push({ round: state.round, correct });
    document.getElementById('score').textContent = state.score;
    document.getElementById('streak').textContent = state.streak;
    document.getElementById('continue-btn').classList.add('show');
}

function nextRound() {
    state.round++;
    if (state.round >= ROUNDS.length) { endGame(); return; }
    renderRound();
}

function endGame() {
    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('end-screen').classList.add('show');
    const pct = state.correct / ROUNDS.length;
    let stars = '⭐';
    if (pct >= 0.9) stars = '⭐⭐⭐';
    else if (pct >= 0.7) stars = '⭐⭐';
    let evalText = '';
    let tipText = '';
    if (pct >= 0.9) {
        evalText = '太棒了！你已经成为合格的"一周菜谱规划师"！对孕期营养搭配了如指掌，每餐都能做出最优选择。';
        tipText = '<strong>小贴士：</strong>继续保持这样的营养意识，每周花点时间规划菜谱，不仅对孕期好，对产后恢复和宝宝发育也大有帮助！';
    } else if (pct >= 0.7) {
        evalText = '不错！你对孕期饮食有一定了解，但还有些知识点需要加强。建议每天学习一个营养小知识，日积月累。';
        tipText = '<strong>小贴士：</strong>记住几个核心原则：蛋白质+蔬菜+粗粮缺一不可；调味不加糖葱蒜；叶菜2-3天吃完。';
    } else {
        evalText = '营养搭配还需要多学习哦！孕期饮食关系到宝宝发育，不容马虎。多看看营养科普，一起加油！';
        tipText = '<strong>小贴士：</strong>从今天开始，每天注意三餐搭配。不需要完美，但要有意识地向均衡靠近。';
    }
    document.getElementById('end-stars').textContent = stars;
    document.getElementById('end-score').textContent = state.score + ' 分';
    document.getElementById('end-eval').textContent = evalText;
    document.getElementById('end-tip').innerHTML = tipText;
}

function restartGame() {
    document.getElementById('end-screen').classList.remove('show');
    document.getElementById('start-screen').style.display = 'block';
}
</script>
