<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据侦探 - 竞品情报收集</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #2d1b4e 50%, #1a1a2e 100%); min-height: 100vh; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        #start-screen { text-align: center; padding: 40px 20px; }
        .title { font-size: 2.4em; color: #ff6b9d; text-shadow: 0 0 30px rgba(255,107,157,0.5); margin-bottom: 10px; }
        .subtitle { font-size: 1.2em; color: #c792ea; margin-bottom: 30px; }
        .start-btn { background: linear-gradient(135deg, #ff6b9d, #c792ea); color: #fff; border: none; padding: 18px 50px; font-size: 1.3em; border-radius: 50px; cursor: pointer; transition: all 0.3s; font-weight: bold; }
        .start-btn:hover { transform: translateY(-3px); }
        .story-box { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px; margin: 20px 0; border: 1px solid rgba(255,107,157,0.3); text-align: left; }
        .story-title { color: #ff6b9d; font-size: 1.1em; margin-bottom: 10px; font-weight: bold; }
        .story-text { line-height: 1.6; color: #e0d4f7; font-size: 0.95em; }
        .tip-box { background: rgba(255,193,7,0.1); padding: 15px; border-radius: 10px; margin: 15px 0; border: 1px solid rgba(255,193,7,0.3); text-align: left; }
        .tip-title { color: #ffc107; font-weight: bold; margin-bottom: 8px; }
        #game-screen { display: none; }
        .progress-bar { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 20px; flex-wrap: wrap; gap: 5px; }
        .step { font-size: 0.7em; color: #666; }
        .step.active { color: #ff6b9d; font-weight: bold; }
        .step.completed { color: #00ff88; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .score { font-size: 1.2em; color: #ff6b9d; font-weight: bold; }
        .phase-tag { background: linear-gradient(135deg, #ff6b9d, #c792ea); padding: 5px 12px; border-radius: 15px; font-size: 0.75em; }
        .question-box { background: #fff; border-radius: 15px; padding: 20px; margin-bottom: 15px; }
        .scenario { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 15px; border-radius: 10px; margin-bottom: 12px; text-align: left; font-size: 0.95em; line-height: 1.6; }
        .question-text { font-size: 1em; color: #333; margin-bottom: 10px; font-weight: 500; }
        .think-box { background: #fff3cd; padding: 12px; border-radius: 8px; margin-bottom: 12px; color: #856404; font-size: 0.85em; text-align: left; }
        .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .option { background: #f8f9fa; border: 2px solid #e9ecef; padding: 12px; border-radius: 10px; cursor: pointer; text-align: center; font-size: 0.85em; color: #333; }
        .option:hover { border-color: #ff6b9d; background: #ffe8f0; }
        .option.correct { background: linear-gradient(135deg, #00ff88, #00cc6a); border-color: #00ff88; color: #fff; }
        .option.wrong { background: linear-gradient(135deg, #ff6b6b, #ee5a5a); border-color: #ff6b6b; color: #fff; }
        .option.disabled { pointer-events: none; opacity: 0.7; }
        .explanation { background: #e8f5e9; padding: 15px; border-radius: 10px; margin-top: 12px; display: none; color: #2e7d32; text-align: left; font-size: 0.9em; }
        .explanation.show { display: block; }
        .explanation-title { font-weight: bold; margin-bottom: 8px; }
        #result-screen { display: none; text-align: center; padding: 30px 20px; }
        .result-title { font-size: 2em; margin-bottom: 15px; }
        .final-score { font-size: 3em; color: #ff6b9d; margin: 15px 0; }
        .result-msg { font-size: 1em; color: #aaa; margin-bottom: 20px; }
        .stats { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .stat { background: rgba(255,255,255,0.05); padding: 12px 18px; border-radius: 12px; }
        .stat-value { font-size: 1.3em; color: #ff6b9d; }
        .stat-label { font-size: 0.7em; color: #888; }
        .restart-btn { background: linear-gradient(135deg, #ff6b9d, #c792ea); color: #fff; border: none; padding: 12px 30px; font-size: 1em; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .method-card { background: linear-gradient(135deg, #1a1a2e, #2d1b4e); border: 1px solid #ff6b9d; border-radius: 10px; padding: 10px; margin: 6px 0; text-align: left; }
        .method-name { color: #ff6b9d; font-weight: bold; font-size: 0.9em; }
        .method-examples { color: #c792ea; font-size: 0.75em; }
        @media (max-width: 600px) { .options { grid-template-columns: 1fr; } .title { font-size: 1.8em; } }
    </style>
</head>
<body>
    <div class="container">
        <div id="start-screen">
            <h1 class="title">🕵️ 数据侦探</h1>
            <p class="subtitle">竞品情报收集大挑战</p>
            <button class="start-btn" onclick="startGame()">🔍 开始调查</button>
            <div class="story-box">
                <div class="story-title">任务说明</div>
                <p class="story-text">你是一家公司的市场情报员！老板给了你8个调查任务，选择正确的数据收集途径。</p>
            </div>
            <div class="tip-box">
                <div class="tip-title">📋 5大数据收集途径</div>
                <div class="method-card"><div class="method-name">🌐 公开渠道</div><div class="method-examples">官网、社交媒体、行业报告</div></div>
                <div class="method-card"><div class="method-name">🏢 第三方渠道</div><div class="method-examples">行业协会、展会、咨询公司</div></div>
                <div class="method-card"><div class="method-name">👀 实地调研</div><div class="method-examples">现场考察、用户访谈</div></div>
                <div class="method-card"><div class="method-name">💻 网络监测</div><div class="method-examples">搜索引擎、社交媒体监测</div></div>
                <div class="method-card"><div class="method-name">🏠 内部信息源</div><div class="method-examples">员工反馈、销售数据</div></div>
            </div>
        </div>
        <div id="game-screen">
            <div class="progress-bar">
                <span class="step active" id="step1">1</span><span class="step" id="step2">2</span><span class="step" id="step3">3</span><span class="step" id="step4">4</span><span class="step" id="step5">5</span><span class="step" id="step6">6</span><span class="step" id="step7">7</span><span class="step" id="step8">8</span>
            </div>
            <div class="header">
                <div class="phase-tag" id="phase-tag">任务</div>
                <div class="score">⭐ <span id="score">0</span></div>
            </div>
            <div class="question-box">
                <div class="scenario" id="scenario-text"></div>
                <p class="question-text" id="question-text"></p>
                <div class="think-box" id="think-text"></div>
                <div class="explanation" id="explanation"><div class="explanation-title" id="explanation-title"></div><p id="explanation-text"></p></div>
            </div>
            <div class="options" id="options"></div>
        </div>
        <div id="result-screen">
            <h1 class="result-title" id="result-title">🎉 完成任务!</h1>
            <div class="final-score"><span id="final-score">0</span></div>
            <p class="result-msg" id="result-msg"></p>
            <div class="stats"><div class="stat"><div class="stat-value" id="stat-right">0</div><div class="stat-label">正确</div></div><div class="stat"><div class="stat-value" id="stat-wrong">0</div><div class="stat-label">错误</div></div></div>
            <button class="restart-btn" onclick="restartGame()">再调查一次</button>
        </div>
    </div>
    <script>
        const dataMethods = [
            { type: "public", text: "🌐 公开渠道", desc: "官网、社交媒体、行业报告" },
            { type: "third", text: "🏢 第三方渠道", desc: "行业协会、展会、咨询公司" },
            { type: "field", text: "👀 实地调研", desc: "现场考察、用户访谈" },
            { type: "online", text: "💻 网络监测", desc: "搜索引擎、社交媒体监测" },
            { type: "internal", text: "🏠 内部信息源", desc: "员工反馈、销售数据" }
        ];
        
        window.allCases = [
            { caseText: "老板让你了解竞品A公司的产品有哪些、价格怎么样、最近有什么动态。", question: "这些信息最适合从哪里获取？", hint: "💡 产品信息和价格最容易从哪里看到？", answer: "public", explanation: "✅ 公开渠道\n\n产品信息、价格、公司动态都可以通过官网、新闻、社交媒体等公开渠道获取。\n\n❌ 实地调研：不需要去线下\n❌ 第三方渠道：不需要花冤枉钱" },
            { caseText: "你想亲自去竞品B的门店看看：服务态度怎么样、产品好不好用、客人多不多。", question: "这些信息最适合从哪里获取？", hint: "💡 服务态度和客流必须去哪里才能感受到？", answer: "field", explanation: "✅ 实地调研\n\n服务态度、产品体验、客流情况必须亲自去现场才能感受到。\n\n❌ 公开渠道：服务态度网上很难了解\n❌ 网络监测：只能监测线上数据" },
            { caseText: "老板让你分析今年行业市场规模多大、未来发展趋势怎么样。", question: "这些专业数据最适合从哪里获取？", hint: "💡 行业数据一般谁会做？", answer: "third", explanation: "✅ 第三方渠道\n\n行业规模、发展趋势需要行业协会、研究机构或咨询公司的报告。\n\n❌ 公开渠道：网上信息碎片化\n❌ 实地调研：个人无法获取行业级数据" },
            { caseText: "你每天需要监控竞品C在微博、抖音上的营销活动，看看他们发了什么、用户怎么评价。", question: "要实时高效获取这些信息，最适合用什么方式？", hint: "💡 有什么工具可以自动帮你盯着？", answer: "online", explanation: "✅ 网络监测\n\n社交媒体动态需要持续监测，用专业工具可以实时追踪，比人工高效。\n\n❌ 公开渠道：手动搜索效率低\n❌ 实地调研：这是线上数据" },
            { caseText: "你想知道自己公司的客户为什么有时候选择竞品而不是你们，他们真正关心什么。", question: "要获取客户的真实想法，最适合用什么方式？", hint: "💡 直接问客户能不能问到？", answer: "field", explanation: "✅ 实地调研（访谈/问卷）\n\n客户的真实评价、选择原因需要通过直接访谈或问卷获取。\n\n❌ 公开渠道：公开评价可能不真实\n❌ 网络监测：只能看到网上言论" },
            { caseText: "老板让你分析公司过去一年的销售数据，看看哪些产品卖得好、客户复购率怎么样。", question: "这些数据应该从哪里获取？", hint: "💡 销售记录数据一般存在哪里？", answer: "internal", explanation: "✅ 内部信息源\n\n销售数据是公司内部数据，应该从自家系统获取。\n\n❌ 公开渠道：销售数据是内部机密\n❌ 实地调研：不需要去现场" },
            { caseText: "你想查一下竞品E公司有哪些专利、技术实力怎么样、研发方向是什么。", question: "这些技术信息最适合从哪里获取？", hint: "💡 专利信息在哪里可以查到？", answer: "public", explanation: "✅ 公开渠道\n\n专利信息可以通过国家知识产权局官网公开查询。\n\n❌ 实地调研：不适合了解技术信息\n❌ 第三方渠道：专利是公开的，不需要花钱" },
            { caseText: "你想了解竞品F公司最近参加了什么展会、展示了什么新产品、行业有什么新趋势。", question: "要一次性获取这么多信息，最适合用什么方式？", hint: "💡 参加什么活动能同时看到这么多东西？", answer: "third", explanation: "✅ 第三方渠道（展会）\n\n参加行业展会可以一次性了解行业趋势、竞品动态、新技术，非常高效。\n\n❌ 公开渠道：只能看到二手信息\n❌ 实地调研：只是去看展" }
        ];
        
        window.caseOrder = []; window.currentIndex = 0; window.score = 0; window.rightCount = 0; window.wrongCount = 0; window.currentOptions = [];
        const startScreen = document.getElementById('start-screen'), gameScreen = document.getElementById('game-screen'), resultScreen = document.getElementById('result-screen');
        
        function shuffle(a) { for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]} return a; }
        
        function generateOptions(correctType) {
            let opts = []; const correct = dataMethods.find(o=>o.type===correctType);
            opts.push({type:correct.type, text:correct.text, desc:correct.desc, correct:true});
            dataMethods.filter(o=>o.type!==correctType).forEach(o=>opts.push({type:o.type, text:o.text, desc:o.desc, correct:false}));
            return shuffle(opts);
        }
        
        function startGame() { window.caseOrder=shuffle([...Array(window.allCases.length).keys()]);window.currentIndex=0;window.score=0;window.rightCount=0;window.wrongCount=0;startScreen.style.display='none';gameScreen.style.display='block';resultScreen.style.display='none';showCase(); }
        
        function showCase() {
            const q=window.allCases[window.caseOrder[window.currentIndex]];
            for(let i=1;i<=8;i++){document.getElementById('step'+i).className='step'+(i-1<window.currentIndex?' completed':i-1===window.currentIndex?' active':'')}
            document.getElementById('phase-tag').textContent='任务'+(window.currentIndex+1);
            document.getElementById('scenario-text').innerHTML=q.caseText.replace(/\n/g,'<br>');
            document.getElementById('question-text').textContent=q.question;
            document.getElementById('think-text').textContent=q.hint;
            document.getElementById('explanation').classList.remove('show');
            document.getElementById('score').textContent=window.score;
            window.currentOptions=generateOptions(q.answer);
            const container=document.getElementById('options');container.innerHTML='';
            window.currentOptions.forEach((opt,idx)=>{const btn=document.createElement('div');btn.className='option';btn.innerHTML=`<div>${opt.text}</div><div style="font-size:0.7em;opacity:0.7">${opt.desc}</div>`;btn.onclick=()=>selectAnswer(idx);container.appendChild(btn);});
        }
        
        function selectAnswer(idx) {
            const q=window.allCases[window.caseOrder[window.currentIndex]];
            const opts=document.querySelectorAll('.option');
            if(window.currentOptions[idx].correct){
                opts.forEach((o,i)=>{o.classList.add('disabled');if(window.currentOptions[i].correct)o.classList.add('correct')});
                window.rightCount++;window.score+=12;document.getElementById('score').textContent=window.score;
                document.getElementById('explanation-title').textContent='✅ 回答正确！';
                document.getElementById('explanation-text').innerHTML=q.explanation.replace(/\n/g,'<br>');
                document.getElementById('explanation').classList.add('show');
                const nextBtn=document.createElement('div');nextBtn.className='option';nextBtn.style.cssText='background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;grid-column:span 2;margin-top:10px;';
                nextBtn.textContent='➡️ 下一题';nextBtn.onclick=e=>{e.stopPropagation();nextCase()};
                document.getElementById('options').appendChild(nextBtn);
            }else{
                opts[idx].classList.add('wrong');
                opts.forEach(o=>o.classList.add('disabled'));
                const retryBtn=document.createElement('div');retryBtn.className='option';retryBtn.style.cssText='background:linear-gradient(135deg,#ff9800,#ff5722);color:#fff;grid-column:span 2;margin-top:10px;';
                retryBtn.textContent='🔄 再试一次';retryBtn.onclick=e=>{e.stopPropagation();retryBtn.remove();opts.forEach(o=>o.classList.remove('disabled','wrong','correct'))};
                document.getElementById('options').appendChild(retryBtn);
            }
        }
        
        function nextCase(){window.currentIndex++;window.currentIndex>=window.allCases.length?showResult():showCase();}
        
        function showResult(){gameScreen.style.display='none';resultScreen.style.display='block';document.getElementById('final-score').textContent=window.score;document.getElementById('stat-right').textContent=window.rightCount;document.getElementById('stat-wrong').textContent=window.wrongCount;
            let t,m;if(window.score>=80){t="🏆 顶级侦探！";m="你对数据收集途径了如指掌！"}else if(window.score>=50){t="⭐ 资深侦探";m="你对数据收集途径有较好理解！"}else{t="📚 实习侦探";m="数据收集的学问很深奥，建议再学习！"}
            document.getElementById('result-title').textContent=t;document.getElementById('result-msg').textContent=m;
        }
        
        function restartGame(){resultScreen.style.display='none';startScreen.style.display='block';}
    </script>
</body>
</html>
