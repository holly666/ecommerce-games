<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>浮生绘卷：尘缘劫</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; background: #1a1a2e; color: #e8d5b7; min-height: 100vh; }
#game { max-width: 700px; margin: 0 auto; padding: 20px; }

/* 封面 */
#cover { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 90vh; text-align: center; }
#cover h2 { color: #c9a96e; font-size: 2.2em; margin-bottom: 8px; letter-spacing: 6px; }
#cover .subtitle { color: #a89070; font-size: 1em; margin-bottom: 30px; letter-spacing: 2px; }
#cover .desc { color: #7a6a50; font-size: 0.9em; max-width: 460px; line-height: 1.9; margin-bottom: 40px; }
#cover button.start-btn { background: #c9a96e; color: #1a1a2e; border: none; padding: 14px 48px; border-radius: 8px; cursor: pointer; font-size: 1.05em; font-weight: bold; letter-spacing: 4px; transition: background 0.2s; }
#cover button.start-btn:hover { background: #e0c080; }

/* 属性条 */
#stats { display: none; background: #16213e; border: 1px solid #c9a96e; border-radius: 10px; padding: 12px 15px; margin-bottom: 16px; }
#stats.show { display: block; }
#stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
.stat { background: #0f3460; border-radius: 6px; padding: 6px 8px; text-align: center; }
.stat-name { font-size: 0.7em; color: #a89070; }
.stat-val { font-size: 1.1em; color: #c9a96e; font-weight: bold; }
#s-affection-wrap { grid-column: span 4; background: #2a1a3e; border: 1px solid #9a4a6a; border-radius: 6px; padding: 8px 12px; text-align: center; display: none; }
#s-affection-wrap.show { display: block; }
#s-daoist-wrap { grid-column: span 4; background: #1a2a3e; border: 1px solid #4a6a9a; border-radius: 6px; padding: 6px 12px; text-align: center; font-size: 0.8em; color: #8ab0d0; display: none; }
#s-daoist-wrap.show { display: block; }
#s-realm-wrap { grid-column: span 4; background: #1a1a2e; border: 1px solid #4a4a6a; border-radius: 6px; padding: 6px 12px; display: none; }
#s-realm-wrap.show { display: block; }
.daoist-name { color: #c9a96e; font-weight: bold; }
.aff-bar-bg { background: #1a0a2e; border-radius: 10px; height: 8px; margin-top: 4px; }
.aff-bar-fill { background: linear-gradient(90deg, #9a4a6a, #c96a8a); border-radius: 10px; height: 8px; transition: width 0.5s; }
.realm-tags { display: flex; justify-content: center; gap: 12px; font-size: 0.78em; }
.realm-tag { padding: 2px 8px; border-radius: 4px; }
.realm-tag.heaven { background: #2a3a5a; color: #8ab0d0; }
.realm-tag.mortal { background: #3a2a2a; color: #d08080; }

/* 场景 */
#scene { display: none; background: #16213e; border: 1px solid #c9a96e; border-radius: 10px; padding: 18px; margin-bottom: 14px; }
#scene.show { display: block; }
#scene-title { color: #c9a96e; font-size: 1.05em; margin-bottom: 10px; font-weight: bold; border-bottom: 1px solid #333; padding-bottom: 8px; }
#scene-text { line-height: 1.85; color: #d4c4a8; font-size: 0.92em; margin-bottom: 14px; }
#scene-text p { margin-bottom: 8px; }

/* 选项按钮 */
.choice { display: block; width: 100%; background: #0f3460; border: 2px solid #5a4a3a; color: #e8d5b7; padding: 12px 14px; margin: 7px 0; border-radius: 8px; cursor: pointer; text-align: left; font-size: 0.92em; line-height: 1.5; transition: all 0.2s; }
.choice:hover { background: #1a4a7a; transform: translateX(3px); }
.choice.safe { border-color: #4a8a4a; }
.choice.safe:hover { background: #1a3a1a; }
.choice.risky { border-color: #8a3a3a; }
.choice.risky:hover { background: #3a1a1a; }
.choice.love { border-color: #8a4a6a; }
.choice.love:hover { background: #3a1a2a; }
.choice.smart { border-color: #4a4a8a; }
.choice.smart:hover { background: #1a1a3a; }
.choice .tag { display: inline-block; font-size: 0.75em; padding: 1px 6px; border-radius: 3px; margin-right: 5px; font-weight: bold; }
.tag-safe { background: #2a4a2a; color: #8aca8a; }
.tag-risky { background: #4a2a2a; color: #ca8a8a; }
.tag-love { background: #4a2a4a; color: #ca8aca; }
.tag-smart { background: #2a2a4a; color: #8a8aca; }

/* 存档栏 */
#save-bar { display: none; text-align: center; margin: 12px 0; }
#save-bar.show { display: block; }
button.btn-sm { background: #c9a96e; color: #1a1a2e; border: none; padding: 7px 16px; border-radius: 5px; cursor: pointer; font-size: 0.85em; font-weight: bold; margin: 0 4px; transition: background 0.2s; }
button.btn-sm:hover { background: #e0c080; }
button.btn-ghost { background: transparent; color: #7a6a50; border: 1px solid #3a3a3a; padding: 7px 16px; border-radius: 5px; cursor: pointer; font-size: 0.85em; margin: 0 4px; }

/* 角色创建 */
.step-page { display: none; }
.step-page.show { display: block; }
.step-indicator { text-align: center; margin-bottom: 20px; color: #7a6a50; font-size: 0.8em; letter-spacing: 2px; }
.step-dots { display: flex; justify-content: center; gap: 8px; margin-top: 6px; }
.step-dot { width: 8px; height: 8px; border-radius: 50%; background: #3a3a3a; }
.step-dot.active { background: #c9a96e; }
.step-dot.done { background: #4a8a4a; }

.char-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 10px 0; }
.char-card { background: #0f3460; border: 2px solid #3a3a5a; border-radius: 10px; padding: 14px; cursor: pointer; transition: all 0.2s; text-align: left; }
.char-card:hover { border-color: #c9a96e; transform: translateY(-2px); }
.char-card.selected { border-color: #c9a96e; background: #1a3a5a; }
.char-card .c-name { color: #c9a96e; font-size: 1em; font-weight: bold; margin-bottom: 4px; }
.char-card .c-desc { color: #a89070; font-size: 0.78em; line-height: 1.5; margin-bottom: 6px; }
.char-card .c-tags { display: flex; flex-wrap: wrap; gap: 4px; }
.char-tag { background: #1a2a4a; color: #7a9aca; font-size: 0.7em; padding: 2px 6px; border-radius: 3px; }

.talent-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
.talent-card { background: #0f3460; border: 2px solid #3a3a5a; border-radius: 10px; padding: 12px; cursor: pointer; transition: all 0.2s; text-align: left; }
.talent-card:hover { border-color: #c9a96e; }
.talent-card.selected { border-color: #c9a96e; background: #1a3a5a; }
.talent-card .t-name { color: #c9a96e; font-size: 0.95em; font-weight: bold; margin-bottom: 3px; }
.talent-card .t-desc { color: #a89070; font-size: 0.75em; line-height: 1.4; }
.talent-card .t-effect { color: #8aca8a; font-size: 0.72em; margin-top: 4px; }

.selected-note { background: #1a2a1a; border: 1px solid #4a8a4a; border-radius: 6px; padding: 10px; margin: 8px 0; font-size: 0.85em; color: #8aca8a; }

.confirm-btn { display: block; width: 100%; background: #4a8a4a; color: #fff; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: bold; letter-spacing: 2px; margin-top: 12px; transition: background 0.2s; }
.confirm-btn:hover { background: #5a9a5a; }
.confirm-btn:disabled { background: #3a5a3a; color: #6a6a6a; cursor: not-allowed; }

.name-input-wrap { background: #0f3460; border: 1px solid #c9a96e; border-radius: 8px; padding: 14px; margin: 12px 0; }
.name-input-wrap label { color: #a89070; font-size: 0.8em; display: block; margin-bottom: 6px; }
.name-input-wrap input { width: 100%; background: #16213e; border: 1px solid #5a4a3a; color: #e8d5b7; padding: 10px 12px; border-radius: 6px; font-size: 1em; }
.name-row { display: flex; gap: 10px; }
.name-row .name-input-wrap { flex: 1; margin: 0; }

.stat-panel { background: #0f3460; border: 1px solid #c9a96e; border-radius: 10px; padding: 16px; margin: 12px 0; }
.stat-panel-title { color: #c9a96e; font-size: 1em; font-weight: bold; margin-bottom: 12px; text-align: center; }
.stat-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #2a3a5a; font-size: 0.85em; }
.stat-row:last-child { border-bottom: none; }
.stat-row .s-label { color: #a89070; }
.stat-row .s-value { color: #c9a96e; font-weight: bold; }
.talent-display { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.talent-badge { background: #2a3a5a; color: #8ab0d0; font-size: 0.75em; padding: 3px 8px; border-radius: 4px; }

.time-indicator { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; padding: 8px 12px; background: #0f3460; border-radius: 6px; font-size: 0.8em; color: #a89070; }

.next-btn { display: block; width: 100%; background: #c9a96e; color: #1a1a2e; border: none; padding: 14px; border-radius: 8px; cursor: pointer; font-size: 1em; font-weight: bold; letter-spacing: 2px; margin-top: 12px; transition: background 0.2s; }
.next-btn:hover { background: #e0c080; }

#log-wrap { display: none; background: #0d1b2a; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-top: 14px; max-height: 130px; overflow-y: auto; font-size: 0.78em; color: #7a6a50; line-height: 1.6; }
#log-wrap.show { display: block; }
.log-entry { border-bottom: 1px solid #222; padding: 3px 0; }

.daoist-card { background: #0f3460; border: 2px solid #3a3a5a; border-radius: 10px; padding: 16px; cursor: pointer; transition: all 0.2s; text-align: left; margin-bottom: 10px; }
.daoist-card:hover { border-color: #c9a96e; transform: translateY(-2px); }
.daoist-card.selected { border-color: #c9a96e; background: #1a3a5a; }
.daoist-card .d-name { color: #c9a96e; font-size: 1.1em; font-weight: bold; margin-bottom: 4px; }
.daoist-card .d-type { color: #c96a8a; font-size: 0.78em; margin-bottom: 6px; }
.daoist-card .d-desc { color: #a89070; font-size: 0.8em; line-height: 1.5; }
</style>
</head>
<body>
<div id="game">

  <div id="cover">
    <h2>🌀 浮生绘卷</h2>
    <div class="subtitle">尘 缘 劫</div>
    <div class="desc">
      修仙界，万族林立，大道沉浮。<br>
      你本是凡尘一粟，偶入仙门，踏上漫漫修行路。<br>
      红尘炼心，道途多舛，情之一字，最是难渡。<br><br>
      命盘已定，道心何往？<br>
      是顺应天道，还是逆天改命？<br>
      是入世红尘，还是出世忘情？<br><br>
      一切，从今日开始。
    </div>
    <button class="start-btn" onclick="startGame()">踏入仙途</button>
  </div>

  <!-- 属性条 -->
  <div id="stats">
    <div id="stats-grid">
      <div class="stat"><div class="stat-name">💎 灵石</div><div class="stat-val" id="s-lingshi">100</div></div>
      <div class="stat"><div class="stat-name">⭐ 声望</div><div class="stat-val" id="s-prestige">0</div></div>
      <div class="stat"><div class="stat-name">🤝 人脉</div><div class="stat-val" id="s-social">0</div></div>
      <div class="stat"><div class="stat-name">📖 智慧</div><div class="stat-val" id="s-wit">0</div></div>
      <div class="stat"><div class="stat-name">⚔️ 魄力</div><div class="stat-val" id="s-bravo">0</div></div>
      <div class="stat"><div class="stat-name">📅</div><div class="stat-val" id="s-day">1</div></div>
      <div class="stat"><div class="stat-name">🌙</div><div class="stat-val" id="s-phase">清晨</div></div>
      <div class="stat"><div class="stat-name">🏷️</div><div class="stat-val" id="s-sect">散修</div></div>
      <div id="s-daoist-wrap">道侣：<span class="daoist-name" id="s-daoist-name">—</span></div>
      <div id="s-affection-wrap">
        <div style="color:#c96a8a;font-size:0.78em">💕 道侣好感 <span id="s-affection-num">50</span>/100</div>
        <div class="aff-bar-bg"><div class="aff-bar-fill" id="s-affection-bar" style="width:50%"></div></div>
      </div>
      <div id="s-realm-wrap">
        <div class="realm-tags">
          <span class="realm-tag heaven">天道 <span id="s-heaven">0</span></span>
          <span class="realm-tag mortal">逆天 <span id="s-mortal">0</span></span>
          <span style="color:#7a6a50">|</span>
          <span class="realm-tag" style="background:#1a2a1a;color:#8aca8a" id="s-worldly-text">出世·0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 场景 -->
  <div id="scene">
    <div id="scene-title"></div>
    <div id="scene-text"></div>
    <div id="choices"></div>
  </div>

  <!-- 存档栏 -->
  <div id="save-bar">
    <button class="btn-sm" onclick="saveGame()">💾 存档</button>
    <button class="btn-sm" onclick="loadGame()">📂 读档</button>
    <button class="btn-ghost" onclick="confirmReset()">🔄 重开</button>
  </div>

  <!-- 日志 -->
  <div id="log-wrap"><div id="log"></div></div>

  <!-- 角色创建步骤容器 -->
  <div id="step-pages"></div>

</div>

function rnd(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function rndInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function getRealmName() {
  var realm = S.realm || 0;
  for (var i = REALMS.length - 1; i >= 0; i--) {
    if (realm >= REALMS[i].min) return REALMS[i].name;
  }
  return REALMS[0].name;
}

function getWorldlyText() {
  var w = S.worldly || 0;
  if (w >= 20) return '入世·' + w + '（红尘炼心）';
  if (w >= 10) return '入世·' + w;
  if (w >= 0) return '出世·' + Math.abs(w);
  return '出世·' + Math.abs(w);
}

function updateStatsUI() {
  document.getElementById('s-lingshi').textContent = S.lingshi;
  document.getElementById('s-prestige').textContent = S.prestige;
  document.getElementById('s-social').textContent = S.social;
  document.getElementById('s-wit').textContent = S.wit;
  document.getElementById('s-bravo').textContent = S.bravo;
  document.getElementById('s-day').textContent = S.day;
  document.getElementById('s-phase').textContent = PHASES[S.phase];
  document.getElementById('s-sect').textContent = S.sect || '散修';
  document.getElementById('s-heaven').textContent = S.heaven || 0;
  document.getElementById('s-mortal').textContent = S.mortal || 0;
  document.getElementById('s-worldly-text').textContent = getWorldlyText();
  if (S.daoist) {
    document.getElementById('s-daoist-name').textContent = S.daoist;
    document.getElementById('s-daoist-wrap').classList.add('show');
    document.getElementById('s-affection-wrap').classList.add('show');
    document.getElementById('s-affection-num').textContent = S.affection;
    document.getElementById('s-affection-bar').style.width = S.affection + '%';
  }
}

function showScene(title, text, choices) {
  var scene = document.getElementById('scene');
  var titleEl = document.getElementById('scene-title');
  var textEl = document.getElementById('scene-text');
  var choicesEl = document.getElementById('choices');
  titleEl.textContent = title;
  textEl.innerHTML = text.split('\n').map(function(p) { return '<p>' + p + '</p>'; }).join('');
  choicesEl.innerHTML = '';
  choices.forEach(function(c) {
    var btn = document.createElement('button');
    btn.className = 'choice ' + (c.type || '');
    var tagClass = { safe: 'tag-safe', risky: 'tag-risky', love: 'tag-love', smart: 'tag-smart' }[c.type] || 'tag-safe';
    var typeText = { safe: '稳健', risky: '冒险', love: '情感', smart: '智慧' }[c.type] || '选择';
    btn.innerHTML = '<span class="tag ' + tagClass + '">' + typeText + '</span>' + c.text;
    btn.onclick = function() { c.fn(); };
    choicesEl.appendChild(btn);
  });
  scene.classList.add('show');
  document.getElementById('save-bar').classList.add('show');
  document.getElementById('log-wrap').classList.add('show');
}

function addLog(text) {
  var log = document.getElementById('log');
  var entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.textContent = '第' + S.day + '天·' + PHASES[S.phase] + '：' + text;
  log.insertBefore(entry, log.firstChild);
}

function applyEffects(effects) {
  if (!effects) return;
  Object.keys(effects).forEach(function(k) {
    S[k] = (S[k] || 0) + effects[k];
  });
  updateStatsUI();
}

function applyTalentEffects() {
  if (!S.talents) return;
  if (S.talents.indexOf('linglong') >= 0) { S.wit += 3; S.social += 2; }
  if (S.talents.indexOf('miaoyu') >= 0) { S.social += 3; }
  if (S.talents.indexOf('wanren') >= 0) { S.prestige += 3; S.affection += 10; }
  if (S.talents.indexOf('bing') >= 0) { S.affection += 15; }
  if (S.talents.indexOf('tian_sha') >= 0) { S.bravo += 5; }
  if (S.talents.indexOf('hongyun') >= 0) { S.lingshi += 20; }
}

function nextPhase() {
  S.phase++;
  if (S.phase >= PHASES.length) {
    S.phase = 0;
    S.day++;
    if (S.talents && S.talents.indexOf('hongyun') >= 0) {
      S.lingshi += 20;
    }
  }
  updateStatsUI();
  doRandomEvent();
}

function doRandomEvent() {
  var pool = EVENTS.slice();
  var ev1 = pool.splice(Math.floor(Math.random() * pool.length), 1)[0];
  var ev2 = pool[Math.floor(Math.random() * pool.length)];
  if (!ev2) ev2 = ev1;
  doEvent(ev1, function() {
    doEvent(ev2, function() {
      afterEvent();
    });
  });
}

function doEvent(ev, cb) {
  var title = ev.title;
  var text = ev.text;
  var choices = ev.choices.map(function(c) {
    return {
      text: c.text,
      type: c.type,
      fn: (function(ch) {
        return function() {
          var fail = ch.failEffects && Math.random() < 0.4;
          var eff = fail ? ch.failEffects : ch.effects;
          var logText = fail ? ch.failLog : ch.log;
          applyEffects(eff);
          addLog(logText);
          showEventResult(ev.title, logText, cb);
        };
      })(c)
    };
  });
  showScene(title, text, choices);
}

function showEventResult(title, result, cb) {
  var scene = document.getElementById('scene');
  var titleEl = document.getElementById('scene-title');
  var textEl = document.getElementById('scene-text');
  var choicesEl = document.getElementById('choices');
  titleEl.textContent = '📋 ' + title;
  textEl.innerHTML = '<p style="color:#8aca8a;line-height:2">' + result + '</p>';
  choicesEl.innerHTML = '';
  var btn = document.createElement('button');
  btn.className = 'next-btn';
  btn.textContent = '继续下一个小事件 →';
  btn.onclick = cb;
  choicesEl.appendChild(btn);
}

function renderStepDots(total, current) {
  var dots = '';
  for (var i = 1; i <= total; i++) {
    if (i < current) dots += '<div class="step-dot done"></div>';
    else if (i === current) dots += '<div class="step-dot active"></div>';
    else dots += '<div class="step-dot"></div>';
  }
  return '<div class="step-indicator">' + (current - 1) + ' / ' + total + '</div><div class="step-dots">' + dots + '</div>';
}

    '<div class="talent-display">' + _selections.talents.map(function(id) { var t = TALENTS.find(function(x) { return x.id === id; }); return '<span class="talent-badge">' + (t ? t.name : id) + '</span>'; }).join('') + '</div>' +
    '</div>' +
    '<button class="next-btn" onclick="showDaoistSelect()">前往缘定之人 →</button>' +
    '</div>';
  document.getElementById('step-pages').innerHTML = html;
}

function showDaoistSelect() {
  _step = 5;
  var html = '<div id="step-daoist" class="step-page show">' +
    '<div class="stat-panel"><div class="stat-panel-title">🌟 缘定道侣</div><div style="color:#7a6a50;font-size:0.82em;text-align:center;margin-bottom:8px">修仙路漫漫，道侣相伴，方能不负此生</div></div>' +
    '<div id="daoist-list"></div>' +
    '<div id="daoist-selected"></div>' +
    '<button class="confirm-btn" id="daoist-confirm" onclick="confirmDaoist()" disabled>确认道侣</button>' +
    '</div>';
  document.getElementById('step-pages').innerHTML = html;

  var list = document.getElementById('daoist-list');
  DAOISTS.forEach(function(d) {
    var card = document.createElement('div');
    card.className = 'daoist-card';
    card.dataset.id = d.id;
    card.innerHTML = '<div class="d-name">' + d.name + '</div>' +
      '<div class="d-type">' + d.type + '</div>' +
      '<div class="d-desc">' + d.desc + '</div>';
    card.onclick = function() {
      document.querySelectorAll('.daoist-card').forEach(function(c) { c.classList.remove('selected'); });
      card.classList.add('selected');
      _selections.daoist = d;
      document.getElementById('daoist-selected').innerHTML = '<div class="selected-note">已选道侣：「' + d.name + '」' + d.type + '</div>';
      document.getElementById('daoist-confirm').disabled = false;
    };
    list.appendChild(card);
  });
}

function confirmDaoist() {
  if (!_selections.daoist) return;
  document.getElementById('step-daoist').classList.remove('show');
  showNameInput();
}

function showNameInput() {
  _step = 6;
  var html = '<div id="step-name" class="step-page show">' +
    '<div class="stat-panel"><div class="stat-panel-title">✒️ 定名入道</div></div>' +
    '<div class="name-row">' +
    '<div class="name-input-wrap"><label>你的道号</label><input id="input-player" placeholder="例如：云浅、念卿"></div>' +
    '<div class="name-input-wrap"><label>道侣道号</label><input id="input-daoist" value="' + _selections.daoist.name + '" placeholder="他的道号"></div>' +
    '</div>' +
    '<button class="confirm-btn" onclick="confirmNames()">正式踏入仙途</button>' +
    '</div>';
  document.getElementById('step-pages').innerHTML = html;
}

function confirmNames() {
  var playerName = document.getElementById('input-player').value.trim();
  var daoistName = document.getElementById('input-daoist').value.trim();
  if (!playerName) { alert('请输入你的道号！'); return; }
  if (!daoistName) { alert('请输入道侣的道号！'); return; }

  S = {
    lingshi: 100,
    prestige: 0,
    social: 0,
    wit: 0,
    bravo: 0,
    realm: 0,
    heaven: 0,
    mortal: 0,
    worldly: 0,
    day: 1,
    phase: 0,
    daoist: daoistName,
    daoistId: _selections.daoist.id,
    affection: 50,
    appearance: _selections.appearance,
    personality: _selections.personality,
    sect: _selections.sect,
    talents: _selections.talents,
    playerName: playerName,
    started: true
  };

  applyTalentEffects();
  document.getElementById('step-pages').innerHTML = '';
  document.getElementById('stats').classList.add('show');
  _step = 7;

  updateStatsUI();
  addLog('踏入仙途，与' + daoistName + '结为道侣');
  showIntroScene();
}

function showIntroScene() {
  var intro = '「' + S.playerName + '」，你本是凡尘一粟，偶入' + S.sect.name + '，从此踏上漫漫修行路。\n' +
    '你的容貌是' + S.appearance.name + '，性情' + S.personality.name + '。\n' +
    '而你的道侣' + S.daoist + '，将与你携手，共赴这场红尘劫难。\n\n' +
    '修行路漫漫，且行且珍惜。';
  showScene('🌟 浮生绘卷·尘缘劫', intro, [
    { text: '第一日清晨，开始修炼！', type: 'safe', fn: function() { nextPhase(); } }
  ]);
}

// ═══════════════════════════════════════════════════════
// 每日游戏主循环
// ═══════════════════════════════════════════════════════

function afterEvent() {
  nextPhase();
}

// ═══════════════════════════════════════════════════════
// 存档系统
// ═══════════════════════════════════════════════════════

function saveGame() {
  if (!S.started) return;
  localStorage.setItem('xiuxian_save', JSON.stringify(S));
  addLog('💾 存档成功');
}

function loadGame() {
  var data = localStorage.getItem('xiuxian_save');
  if (!data) { addLog('📂 暂无存档'); return; }
  S = JSON.parse(data);
  document.getElementById('stats').classList.add('show');
  document.getElementById('save-bar').classList.add('show');
  document.getElementById('log-wrap').classList.add('show');
  updateStatsUI();
  document.getElementById('log').innerHTML = '';
  addLog('📂 读档成功');
  _step = 7;
  showScene('📂 继续修行', '欢迎回来，' + S.playerName + '。今日是修行的第' + S.day + '天，' + PHASES[S.phase] + '。', [
    { text: '继续今日修行', type: 'safe', fn: function() { doRandomEvent(); } }
  ]);
}

function confirmReset() {
  if (!confirm('确定要重新开始吗？当前进度将丢失。')) return;
  resetGameState();
  localStorage.removeItem('xiuxian_save');
  document.getElementById('cover').style.display = 'flex';
  document.getElementById('stats').classList.remove('show');
  document.getElementById('scene').classList.remove('show');
  document.getElementById('save-bar').classList.remove('show');
  document.getElementById('log-wrap').classList.remove('show');
  document.getElementById('step-pages').innerHTML = '';
  _step = 0;
}

function resetGameState() {
  S = {};
  _selections = { appearance: null, personality: null, sect: null, talents: [] };
  _step = 0;
}

// ═══════════════════════════════════════════════════════
// 启动
// ═══════════════════════════════════════════════════════

function startGame() {
  resetGameState();
  hideCover();
  showStep1();
}
</script>
</body>
</html>
